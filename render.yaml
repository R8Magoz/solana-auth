services:
  - type: web
    name: solana-auth
    env: node
    plan: starter
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: solana-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
