/* ── DEPARTMENTS CRUD (superadmin, settings) ───────────────────────────────── */
function DepartmentsSettingsBlock({t}){
  const{departments,refreshDepartments,isSA}=useApp();
  const [name,setName]=useState("");
  const [bud,setBud]=useState("");
  const [editId,setEditId]=useState(null);
  const [ef,setEf]=useState({name:"",budget:""});
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");
  const [delId,setDelId]=useState(null);
  if(!isSA)return null;
  const sessionTok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
  const saveLocal=(next)=>{
    lsSet(DEPTS_LS_KEY,next.map(x=>({id:x.id,name:x.name,budget:Number(x.budget)||0,createdAt:x.createdAt||Date.now()})));
    void refreshDepartments();
  };
  const addDept=async()=>{
    setErr("");setMsg("");
    const n=name.trim();
    if(!n){setErr("Nombre requerido.");return;}
    const b=parseFloat(String(bud).replace(",","."))||0;
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionTok},body:JSON.stringify({name:n,budget:b})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setName("");setBud("");setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      const id="dept_"+Date.now();
      saveLocal([...departments,{id,name:n,budget:b,createdAt:Date.now()}]);
      setName("");setBud("");setMsg(t("settings.deptSaved"));
    }
  };
  const saveEdit=async row=>{
    setErr("");setMsg("");
    const n=(ef.name||"").trim();
    if(!n){setErr("Nombre requerido.");return;}
    const b=parseFloat(String(ef.budget).replace(",","."))||0;
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments/"+encodeURIComponent(row.id),{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionTok},body:JSON.stringify({name:n,budget:b})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setEditId(null);setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      saveLocal(departments.map(x=>x.id===row.id?{...x,name:n,budget:b}:x));
      setEditId(null);setMsg(t("settings.deptSaved"));
    }
  };
  const doDelete=async row=>{
    setErr("");setMsg("");
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments/"+encodeURIComponent(row.id),{method:"DELETE",headers:{Authorization:"Bearer "+sessionTok}});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setDelId(null);setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      saveLocal(departments.filter(x=>x.id!==row.id));
      setDelId(null);setMsg(t("settings.deptSaved"));
    }
  };
  return(
    <AccordionSection title={t("settings.accordion.budgets")}>
      <p style={{fontSize:11,color:"#6B7B72",marginBottom:10,lineHeight:1.45}}>{t("settings.deptIntro")}</p>
      {msg&&<div style={{fontSize:11,padding:"6px 9px",borderRadius:6,background:"#D1FAE5",color:"#065F46",marginBottom:8}}>{msg}</div>}
      {err&&<div style={{fontSize:11,padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",marginBottom:8}}>{err}</div>}
      <div style={{background:"#F5F0EA",borderRadius:9,padding:12,marginBottom:12}}>
        <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>{t("settings.deptAdd")}</div>
        <label className="lbl">{t("settings.deptName")}</label>
        <input className="inp" style={{fontSize:13,marginBottom:8}} value={name} onChange={e=>setName(e.target.value)}/>
        <label className="lbl">{t("settings.deptBudget")}</label>
        <input className="inp" style={{fontSize:13,marginBottom:8}} type="text" inputMode="decimal" value={bud} onChange={e=>setBud(e.target.value)}/>
        <button type="button" className="btn-primary" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>void addDept()}>{t("action.add")}</button>
      </div>
      <div style={{fontSize:9,fontWeight:700,color:"#9CAA9F",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>{t("settings.deptBudget")}</div>
      {departments.map(d=>(
        <div key={d.id} style={{borderBottom:"1px solid #F5F0EA",padding:"8px 0"}}>
          {editId===d.id?(
            <div style={{background:"#F5F0EA",borderRadius:8,padding:10}}>
              <label className="lbl">{t("settings.deptName")}</label>
              <input className="inp" style={{fontSize:12,marginBottom:6}} value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/>
              <label className="lbl">{t("settings.deptBudget")}</label>
              <input className="inp" style={{fontSize:12,marginBottom:8}} value={ef.budget} onChange={e=>setEf(p=>({...p,budget:e.target.value}))}/>
              <div style={{display:"flex",gap:6}}>
                <button type="button" className="btn-primary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>void saveEdit(d)}>{t("action.save")}</button>
                <button type="button" className="btn-secondary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>setEditId(null)}>{t("action.cancel")}</button>
              </div>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:12,fontWeight:600}}>{d.name}</div>
                <div style={{fontSize:10,color:"#9CAA9F"}}>{fmt(Number(d.budget)||0)} EUR</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #DDD6CC",background:"transparent",color:"#4B5E52",cursor:"pointer"}} onClick={()=>{setEditId(d.id);setEf({name:d.name,budget:String(d.budget!=null?d.budget:"")});setDelId(null);}}>{t("action.edit")}</button>
                <button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer"}} onClick={()=>setDelId(d.id)}>{t("action.delete")}</button>
              </div>
            </div>
          )}
          {delId===d.id&&(
            <div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px",marginTop:6}}>
              <div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>¿Eliminar «{d.name}»?</div>
              <div style={{display:"flex",gap:6}}>
                <button type="button" className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>void doDelete(d)}>{t("action.confirm")}</button>
                <button type="button" className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDelId(null)}>{t("action.cancel")}</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </AccordionSection>
  );
}

/* ── SETTINGS VIEW ─────────────────────────────────────────────────────────── */
function SettingsView(){
  const{t,user,users,expenses,bills,cats,saveCats,saveUsers,saveExp,saveBills,
        onSignOut,passwords,savePasswords,ivaRates,saveIvaRates}=useApp();
  const isSA=user?.role==="superadmin";
  const [editId,setEditId]=useState(null);
  const [ef,setEf]=useState({});
  const [addU,setAddU]=useState(false);
  const [nu,setNu]=useState({name:"",title:"",email:"",phone:"",role:"user",color:"#6B7280",tempPw:"",showTempPw:false});
  const [nuErr,setNuErr]=useState("");
  const [delC,setDelC]=useState(null);
  const [dSelf,setDSelf]=useState(false);
  const [sf,setSf]=useState({name:user?.name||"",email:user?.email||"",phone:user?.phone||"",avatar:user?.avatar||null});
  const [catEdit,setCatEdit]=useState(null);
  const [catForm,setCatForm]=useState({});
  const [addCat,setAddCat]=useState(false);
  const [newCat,setNewCat]=useState({name:"",approverIds:defaultCategoryApproverIds([]),budget:""});
  const [archC,setArchC]=useState(null);
  // password
  const [pwForm,setPwForm]=useState({cur:"",nw:"",cn:""});
  const [pwMsg,setPwMsg]=useState("");
  const [pwOk, setPwOk] =useState(false);
  const [pwSaving,setPwSaving]=useState(false);
  const [ivaDefault,setIvaDefault]=useState(()=>readIvaDefault());
  useEffect(()=>{setIvaDefault(readIvaDefault());},[ivaRates]);
  const saveIvaDefault=v=>{
    const n=Number(v);
    if(Number.isNaN(n))return;
    try{localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(n));}catch(e){}
    setIvaDefault(n);
  };
  const savePw=async()=>{
    setPwMsg("");setPwOk(false);
    const existing=passwords?.[user.id];
    if(pwForm.nw.length<8){setPwMsg(t("msg.minPassword"));return;}
    if(COMMON_PASSWORDS.has(pwForm.nw.toLowerCase())){setPwMsg(t("msg.pwCommon"));return;}
    if(pwForm.nw!==pwForm.cn){setPwMsg(t("msg.passwordMismatch"));return;}

    if(AUTH_URL){
      setPwSaving(true);
      try{
        let token=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
        if(!token){setPwMsg(t("msg.sessionExpired"));return;}
        if(existing){
          if(!String(pwForm.cur||"").trim()){setPwMsg(t("msg.currentPasswordRequired"));return;}
          const lr=await fetch(AUTH_URL+"/auth/login",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({email:String(user.email||"").trim().toLowerCase(),password:pwForm.cur}),
          });
          if(!lr.ok){setPwMsg(t("msg.passwordWrong"));return;}
          const ld=await lr.json().catch(()=>({}));
          const t2=ld.sessionToken!=null&&String(ld.sessionToken).trim()!==""?String(ld.sessionToken).trim():null;
          if(t2){
            token=t2;
            try{sessionStorage.setItem("sol-session-token",token);}catch(e){}
            API.token=token;
          }
        }
        const r=await fetch(AUTH_URL+"/auth/change-password",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
          body:JSON.stringify({userId:user.id,newPassword:pwForm.nw}),
        });
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setPwMsg(d.error||t("msg.genericShort"));return;}
      }catch{
        setPwMsg(t("signup.serverDown"));
        return;
      }finally{
        setPwSaving(false);
      }
    }else if(existing&&pwForm.cur!==existing){
      setPwMsg(t("msg.passwordWrong"));
      return;
    }

    savePasswords({...passwords,[user.id]:pwForm.nw});
    appLog("info","password_changed",{userId:user.id});
    setPwForm({cur:"",nw:"",cn:""});setPwMsg(t("msg.passwordChanged"));setPwOk(true);
  };

  return(
    <div style={{maxWidth:540}}>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G,marginBottom:12}}>{t("settings.title")}</h1>



      {/* ── Team members ── */}
      {isSA&&<AccordionSection title={t("settings.accordion.team")}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button className="btn-sm" style={{fontSize:10}} onClick={()=>{setAddU(v=>!v);setEditId(null);}}>{t("action.addUser")}</button>
          </div>
          {addU&&(
            <div style={{background:"#F5F0EA",borderRadius:9,padding:12,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.name")}</label><input className="inp" style={{fontSize:13}} value={nu.name} onChange={e=>setNu(p=>({...p,name:e.target.value}))} placeholder="Name"/></div>
                <div><label className="lbl">{t("label.title")}</label><input className="inp" style={{fontSize:13}} value={nu.title} onChange={e=>setNu(p=>({...p,title:e.target.value}))} placeholder="Role"/></div>
                <div><label className="lbl">{t("label.role")}</label><select className="inp" style={{fontSize:13}} value={nu.role} onChange={e=>setNu(p=>({...p,role:e.target.value}))}><option value="user">{t("role.user")}</option><option value="admin">{t("role.admin")}</option></select></div>
                <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.email")}</label><input className="inp" style={{fontSize:13}} type="email" value={nu.email} onChange={e=>setNu(p=>({...p,email:e.target.value}))} placeholder="email@example.com"/></div>
                <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.phone")}</label><input className="inp" style={{fontSize:13}} value={nu.phone} onChange={e=>setNu(p=>({...p,phone:e.target.value}))} placeholder="+34..."/></div>
                <div style={{gridColumn:"1/-1",marginTop:4}}>
                  <label className="lbl">{t("label.tempPassword")}</label>
                  <div style={{position:"relative"}}>
                    <input className="inp" style={{fontSize:13,paddingRight:52}} type={nu.showTempPw?"text":"password"} value={nu.tempPw||""} onChange={e=>setNu(p=>({...p,tempPw:e.target.value}))} placeholder="mín. 8 caracteres"/>
                    <button type="button" style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#9CAA9F",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,padding:"2px 4px"}} onClick={()=>setNu(p=>({...p,showTempPw:!p.showTempPw}))}>
                      {nu.showTempPw?t("login.hidePw")||"Ocultar":t("login.showPw")||"Ver"}
                    </button>
                  </div>
                  <div style={{fontSize:9,color:"#9CAA9F",marginTop:3}}>{t("label.tempPasswordHint")}</div>
                </div>

              </div>
              {nuErr&&<div style={{padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",fontSize:11,marginTop:6}}>{nuErr}</div>}
              <div style={{display:"flex",gap:7,marginTop:8}}>
                <button className="btn-primary" style={{flex:1,fontSize:12,padding:"6px 10px"}} onClick={async()=>{
                  if(!nu.name)return;
                  setNuErr("");
                  if(!nu.name){setNuErr("El nombre es obligatorio.");return;}
                  if(!nu.email){setNuErr("El correo es obligatorio.");return;}
                  if(!nu.tempPw||nu.tempPw.length<8){setNuErr(t("msg.tempPwRequired"));return;}
                  const newId=nu.name.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now();
                  if(AUTH_URL){
                    // Use session token (set at login) — no admin key needed in UI
                    const sessionToken=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
                    if(!sessionToken){setNuErr("Tu sesión ha expirado. Cierra sesión y vuelve a entrar para crear usuarios.");return;}
                    try{
                      const r=await fetch(AUTH_URL+"/admin/users/create",{
                        method:"POST",
                        headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionToken},
                        body:JSON.stringify({name:nu.name,email:nu.email,tempPassword:nu.tempPw,role:nu.role,title:nu.title,phone:nu.phone,color:nu.color})
                      });
                      const d=await r.json();
                      if(!r.ok){setNuErr(d.error||"Error al crear usuario en el servidor.");return;}
                      saveUsers([...users,{...d.user}]);
                    }catch{
                      // Server unreachable — local-only fallback
                      const newUser={id:newId,...nu,mustChangePassword:true};
                      delete newUser.showTempPw;delete newUser.tempPw;delete newUser.adminKey;
                      saveUsers([...users,newUser]);
                      savePasswords({...passwords,[newId]:nu.tempPw});
                    }
                  } else {
                    const newUser={id:newId,...nu,mustChangePassword:true};
                    delete newUser.showTempPw;delete newUser.tempPw;delete newUser.adminKey;
                    saveUsers([...users,newUser]);
                    savePasswords({...passwords,[newId]:nu.tempPw});
                  }
                  setNu({name:"",title:"",email:"",phone:"",role:"user",color:"#6B7280",tempPw:"",showTempPw:false,adminKey:""});
                  setNuErr("");
                  setAddU(false);
                }}>{t("action.add")}</button>
                <button className="btn-secondary" style={{flex:1,fontSize:12,padding:"6px 10px"}} onClick={()=>setAddU(false)}>{t("action.cancel")}</button>
              </div>
            </div>
          )}
          {users.map(u=>(
            <div key={u.id}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F5F0EA"}}>
                <UserAvatar user={u} size={28} fontSize={8}/>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600}}>{u.name}</div><div style={{fontSize:10,color:"#9CAA9F",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email||"–"} · {u.role==="superadmin"?t("role.superadmin"):u.role==="admin"?t("role.admin"):t("role.user")}</div></div>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  <button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #DDD6CC",background:"transparent",color:"#4B5E52",cursor:"pointer"}} onClick={()=>{setEditId(u.id);setEf({name:u.name,title:u.title||"",email:u.email||"",phone:u.phone||"",role:u.role,color:u.color});}}>{t("action.edit")}</button>
                  {u.id!==user.id&&<button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer"}} onClick={()=>setDelC(u.id)}>{t("action.delete")}</button>}
                </div>
              </div>
              {delC===u.id&&<div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px",margin:"4px 0"}}><div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>{t("msg.deleteUser")} {u.name}?</div><div style={{display:"flex",gap:6}}><button className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>{saveUsers(users.filter(x=>x.id!==u.id));setDelC(null);}}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDelC(null)}>{t("action.cancel")}</button></div></div>}
              {editId===u.id&&(
                <div style={{background:"#F5F0EA",borderRadius:9,padding:10,margin:"4px 0"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.name")}</label><input className="inp" style={{fontSize:13}} value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/></div>
                    <div><label className="lbl">{t("label.title")}</label><input className="inp" style={{fontSize:13}} value={ef.title} onChange={e=>setEf(p=>({...p,title:e.target.value}))}/></div>
                    <div><label className="lbl">{t("label.role")}</label><select className="inp" style={{fontSize:13}} value={ef.role} onChange={e=>setEf(p=>({...p,role:e.target.value}))}><option value="user">{t("role.user")}</option><option value="admin">{t("role.admin")}</option><option value="superadmin">{t("role.superadmin")}</option></select></div>
                    <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.email")}</label><input className="inp" style={{fontSize:13}} type="email" value={ef.email} onChange={e=>setEf(p=>({...p,email:e.target.value}))}/></div>
                    <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.phone")}</label><input className="inp" style={{fontSize:13}} value={ef.phone} onChange={e=>setEf(p=>({...p,phone:e.target.value}))}/></div>
                  </div>
                  <div style={{display:"flex",gap:7,marginTop:7}}><button className="btn-primary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>{saveUsers(users.map(u=>u.id===editId?{...u,...ef}:u));setEditId(null);}}>{t("action.save")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>setEditId(null)}>{t("action.cancel")}</button></div>
                </div>
              )}
            </div>
          ))}
      </AccordionSection>}

      {/* ── Profile ── */}
      <AccordionSection title={t("settings.accordion.profile")}>
        {/* Avatar upload */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          {sf.avatar
            ?<img src={sf.avatar} alt="" style={{width:52,height:52,borderRadius:"50%",objectFit:"cover",border:"2px solid #EDE8E0",flexShrink:0}}/>
            :<div style={{width:52,height:52,borderRadius:"50%",background:user.color||T,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",flexShrink:0}}>{inits(user.name)}</div>
          }
          <div>
            <label style={{display:"inline-block",padding:"5px 10px",borderRadius:6,border:"1.5px solid #DDD6CC",fontSize:11,fontWeight:600,color:G,cursor:"pointer",fontFamily:"inherit",background:"transparent"}}>
              {sf.avatar?t("action.changePhoto"):t("action.upload")}
              <input type="file" accept="image/jpeg,image/png,image/webp" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const err=validateUpload(f,UPLOAD_RULES.avatar);if(err){alert(err);e.target.value="";return;}const r=new FileReader();r.onload=ev=>setSf(p=>({...p,avatar:ev.target.result}));r.readAsDataURL(f);e.target.value="";}}/>
            </label>
            {sf.avatar&&<button style={{marginLeft:7,fontSize:10,color:"#991B1B",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setSf(p=>({...p,avatar:null}))}>✕</button>}
          </div>
        </div>
        <div style={{display:"grid",gap:8}}>
          <div><label className="lbl">{t("label.name")}</label><input className="inp" value={sf.name} onChange={e=>setSf(p=>({...p,name:e.target.value}))}/></div>
          <div><label className="lbl">{t("label.email")}</label><input className="inp" type="email" value={sf.email} onChange={e=>setSf(p=>({...p,email:e.target.value}))}/></div>
          <div><label className="lbl">{t("label.phone")}</label><input className="inp" value={sf.phone} onChange={e=>setSf(p=>({...p,phone:e.target.value}))}/></div>
        </div>
        <button className="btn-primary" style={{marginTop:9,fontSize:12,padding:"6px 12px"}} onClick={()=>{saveUsers(users.map(u=>u.id===user.id?{...u,...sf}:u));alert(t("msg.profileUpdated"));}}>{t("action.saveChanges")}</button>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #EDE8E0"}}>
          <div style={{fontWeight:600,fontSize:12,color:"#991B1B",marginBottom:4}}>{t("settings.deleteAccount")}</div>
          {!dSelf?<button className="btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDSelf(true)}>{t("settings.requestDeletion")}</button>:(
            <div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>{t("msg.removeAccount")}</div><div style={{display:"flex",gap:6}}><button className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>{saveUsers(users.filter(u=>u.id!==user.id));onSignOut();}}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDSelf(false)}>{t("action.cancel")}</button></div></div>
          )}
        </div>
      </AccordionSection>

      {/* ── Password ── */}
      <AccordionSection title={t("settings.accordion.password")}>
        <p style={{fontSize:11,color:"#6B7B72",marginBottom:9}}>{t("settings.passwordDesc")}</p>
        {!passwords?.[user.id]&&<div style={{background:"#FEF3C7",borderRadius:6,padding:"6px 9px",fontSize:10,color:"#92400E",marginBottom:8}}>{t("msg.passwordNoExisting")}</div>}
        <div style={{display:"grid",gap:7}}>
          {passwords?.[user.id]&&<div><label className="lbl">{t("label.currentPassword")}</label><input className="inp" type="password" value={pwForm.cur} onChange={e=>setPwForm(p=>({...p,cur:e.target.value}))}/></div>}
          <div><label className="lbl">{t("label.newPassword")}</label><input className="inp" type="password" value={pwForm.nw} onChange={e=>setPwForm(p=>({...p,nw:e.target.value}))}/></div>
          <div><label className="lbl">{t("label.confirmPassword")}</label><input className="inp" type="password" value={pwForm.cn} onChange={e=>setPwForm(p=>({...p,cn:e.target.value}))}/></div>
        </div>
        {pwMsg&&<div style={{marginTop:7,fontSize:11,padding:"5px 8px",borderRadius:6,background:pwOk?"#D1FAE5":"#FEE2E2",color:pwOk?"#065F46":"#7F1D1D"}}>{pwMsg}</div>}
        <button type="button" className="btn-primary" style={{marginTop:9,fontSize:12,padding:"6px 12px"}} disabled={pwSaving} onClick={()=>void savePw()}>{pwSaving?"…":(passwords?.[user.id]?t("action.changePassword"):t("action.setPassword"))}</button>
      </AccordionSection>

      <DepartmentsSettingsBlock t={t}/>

      {/* ── Categories ── */}
      {isSA&&<AccordionSection title={t("settings.accordion.categories")}>
        <div style={{marginBottom:12}}>
          <label className="lbl">{t("settings.ivaDefault")}</label>
          <select className="inp" style={{fontSize:13}} value={String(ivaDefault)} onChange={e=>saveIvaDefault(Number(e.target.value))} aria-label={t("settings.ivaDefault")}>
            {ivaRates.map(r=><option key={String(r.value)+"-"+r.name} value={r.value}>{formatIvaOptionLabel(r)}</option>)}
          </select>
        </div>
        <IvaRatesEditorBlock t={t} ivaRates={ivaRates} onSave={saveIvaRates}/>
        <hr style={{border:"none",borderTop:"1px solid #E8E2DC",margin:"16px 0"}}/>
        <div style={{fontSize:9,fontWeight:700,color:"#9CAA9F",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>{t("settings.sectionCategories")}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button className="btn-sm" style={{fontSize:10}} onClick={()=>{setCatEdit(null);setAddCat(v=>{const n=!v;if(n)setNewCat({name:"",approverIds:defaultCategoryApproverIds(users),budget:""});return n;});}}>{t("action.addCategory")}</button>
          </div>
          <p style={{fontSize:10,color:"#9CAA9F",marginBottom:10,lineHeight:1.4}}>{t("settings.defaultApprovers")}</p>
          <p style={{fontSize:10,color:"#7A8B82",marginBottom:10,lineHeight:1.4}}>{t("settings.approverAutoNote")}</p>
          {addCat&&(
            <div style={{background:"#F5F0EA",borderRadius:9,padding:12,marginBottom:10}}>
              <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>{t("settings.newCategory")}</div>
              <label className="lbl">{t("label.categoryName")}</label>
              <input className="inp" style={{marginBottom:8,fontSize:13}} value={newCat.name} onChange={e=>setNewCat(p=>({...p,name:e.target.value}))} placeholder={t("settings.categoryName.placeholder")}/>
              <label className="lbl">{t("label.approvers")}</label>
              {users.map(u=>(
                <label key={u.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,fontSize:12,cursor:"pointer"}}>
                  <input type="checkbox" checked={newCat.approverIds.includes(u.id)} onChange={e=>{const ids=e.target.checked?[...newCat.approverIds,u.id]:newCat.approverIds.filter(x=>x!==u.id);setNewCat(p=>({...p,approverIds:ids}));}}/>
                  {u.name} <span style={{fontSize:9,color:"#9CAA9F"}}>({u.role})</span>
                </label>
              ))}
              <label className="lbl">{t("settings.monthlyBudget")}</label>
              <input className="inp" style={{marginBottom:8,fontSize:13}} type="text" inputMode="decimal" placeholder="—" value={newCat.budget||""} onChange={e=>setNewCat(p=>({...p,budget:e.target.value}))}/>
              <div style={{display:"flex",gap:7,marginTop:8}}>
                <button className="btn-primary" style={{flex:1,fontSize:12,padding:"6px 10px"}} onClick={()=>{if(!newCat.name)return;const approverIds=newCat.approverIds||[];if(approverIds.length<2){alert("Se requieren al menos 2 aprobadores por categoría.");return;}const b=newCat.budget===""||newCat.budget==null?null:parseFloat(String(newCat.budget).replace(",","."));saveCats([...cats,{id:"c"+Date.now(),name:newCat.name,approverIds,archived:false,budget:isNaN(b)?null:b}]);setNewCat({name:"",approverIds:defaultCategoryApproverIds(users),budget:""});setAddCat(false);}}>{t("action.add")}</button>
                <button className="btn-secondary" style={{flex:1,fontSize:12,padding:"6px 10px"}} onClick={()=>setAddCat(false)}>{t("action.cancel")}</button>
              </div>
            </div>
          )}
          {cats.map(c=>(
            <div key={c.id}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F5F0EA",opacity:c.archived?0.5:1}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600}}>{c.name}{c.archived&&<span style={{fontSize:9,color:"#9CAA9F",marginLeft:5}}>[archived]</span>}</div>
                  <div style={{fontSize:9,color:"#9CAA9F",marginTop:1}}>{t("settings.approversLabel")} {c.approverIds.map(id=>(users.find(u=>u.id===id)||{name:UNKNOWN_USER_NAME}).name).join(", ")||t("settings.noApprovers")}</div>
                </div>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  {!c.archived&&<button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #DDD6CC",background:"transparent",color:"#4B5E52",cursor:"pointer"}} onClick={()=>{setCatEdit(c.id);setCatForm({name:c.name,approverIds:[...c.approverIds],budget:c.budget!=null&&c.budget!==""?String(c.budget):""});setAddCat(false);}}>{t("action.edit")}</button>}
                  <button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer"}} onClick={()=>setArchC(c.id)}>{c.archived?t("action.restore"):t("action.archive")}</button>
                </div>
              </div>
              {archC===c.id&&<div style={{background:"#FEF3C7",borderRadius:7,padding:"8px 10px",margin:"4px 0"}}><div style={{fontSize:11,color:"#92400E",marginBottom:6}}>{c.archived?t("settings.restoreCategory"):t("msg.archiveCategory")}</div><div style={{display:"flex",gap:6}}><button className="btn-primary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>{saveCats(cats.map(x=>x.id===c.id?{...x,archived:!x.archived}:x));setArchC(null);}}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setArchC(null)}>{t("action.cancel")}</button></div></div>}
              {catEdit===c.id&&(
                <div style={{background:"#F5F0EA",borderRadius:9,padding:12,margin:"4px 0"}}>
                  <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>{t("settings.editCategory")}: {c.name}</div>
                  <label className="lbl">{t("label.categoryName")}</label>
                  <input className="inp" style={{marginBottom:8,fontSize:13}} value={catForm.name} onChange={e=>setCatForm(p=>({...p,name:e.target.value}))}/>
                  <label className="lbl">{t("label.approvers")}</label>
                  {users.map(u=>(
                    <label key={u.id} style={{display:"flex",alignItems:"center",gap:7,marginBottom:5,fontSize:12,cursor:"pointer"}}>
                      <input type="checkbox" checked={catForm.approverIds?.includes(u.id)||false} onChange={e=>{const ids=e.target.checked?[...catForm.approverIds,u.id]:catForm.approverIds.filter(x=>x!==u.id);setCatForm(p=>({...p,approverIds:ids}));}}/>
                      {u.name} <span style={{fontSize:9,color:"#9CAA9F"}}>({u.role})</span>
                    </label>
                  ))}
                  <label className="lbl">{t("settings.monthlyBudget")}</label>
                  <input className="inp" style={{marginBottom:8,fontSize:13}} type="text" inputMode="decimal" placeholder="—" value={catForm.budget||""} onChange={e=>setCatForm(p=>({...p,budget:e.target.value}))}/>
                  <div style={{display:"flex",gap:7,marginTop:8}}><button className="btn-primary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>{const approverIds=catForm.approverIds||[];if(approverIds.length<2){alert("Se requieren al menos 2 aprobadores por categoría.");return;}const b=catForm.budget===""||catForm.budget==null?null:parseFloat(String(catForm.budget).replace(",","."));saveCats(cats.map(x=>x.id===c.id?{...x,name:catForm.name,approverIds,budget:isNaN(b)?null:b}:x));setCatEdit(null);}}>{t("action.save")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>setCatEdit(null)}>{t("action.cancel")}</button></div>
                </div>
              )}
            </div>
          ))}
      </AccordionSection>}

      {isSA&&AUTH_URL&&<AccordionSection title={t("settings.accordion.pending")}>
        <PendingUsersPanel/>
      </AccordionSection>}

      {isSA&&<AccordionSection title={t("settings.accordion.appLog")}>
        <AppLogPanelBody/>
      </AccordionSection>}

      {/* ── Danger zone ── */}
      <AccordionSection title={t("settings.accordion.danger")} accent={"#991B1B"}>
        <p style={{fontSize:11,color:"#6B7B72",marginBottom:8}}>{t("settings.resetDesc")}</p>
        <button className="btn-danger" style={{fontSize:11,padding:"5px 11px"}} onClick={()=>{if(window.confirm(t("msg.resetConfirm"))){if(AUTH_URL){alert("No disponible cuando la app usa el servidor.");return;}saveExp(SEED_EXP);saveBills(SEED_BILLS);}}}>{t("action.resetDemo")}</button>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #EDE8E0"}}>
          <div style={{fontWeight:600,fontSize:12,color:"#991B1B",marginBottom:4}}>{t("settings.deleteAccount")}</div>
          {!dSelf?<button className="btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDSelf(true)}>{t("settings.requestDeletion")}</button>:(
            <div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>{t("msg.removeAccount")}</div><div style={{display:"flex",gap:6}}><button className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>{saveUsers(users.filter(u=>u.id!==user.id));onSignOut();}}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDSelf(false)}>{t("action.cancel")}</button></div></div>
          )}
        </div>
      </AccordionSection>

      <div style={{marginTop:12,padding:"8px 12px",background:"#F5F0EA",borderRadius:8,fontSize:10,color:"#9CAA9F",display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span>Data schema v{DATA_VERSION} · {new Date().getFullYear()}</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════════
   MAIN APP COMPONENT
══════════════════════════════════════════════════════════════════════════════ */
function SolanaExpenses(){
  /* ── STATE ──────────────────────────────────────────────────────────────── */
  const [users,   setUsers]   =useState(()=>{
    migrateItemCodes();
    migrateDataModel();
    const d=ls("sol-users",DEF_USERS);
    const n=d.map(u=>normalizeItem(u,"user"));
    appLog("info","auth:init",{userIds:n.map(u=>u.id),count:n.length});
    return n;
  });
  const [user,    setUser]    =useState(null);
  const [expenses,setExpenses]=useState(()=>{
    if(AUTH_URL)return[];
    const d=ls("sol-exp",SEED_EXP);
    return d.map(e=>normalizeItem(e,"expense"));
  });
  const [bills,   setBills]   =useState(()=>{
    if(AUTH_URL)return[];
    const d=ls("sol-bills",SEED_BILLS);
    return d.map(b=>normalizeItem(b,"bill"));
  });
  const [ledgerLoading,setLedgerLoading]=useState(false);
  const [cats,    setCats]    =useState(()=>{
    const d=ls("sol-cats",DEF_CATS);
    return d.map(c=>normalizeItem(c,"cat"));
  });
  const [passwords,setPasswords]=useState(()=>ls("sol-pwd",{}));
  // appReady: small deliberate delay so the root div never flashes empty
  const [appReady,setAppReady]=useState(false);
  useEffect(()=>{
    appLog("info","auth:boot",{ts:new Date().toISOString()});
    setAppReady(true);
  },[]);
  useEffect(()=>{try{if(localStorage.getItem("sol-lang")==null)localStorage.setItem("sol-lang","es");}catch(e){}},[]);
  const t=React.useMemo(()=>mkT(),[]);
  const [ivaRates,setIvaRates]=useState(()=>readIvaRates());
  const saveIvaRates=useCallback(rates=>{
    const n=normalizeIvaRatesPayload(rates);
    lsSet(IVA_RATES_KEY,n);
    setIvaRates(n);
    try{
      const raw=localStorage.getItem(IVA_DEFAULT_KEY);
      if(raw===null||raw===""){localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(n[0].value));return;}
      const v=JSON.parse(raw);
      if(typeof v!=="number"||isNaN(v)||!n.some(r=>r.value===v))localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(n[0].value));
    }catch(e){}
  },[]);

  const [view,    setView]    =useState("dashboard");
  const [detailId,setDetailId]=useState(null);
  const [panel,   setPanel]   =useState(null);
  const [expFlt,  setExpFlt]  =useSessionState("sol-flt-status","all");
  const [expSrc,  setExpSrc]  =useState("");
  const [catFlt,  setCatFlt]  =useSessionState("sol-flt-cat","");   // category name or ""
  const [submFlt, setSubmFlt] =useSessionState("sol-flt-subm","");   // userId or ""
  const [dateFrom,setDateFrom]=useSessionState("sol-flt-from","");   // YYYY-MM-DD or ""
  const [dateTo,  setDateTo]  =useSessionState("sol-flt-to","");   // YYYY-MM-DD or ""
  const myExpFilterClearedRef=useRef(false);
  const resetExpenseFiltersToDefault=useCallback(()=>{
    try{
      ["sol-flt-status","sol-flt-cat","sol-flt-subm","sol-flt-from","sol-flt-to"].forEach(k=>sessionStorage.removeItem(k));
    }catch(e){}
    setExpFlt("all");
    setCatFlt("");
    setSubmFlt("");
    setDateFrom("");
    setDateTo("");
    setExpSrc("");
  },[setExpFlt,setCatFlt,setSubmFlt,setDateFrom,setDateTo,setExpSrc]);

  const [form,    setForm]    =useState(()=>({...BF,ivaRate:String(readIvaDefault())}));
  const [splitOn, setSplitOn] =useState(false);
  const [splits,  setSplits]  =useState([]);
  const [spMode,  setSpMode]  =useState("equal");
  const [receipt, setReceipt] =useState(null);
  const [recPrev, setRecPrev] =useState(null);
  const [formError, setFormError] =useState("");
  const [sessionExpired, setSessionExpired]=useState(false);
  const [online,setOnline]=useState(()=>typeof navigator!=="undefined"&&navigator.onLine);
  const [toasts,setToasts]=useState([]);
  const [idleWarning,   setIdleWarning]   =useState(false);
  const idleTimer   =useRef(null);
  const warnTimer   =useRef(null);
  const [aNote,   setANote]   =useState({});
  const [addBill, setAddBill] =useState(false);
  const [newBill, setNewBill] =useState({...BB});
  const [newBillRecPrev,setNewBillRecPrev]=useState(null);
  const camCaptureForBillRef=useRef(false);
  const [departments,setDepartments]=useState([]);
  const refreshDepartments=useCallback(async()=>{
    if(AUTH_URL){
      try{
        API.ensureSessionToken();
        if(!API.token)return;
        const d=await API.get("/departments");
        setDepartments(d.departments||[]);
      }catch(e){/* keep list */}
    }else{
      setDepartments(readLocalDepartments());
    }
  },[]);
  useEffect(()=>{
    if(!user)return;
    void refreshDepartments();
  },[user?.id,refreshDepartments]);
  const departmentsWithStats=React.useMemo(
    ()=>enrichDepartmentsForUI(departments,expenses,bills,cats,users,false),
    [departments,expenses,bills,cats,users],
  );
  const defaultDeptId=React.useMemo(()=>{
    const hit=departments.find(d=>d.id===DEFAULT_DEPT_ID);
    return hit?.id||departments[0]?.id||DEFAULT_DEPT_ID;
  },[departments]);
  const [camOn,setCamOn]=useState(false);
  const [camStr,setCamStr]=useState(null);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const fileRef  =useRef(null);
  const importRef=useRef(null);
  const migrAttemptRef=useRef(false);

  const clearMyExpenseFilter=useCallback(()=>{
    myExpFilterClearedRef.current=true;
    setSubmFlt("");
  },[setSubmFlt]);
  const onSignOut=useCallback(()=>{
    myExpFilterClearedRef.current=false;
    migrAttemptRef.current=false;
    resetExpenseFiltersToDefault();
    void API.logout();
    try{sessionStorage.removeItem("sol-session-token");}catch(e){}
    API.token=null;
    setUser(null);
    setView("dashboard");
    setDetailId(null);
    setPanel(null);
    if(AUTH_URL){setExpenses([]);setBills([]);}
    setDepartments([]);
  },[resetExpenseFiltersToDefault]);

  /* ── SAVES ──────────────────────────────────────────────────────────────── */
  const saveUsers   =d=>{const n=d.map(u=>normalizeItem(u,"user"));setUsers(n);lsSet("sol-users",n);};
  const saveExp     =d=>{const n=d.map(e=>normalizeItem(e,"expense"));setExpenses(n);if(!AUTH_URL)lsSet("sol-exp",n);};
  const saveBills   =d=>{const n=d.map(b=>normalizeItem(b,"bill"));setBills(n);if(!AUTH_URL)lsSet("sol-bills",n);};
  const saveCats    =d=>{const n=d.map(c=>normalizeItem(c,"cat"));setCats(n);lsSet("sol-cats",n);};
  const savePasswords=d=>{setPasswords(d);if(!AUTH_URL)lsSet("sol-pwd",d);};

  /* ── HELPERS ────────────────────────────────────────────────────────────── */
  const getUser   =id=>users.find(u=>u.id===id)||{id,name:UNKNOWN_USER_NAME,color:"#999",role:"user",title:""};
  const adminIds  =React.useMemo(()=>getAdminIds(users),[users]); // dynamic, never hardcoded
  const isAdmin   =user?.role==="admin"||user?.role==="superadmin";
  const isSA      =user?.role==="superadmin";

  /* Sync token from storage when user is set — never wipe API.token with null/empty
     (login sets sessionStorage + API.token before setUser; a blind ||null here caused 403). */
  useEffect(()=>{
    if(!user){
      API.token=null;
      return;
    }
    try{
      const s=sessionStorage.getItem("sol-session-token");
      if(s) API.token=s;
    }catch(e){/* keep existing API.token from login */}
  },[user]);

  useEffect(()=>{
    const onSess=()=>{
      dispatchSolanaToast("Sesión expirada — inicia sesión de nuevo","error");
      API.token=null;
      try{sessionStorage.removeItem("sol-session-token");}catch(e){}
      myExpFilterClearedRef.current=false;
      setUser(null);
      setView("dashboard");
      setDetailId(null);
      setPanel(null);
      setSessionExpired(true);
    };
    window.addEventListener("solana-session-expired",onSess);
    return()=>window.removeEventListener("solana-session-expired",onSess);
  },[]);

  useEffect(()=>{
    const on=()=>{setOnline(true);void API.flushOfflineQueue();};
    const off=()=>setOnline(false);
    window.addEventListener("online",on);
    window.addEventListener("offline",off);
    return()=>{window.removeEventListener("online",on);window.removeEventListener("offline",off);};
  },[]);

  useEffect(()=>{
    const h=(ev)=>{
      const{message,kind}=ev.detail||{};
      if(!message)return;
      const id="t_"+Date.now()+"_"+Math.random().toString(36).slice(2,8);
      setToasts(p=>[...p,{id,message,kind:kind||"info"}]);
      setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),4200);
    };
    window.addEventListener("solana-toast",h);
    return()=>window.removeEventListener("solana-toast",h);
  },[]);

  useEffect(()=>{
    if(!AUTH_URL||!user||!API.token)return;
    if(typeof navigator!=="undefined"&&navigator.onLine)void API.flushOfflineQueue();
  },[user?.id]);

  useEffect(()=>{
    const h=(ev)=>{
      const{op,response}=ev.detail||{};
      if(!op||!response)return;
      if(op.method==="POST"&&op.path==="/expenses"&&op.meta&&op.meta.clientRef&&response.expense){
        const cr=op.meta.clientRef;
        const row=expenseFromApi(response.expense);
        setExpenses(prev=>prev.map(e=>e.id===cr?row:e));
        setDetailId(did=>did===cr?row.id:did);
        return;
      }
      if(op.method==="POST"&&op.path==="/bills"&&op.meta&&op.meta.clientRef&&response.bill){
        const cr=op.meta.clientRef;
        const row=billFromApi(response.bill);
        setBills(prev=>prev.map(b=>b.id===cr?row:b));
        return;
      }
      if(response.expense){
        if(op.method==="PUT"&&op.path.indexOf("/expenses/")===0){
          const row=expenseFromApi(response.expense);
          setExpenses(prev=>prev.map(e=>e.id===row.id?row:e));
          return;
        }
        if(op.method==="POST"&&(op.path.indexOf("/approve")>=0||op.path.indexOf("/reject")>=0)){
          const row=expenseFromApi(response.expense);
          setExpenses(prev=>prev.map(e=>e.id===row.id?row:e));
          return;
        }
      }
      if(response.bill&&op.method==="PUT"&&op.path.indexOf("/bills/")===0){
        const row=billFromApi(response.bill);
        setBills(prev=>prev.map(b=>b.id===row.id?row:b));
        return;
      }
      if(op.method==="POST"&&op.path.indexOf("/bills/")>=0&&op.path.indexOf("/mark-paid")>=0&&response.bill){
        const row=billFromApi(response.bill);
        setBills(prev=>prev.map(b=>b.id===row.id?row:b));
      }
    };
    window.addEventListener("solana-offline-sync",h);
    return()=>window.removeEventListener("solana-offline-sync",h);
  },[]);

  useEffect(()=>{
    if(!user)return;
    if(view==="expenses"&&!isAdmin&&!myExpFilterClearedRef.current){
      setSubmFlt(user.id);
    }
  },[view,user?.id,isAdmin,user]);

  useEffect(()=>{
    if(!user)return;
    if(!AUTH_URL){setLedgerLoading(false);return;}
    let cancelled=false;
    setLedgerLoading(true);
    (async()=>{
      try{
        const[de,db_]=await Promise.all([API.get("/expenses"),API.get("/bills")]);
        if(cancelled)return;
        setExpenses((de.expenses||[]).map(expenseFromApi));
        setBills((db_.bills||[]).map(billFromApi));
      }catch(e){
        if(!cancelled)alert(e.message||"Error al cargar gastos y facturas.");
      }finally{
        if(!cancelled)setLedgerLoading(false);
      }
    })();
    return()=>{cancelled=true;};
  },[user?.id]);

  useEffect(()=>{
    if(!AUTH_URL||!user||ledgerLoading||migrAttemptRef.current)return;
    if(expenses.length>0||bills.length>0)return;
    let localExp=[],localBills=[];
    try{
      const r1=localStorage.getItem("sol-exp");
      const r2=localStorage.getItem("solana_expenses");
      const a=r1?JSON.parse(r1):null;
      const b=r2?JSON.parse(r2):null;
      localExp=Array.isArray(a)&&a.length?a:Array.isArray(b)&&b.length?b:[];
    }catch(e){}
    try{
      const r1=localStorage.getItem("sol-bills");
      const r2=localStorage.getItem("solana_bills");
      const a=r1?JSON.parse(r1):null;
      const b=r2?JSON.parse(r2):null;
      localBills=Array.isArray(a)&&a.length?a:Array.isArray(b)&&b.length?b:[];
    }catch(e){}
    if(localExp.length===0&&localBills.length===0)return;
    migrAttemptRef.current=true;
    let cancelled=false;
    (async()=>{
      try{
        let catsMigr=cats;
        try{
          const raw=localStorage.getItem("sol-cats");
          const p=raw?JSON.parse(raw):null;
          if(Array.isArray(p)&&p.length)catsMigr=p;
        }catch(e){}
        for(const ex of localExp){
          if(cancelled)return;
          const amt=Number(ex.amount)||0;
          const expCatM=catsMigr.find(c=>c.name===ex.category);
          const approvalRequired=expCatM?.approverIds?.length>0?expCatM.approverIds:getAdminIds(users);
          await API.post("/expenses",{
            amount:amt,
            description:ex.description||".",
            category:ex.category||"Otro",
            date:(ex.date||new Date().toISOString().slice(0,10)).toString().slice(0,10),
            notes:ex.notes||undefined,
            status:ex.status==="draft"?"draft":"submitted",
            departmentId:ex.departmentId||DEFAULT_DEPT_ID,
            approvalRequired,
          },{skipOfflineQueue:true});
        }
        for(const bi of localBills){
          if(cancelled)return;
          const freq=bi.frequency||"monthly";
          const rec=isBillRecurringFrequency(freq);
          const due=(getBillFilterDateRef(bi)||billDueISOFromForm({...BB,dayOfMonth:bi.dayOfMonth||"1",frequency:freq})).toString().slice(0,10);
          const rule=freq==="annual"?"yearly":freq==="custom"&&String(bi.intervalMonths)==="3"?"quarterly":"monthly";
          await API.post("/bills",{
            vendor:bi.name||"Factura",
            amount:Number(bi.amount)||0,
            category:bi.category||"Otro",
            dueDate:due,
            notes:[bi.notes,bi.description].filter(Boolean).join("\n")||undefined,
            recurring:rec,
            recurrenceRule:rule,
            departmentId:bi.departmentId||DEFAULT_DEPT_ID,
          },{skipOfflineQueue:true});
        }
        try{
          localStorage.removeItem("sol-exp");
          localStorage.removeItem("solana_expenses");
          localStorage.removeItem("sol-bills");
          localStorage.removeItem("solana_bills");
        }catch(e){}
        if(cancelled)return;
        const[de,db_]=await Promise.all([API.get("/expenses"),API.get("/bills")]);
        setExpenses((de.expenses||[]).map(expenseFromApi));
        setBills((db_.bills||[]).map(billFromApi));
      }catch(e){
        migrAttemptRef.current=false;
        alert(e.message||"No se pudo migrar datos locales.");
      }
    })();
    return()=>{cancelled=true;};
  },[user?.id,ledgerLoading,expenses.length,bills.length,cats,users]);

  const handleReceiptFile=e=>{
    const f=e.target.files?.[0];if(!f)return;
    const err=validateUpload(f,UPLOAD_RULES.receipt);
    if(err){alert(err);e.target.value="";appLog("warn","upload_rejected",{name:f.name,size:f.size,type:f.type,reason:err});return;}
    const r=new FileReader();
    r.onload=ev=>{
      const url=ev.target.result,b64=url.split(",")[1],type=receiptEffectiveMime(f)||f.type||"image/jpeg";
      setReceipt({b64,type});
      setRecPrev(type.includes("pdf")?"PDF":url);

  /* ── SESSION IDLE TIMEOUT ─────────────────────────────────────────────────
     Resets on any user interaction. Warns 2 min before expiry.
     Auto-logout clears user state and shows the expired overlay.
  ─────────────────────────────────────────────────────────────────────────── */
  const resetIdleTimer=useCallback(()=>{
    if(!user)return;
    clearTimeout(idleTimer.current);
    clearTimeout(warnTimer.current);
    setIdleWarning(false);
    warnTimer.current=setTimeout(()=>setIdleWarning(true),  IDLE_WARNING_MS);
    idleTimer.current=setTimeout(()=>{
      appLog("warn","session_idle_expired",{userId:user?.id});
      myExpFilterClearedRef.current=false;
      resetExpenseFiltersToDefault();
      API.token=null;
      try{sessionStorage.removeItem("sol-session-token");}catch(e){}
      setUser(null);setView("dashboard");setDetailId(null);setPanel(null);
      setSessionExpired(true);setIdleWarning(false);
    }, IDLE_TIMEOUT_MS);
  },[user,resetExpenseFiltersToDefault]);

  useEffect(()=>{
    if(!user){clearTimeout(idleTimer.current);clearTimeout(warnTimer.current);return;}
    const events=["mousemove","keydown","click","touchstart","scroll"];
    events.forEach(e=>window.addEventListener(e,resetIdleTimer,{passive:true}));
    resetIdleTimer(); // start the timer on login
    return()=>{
      events.forEach(e=>window.removeEventListener(e,resetIdleTimer));
      clearTimeout(idleTimer.current);clearTimeout(warnTimer.current);
    };
  },[user,resetIdleTimer]);

  /* ── SPLITS ─────────────────────────────────────────────────────────────── */
  const calcEqual=useCallback((spl,amt)=>{
    const on=spl.filter(s=>s.checked);const n=on.length;if(!n)return spl;
    const pct=parseFloat((100/n).toFixed(4)),remPct=parseFloat((100-pct*(n-1)).toFixed(4));
    const each=amt?parseFloat((amt/n).toFixed(2)):0,rem=amt?parseFloat((amt-each*(n-1)).toFixed(2)):0;
    let i=0;return spl.map(s=>{if(!s.checked)return{...s,percent:0,value:0};i++;const last=i===n;return{...s,percent:last?remPct:pct,value:last?rem:each};});
  },[]);
  useEffect(()=>{if(splitOn&&splits.length>0&&spMode==="equal")setSplits(prev=>calcEqual(prev,parseFloat(form.amount)||0));},[form.amount,spMode,splitOn]);

  /* ── SUBMIT EXPENSE ─────────────────────────────────────────────────────── */
  const submitExp=()=>{
    const amount=parseMoney(form.amount);
    if(!amount||amount<=0){setFormError(t("msg.amountRequired"));return;}
    if(!String(form.description||"").trim()){setFormError(t("msg.descriptionRequired"));return;}
    if(!String(form.category||"").trim()){setFormError(t("msg.categoryRequired"));return;}
    if(!String(form.date||"").trim()){setFormError(t("msg.expenseDateRequired"));return;}
    if(!form.departmentId){setFormError(t("msg.deptRequired"));return;}
      if(AUTH_URL){
      if(splitOn){setFormError("La división entre personas no está disponible con el servidor.");return;}
      const expCatAuth=cats.find(c=>c.name===form.category);
      const expApproverIdsAuth=expCatAuth?.approverIds?.length>0?expCatAuth.approverIds:adminIds;
      void (async()=>{
        const clientRef="tmp_exp_"+genUuid();
        const meta={clientRef};
        if(receipt?.b64)meta.pendingReceipt={b64:receipt.b64,mediaType:receipt.type||"image/jpeg"};
        try{
          /* Server: resolveApproverIds + computeSubmittedVotes(req.userId) — si el autor está en approvalRequired, queda approved en approvalVotesJson (mismo efecto que autoApprove local). */
          const d=await API.post("/expenses",{
            amount,
            description:form.description,category:form.category,
            date:form.date,
            notes:form.notes||undefined,status:"submitted",
            departmentId:form.departmentId,
            approvalRequired:expApproverIdsAuth,
          },meta);
          let exp=expenseFromApi(d.expense);
          if(receipt?.b64){
            try{
              await API.post("/expenses/"+encodeURIComponent(exp.id)+"/receipt",{b64:receipt.b64,mediaType:receipt.type||"image/jpeg"});
              const full=await API.get("/expenses");
              const row=(full.expenses||[]).find(x=>x.id===exp.id);
              exp=row?expenseFromApi(row):exp;
              saveExp((full.expenses||[]).map(expenseFromApi));
            }catch(e2){
              if(isOfflineQueuedError(e2)){
                saveExp([exp,...expenses]);
                try{localStorage.removeItem("sol-exp-draft");}catch(e){}
                resetForm();setPanel("detail");setDetailId(exp.id);
                appLog("info","expense_submitted",{itemCode:exp.itemCode,amount,category:form.category,userId:user.id,hasAttachment:!!receipt});
                return;
              }
              alert(e2.message||"Gasto creado; falló la subida del recibo.");
              saveExp([exp,...expenses]);
            }
          }else{
            saveExp([exp,...expenses]);
          }
          try{localStorage.removeItem("sol-exp-draft");}catch(e){}
          resetForm();setPanel("detail");setDetailId(exp.id);
          appLog("info","expense_submitted",{itemCode:exp.itemCode,amount,category:form.category,userId:user.id,hasAttachment:!!receipt});
        }catch(err){
          if(isOfflineQueuedError(err)){
            const baseTrailOff=[{action:"submitted",by:user.id,at:new Date().toISOString()}];
            const{approvals:optAppr,auditTrail:optTrail}=autoApprove(user.id,expApproverIdsAuth,{},baseTrailOff);
            const allInit=expApproverIdsAuth.length>0&&expApproverIdsAuth.every(id=>optAppr[id]==="approved");
            const optimistic=normalizeItem({
              id:clientRef,
              _apiType:"expense",
              _pendingSync:true,
              status:allInit?"approved":"submitted",
              amount,
              description:form.description,
              category:form.category,
              date:form.date,
              notes:form.notes||"",
              submittedBy:user.id,
              paidBy:[{userId:user.id,amount}],
              receipt:receipt?.b64||null,
              receiptType:receipt?.type||null,
              rejectionNote:null,
              itemCode:mkCode("EXP"),
              approvals:optAppr,
              approvalRequired:expApproverIdsAuth,
              auditTrail:optTrail,
              ivaRate:null,
              ivaAmount:null,
              comments:[],
              seenBy:[],
              receiptPath:null,
              departmentId:form.departmentId||null,
            },"expense");
            saveExp([optimistic,...expenses]);
            try{localStorage.removeItem("sol-exp-draft");}catch(e){}
            resetForm();setPanel("detail");setDetailId(clientRef);
            appLog("info","expense_submitted",{itemCode:optimistic.itemCode,amount,category:form.category,userId:user.id,hasAttachment:!!receipt,pendingSync:true});
            return;
          }
          alert(err.message||"Error al guardar el gasto.");
        }
      })();
      return;
    }
    let paidBy=[{userId:user.id,amount,pct:100}];
    let splitModeOut=undefined;
    if(splitOn&&splits.filter(s=>s.checked).length>1){
      const sel=splits.filter(s=>s.checked);
      if(sel.length<2){setFormError(t("split.minParticipants"));return;}
      if(spMode==="percentage"){
        const sumPct=sel.reduce((s,x)=>s+(Number(x.percent)||0),0);
        if(Math.abs(sumPct-100)>0.5){setFormError(t("msg.splitMustTotal100"));return;}
      }
      if(spMode==="amount"){
        const sumAmt=sel.reduce((s,x)=>s+(Number(x.value)||0),0);
        if(Math.abs(sumAmt-amount)>0.01){setFormError(t("msg.valueMustMatch")+fmt(amount));return;}
      }
      paidBy=buildPaidByFromSplitState(splits,amount,spMode);
      if(paidBy.length>1)splitModeOut=spMode;
    }
    const expCat=cats.find(c=>c.name===form.category);
    const expApproverIds=expCat?.approverIds?.length>0?expCat.approverIds:adminIds;
    const baseTrail=[{action:"submitted",by:user.id,at:new Date().toISOString()}];
    const{approvals:expApprovals,auditTrail:expTrail}=autoApprove(user.id,expApproverIds,{},baseTrail);
    const expReceiptTrail=receipt?[...expTrail,{action:"attachment_uploaded",by:user.id,at:new Date().toISOString(),meta:{type:receipt.type}}]:expTrail;
    const rp=parseFloat(form.ivaRate);
    const ivaRate=isNaN(rp)?readIvaDefault():rp;
    const ivaAmount=calcIvaParts(amount,ivaRate).iva;
    const exp={id:"e"+Date.now(),itemCode:mkCode("EXP"),amount,description:form.description,category:form.category,date:form.date,submittedBy:user.id,paidBy,...(splitModeOut?{splitMode:splitModeOut}:{}),approvals:expApprovals,receipt:receipt?.b64||null,receiptType:receipt?.type||null,notes:form.notes,auditTrail:expReceiptTrail,ivaRate,ivaAmount,comments:[],seenBy:[user.id],departmentId:form.departmentId||DEFAULT_DEPT_ID};
    appLog("info","expense_submitted",{itemCode:exp.itemCode,amount,category:form.category,userId:user.id,hasAttachment:!!receipt});
    try{localStorage.removeItem("sol-exp-draft");}catch(e){}
    saveExp([exp,...expenses]);resetForm();setPanel("detail");setDetailId(exp.id);
  };
  const removeAttachment=(expId)=>{
    if(AUTH_URL){alert("Quitar el recibo no está disponible en modo servidor. Sube uno nuevo al editar el gasto.");return;}
    const e=expenses.find(x=>x.id===expId);if(!e)return;
    const trail=[...(e.auditTrail||[]),{action:"attachment_removed",by:user.id,at:new Date().toISOString()}];
    saveExp(expenses.map(x=>x.id===expId?{...x,receipt:null,receiptType:null,auditTrail:trail}:x));
    appLog("info","attachment_removed",{itemCode:e.itemCode,userId:user.id});
  };
  const resetForm=useCallback(()=>{
    setForm({...BF,ivaRate:String(readIvaDefault())});
    setSplitOn(false);setSplits([]);setSpMode("equal");setReceipt(null);setRecPrev(null);setFormError("");
    try{localStorage.removeItem("sol-exp-draft");}catch(e){}
  },[]);
  const openNew  =()=>{resetForm();setDetailId(null);setPanel("new");setView("expenses");};

  /* deleteExp — removes expense with permission check and audit trail */
  const deleteExp=(expId)=>{
    const exp=expenses.find(e=>e.id===expId);
    if(!exp)return;
    const canDel=user.id===exp.submittedBy||isAdmin;
    if(!canDel){alert(t("action.deleteOwnOnly"));return;}
    const st=getItemStatus(exp,cats,users);
    if(st==="approved"&&!isAdmin){alert(t("action.deleteApproved"));return;}
    if(!confirm(t("action.deleteConfirm")))return;
    appLog("info","expense_deleted",{itemCode:exp.itemCode,userId:user.id,wasApproved:st==="approved"});
    if(AUTH_URL){
      if(exp._pendingSync){alert("Espera a sincronizar este gasto antes de eliminarlo.");return;}
      void (async()=>{
        try{
          await API.delete("/expenses/"+encodeURIComponent(expId));
          saveExp(expenses.filter(e=>e.id!==expId));
          setDetailId(null);setPanel(null);
        }catch(e){
          if(isOfflineQueuedError(e)){
            saveExp(expenses.filter(x=>x.id!==expId));
            setDetailId(null);setPanel(null);
            return;
          }
          alert(e.message||"No se pudo eliminar.");
        }
      })();
      return;
    }
    saveExp(expenses.filter(e=>e.id!==expId));
    setDetailId(null);setPanel(null);
  };

  /* editExp — saves edited expense, triggers re-approval if relevant fields changed */
  const editExp=(expId, updates, oldExp)=>{
    if(AUTH_URL&&oldExp._apiType==="expense"){
      if(oldExp._pendingSync){alert("Espera a sincronizar este gasto antes de editarlo.");return;}
      void (async()=>{
        try{
          const body={
            amount:updates.amount,
            description:updates.description,
            category:updates.category,
            date:updates.date,
            notes:updates.notes,
            departmentId:updates.departmentId,
          };
          if(oldExp.status==="rejected"){
            body.status="submitted";
            const rc=cats.find(c=>c.name===updates.category);
            body.approvalRequired=rc?.approverIds?.length>0?rc.approverIds:adminIds;
          }
          await API.put("/expenses/"+encodeURIComponent(expId),body);
          if(updates.receipt){
            await API.post("/expenses/"+encodeURIComponent(expId)+"/receipt",{
              b64:updates.receipt,
              mediaType:updates.receiptType||"image/jpeg",
            });
          }
          const full=await API.get("/expenses");
          saveExp((full.expenses||[]).map(expenseFromApi));
        }catch(e){
          if(isOfflineQueuedError(e)){
            saveExp(expenses.map(e=>e.id!==expId?e:{...e,...updates}));
            return;
          }
          alert(e.message||"No se pudo guardar.");
        }
      })();
      return;
    }
    const relevantChanged=REAPPROVAL_FIELDS.some(k=>{
      if(k==="paidBy") return JSON.stringify(updates.paidBy)!==JSON.stringify(oldExp.paidBy);
      if(k==="splitMode") return String(updates.splitMode??"")!==String(oldExp.splitMode??"");
      if(k==="receipt") return (updates.receipt||null)!==(oldExp.receipt||null);
      if(k==="ivaRate") return Number(updates.ivaRate??NaN)!==Number(oldExp.ivaRate??NaN);
      if(k==="ivaAmount") return Number(updates.ivaAmount??NaN)!==Number(oldExp.ivaAmount??NaN);
      if(k==="departmentId") return String(updates.departmentId||"")!==String(oldExp.departmentId||"");
      return String(updates[k]||"")!==String(oldExp[k]||"");
    });
    const wasApproved=getItemStatus(oldExp,cats,users)==="approved";
    const wasRejected=getItemStatus(oldExp,cats,users)==="rejected";
    const now=new Date().toISOString();
    let newTrail=[...(oldExp.auditTrail||[]),{action:"edited",by:user.id,at:now,
      meta:{fields:REAPPROVAL_FIELDS.filter(k=>{
        if(k==="paidBy") return JSON.stringify(updates.paidBy)!==JSON.stringify(oldExp.paidBy);
        if(k==="splitMode") return String(updates.splitMode??"")!==String(oldExp.splitMode??"");
        if(k==="receipt") return (updates.receipt||null)!==(oldExp.receipt||null);
        if(k==="ivaRate") return Number(updates.ivaRate??NaN)!==Number(oldExp.ivaRate??NaN);
        if(k==="ivaAmount") return Number(updates.ivaAmount??NaN)!==Number(oldExp.ivaAmount??NaN);
        if(k==="departmentId") return String(updates.departmentId||"")!==String(oldExp.departmentId||"");
        return String(updates[k]||"")!==String(oldExp[k]||"");
      })}}];
    let newApprovals=oldExp.approvals;
    let nextSeen=oldExp.seenBy||[];
    if(wasApproved&&relevantChanged){
      newApprovals={};
      const catRc=cats.find(c=>c.name===(updates.category||oldExp.category));
      const approverIdsRc=catRc?.approverIds?.length>0?catRc.approverIds:adminIds;
      let trailExtra=[...newTrail];
      if(approverIdsRc.includes(user.id)){
        newApprovals={[user.id]:"approved"};
        trailExtra=[...trailExtra,{action:"auto_approved",by:user.id,at:now,meta:{reason:"submitter_is_approver"}}];
      }
      newTrail=[...trailExtra,{action:"reapproval_required",by:user.id,at:now}];
      nextSeen=seenByAfterActor(user.id);
      appLog("info","expense_reapproval",{itemCode:oldExp.itemCode,userId:user.id});
    } else if(wasRejected&&relevantChanged){
      newApprovals={};
      newTrail=[...newTrail,{action:"resubmitted",by:user.id,at:now}];
      nextSeen=seenByAfterActor(user.id);
    }
    const updated={...oldExp,...updates,approvals:newApprovals,auditTrail:newTrail,seenBy:nextSeen};
    saveExp(expenses.map(e=>e.id===expId?updated:e));
    appLog("info","expense_edited",{itemCode:oldExp.itemCode,userId:user.id,relevantChanged,wasApproved});
    if(wasApproved&&relevantChanged)alert(t("expense.reapprovalDone"));
  };

  const fixResubmitExpense=(expId)=>{

            const baseTr=[{action:"submitted",by:exp.submittedBy,at:new Date().toISOString()}];
