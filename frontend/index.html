      )}
      <div style={{marginTop:9}}>
        <AttachmentViewer
          receipt={e.receipt}
          receiptType={e.receiptType}
          receiptPath={e.receiptPath}
          apiExpenseId={e._apiType==="expense"&&e.receiptPath&&!e.receipt?e.id:null}
          label={t("label.receipt")}
          t={t}
          onRemove={(user.id===e.submittedBy||approverIds.includes(user.id))&&st!=="approved"&&!AUTH_URL
            ? ()=>{void (async()=>{if(await confirmUI(t("msg.attachmentRemoved")+"?")){removeAttachment(e.id);}})();}
            : null}
        />
      </div>
      {e.notes&&<div style={{marginTop:7,padding:"6px 9px",background:"#F5F0EA",borderRadius:6,fontSize:11,color:"#4B5E52"}}>{e.notes}</div>}
      {st==="rejected"&&user.id===e.submittedBy&&(
        <div style={{marginTop:11}}>
          <button type="button" style={{width:"100%",background:T,color:"#fff",border:"none",borderRadius:8,padding:"10px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>fixResubmitExpense(e.id)}>{t("expense.fixResubmit")}</button>
          <button type="button" style={{width:"100%",marginTop:8,background:"transparent",color:G,border:`1.5px solid ${G}`,borderRadius:8,padding:"8px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}} onClick={startEdit}>{t("expense.editThenResubmit")}</button>
        </div>
      )}
      <div style={{marginTop:12}}>
        <label className="lbl" style={{marginBottom:6}}>{t("timeline.sectionTitle")}</label>
        <div>
          {buildExpenseTimelineEntries(e).map((entry,i)=>{
            const u=getU(entry.by);
            const time=expenseTimelineTimeAgo(entry.at,t);
            let actionVerb="";
            let detail=null;
            if(entry.action==="comment_added"){
              actionVerb=t("timeline.noteAdded");
              detail=entry.text;
            }else if(entry.action==="approved"){
              actionVerb=t("timeline.approved");
              if(entry.note&&String(entry.note).trim())detail=String(entry.note).trim();
            }else if(entry.action==="rejected"){
              actionVerb=t("timeline.rejected");
              if(entry.note&&String(entry.note).trim())detail=String(entry.note).trim();
            }else if(entry.action==="edited"){
              actionVerb=t("timeline.edited");
              const fl=expenseTimelineEditedFieldLabels(entry.meta,t);
              if(fl)detail=t("timeline.editedFields",{fields:fl});
            }else if(entry.action==="attachment_uploaded"){
              actionVerb=t("timeline.receiptUploaded");
              const mt=(entry.meta&&entry.meta.type)||"";
              if(mt)detail=mt.includes("pdf")?t("timeline.attachmentDetailPdf"):t("timeline.attachmentDetailImage");
            }else if(entry.action==="attachment_removed"){
              actionVerb=t("timeline.receiptRemoved");
            }else if(entry.action==="reapproval_required"){
              actionVerb=t("timeline.askedReapproval");
            }else if(entry.action==="auto_approved"){
              actionVerb=t("timeline.autoApproved");
              if(entry.meta&&entry.meta.reason==="submitter_is_approver")detail=t("audit.autoApprovedDetail");
            }else if(entry.action==="submitted"){
              actionVerb=t("timeline.submitted");
            }else if(entry.action==="resubmitted"){
              actionVerb=t("timeline.resubmitted");
            }else{
              actionVerb=t("audit."+entry.action)||entry.action;
            }
            const key=entry.id||`tl-${i}-${entry.at}-${entry.action}`;
            return(
              <div key={key} style={{display:"flex",gap:8,padding:"8px 0",borderBottom:"1px solid #F5F0EA"}}>
                <UserAvatar user={u} size={20} fontSize={6}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,color:"#6B7B72"}}>
                    <span style={{fontWeight:600,color:"#1A0E18"}}>{u.name}</span>
                    {" "}{actionVerb}{" · "}{time}
                  </div>
                  {detail&&(
                    <div style={{fontSize:12,color:"#4B5E52",marginTop:4,lineHeight:1.4}}>{detail}</div>
                  )}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <input className="inp" style={{flex:1,fontSize:12}}
            placeholder={t("expense.commentPlaceholder")}
            value={commentText}
            onChange={ev=>setCommentText(ev.target.value)}
            onKeyDown={ev=>{if(ev.key==="Enter"&&commentText.trim()){addExpenseComment(e.id,commentText);setCommentText("");}}}
          />
          <button type="button" className="btn-secondary" style={{fontSize:11,padding:"6px 12px",flexShrink:0}}
            onClick={()=>{if(commentText.trim()){addExpenseComment(e.id,commentText);setCommentText("");}}}>
            {t("expense.addNote")}
          </button>
        </div>
      </div>
      </div>
      </div>}
    </div>
  );
}

/* ── PERSON DRILLDOWN MODAL ─────────────────────────────────────────────────── */
function PersonDrilldown({userId, onClose}){
  const{t,expenses,cats,users}=useApp();
  const u=users.find(x=>x.id===userId)||{name:UNKNOWN_USER_NAME,color:"#999"};
  const userExpenses=expenses.filter(e=>
    (e.paidBy||[]).some(p=>p&&p.userId===userId)
    ||(!(e.paidBy||[]).length&&(e.submittedBy===userId||e.userId===userId))
  );
  const userInvoices=expenses.filter(e=>e.expenseType==="invoice"&&e.submittedBy===userId);
  const total=userExpenses.reduce((s,e)=>{
    const st=getItemStatus(e,cats,users);
    if(st==="deleted"||st==="rejected")return s;
    return s+shareEurInExpense(e,userId);
  },0);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(60,10,55,0.55)",zIndex:8000,
      display:"flex",alignItems:"center",justifyContent:"center",padding:16,
      fontFamily:"'DM Sans',system-ui,sans-serif"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:460,maxHeight:"85vh",
        display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(60,10,55,0.2)"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:"1px solid #EDE8E0",flexShrink:0}}>
          <UserAvatar user={u} size={34} fontSize={11}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:G}}>{t("person.drillTitle").replace("{name}",u.name)}</div>
            <div style={{fontSize:11,color:"#9CAA9F",marginTop:1}}>Total atribuido: <strong style={{color:G}}>{fmt(total)}</strong></div>
          </div>
          <button style={{border:"none",background:"none",color:"#9CAA9F",fontSize:20,cursor:"pointer",lineHeight:1}} onClick={onClose}>×</button>
        </div>
        {/* Body */}
        <div style={{overflowY:"auto",padding:"12px 16px"}}>
          {/* Expenses */}
          <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:7}}>{t("person.expenses")} ({userExpenses.length})</div>
          {userExpenses.length===0
            ?<div style={{fontSize:11,color:"#9CAA9F",marginBottom:11}}>{t("person.noExpenses")}</div>
            :<div style={{marginBottom:14}}>
              {userExpenses.map(e=>{const st=getItemStatus(e,cats,users);const sub=(users.find(x=>x.id===(e.ownerId||e.submittedBy))||{name:UNKNOWN_USER_NAME}).name;return(
                <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F5F0EA",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.expenseType==="invoice"?(e.vendor||e.description):e.description}</div>
                    <div style={{fontSize:9,color:"#9CAA9F",marginTop:1}}>{fmtDate(e.expenseType==="invoice"?(e.dueDate||e.date):e.date)} · {t("filter.submitter")}: {sub} · {e.category}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:G}}>{fmt(shareEurInExpense(e,userId))}</div>
                    <div style={{display:"inline-block",padding:"1px 5px",borderRadius:5,fontSize:8,fontWeight:600,background:ST[st].bg,color:ST[st].color,marginTop:1}}>{t("status."+st)}</div>
                  </div>
                </div>
              );})}
            </div>
          }
          <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:7}}>{t("person.invoicesSent")} ({userInvoices.length})</div>
          {userInvoices.length===0
            ?<div style={{fontSize:11,color:"#9CAA9F"}}>{t("person.noInvoices")}</div>
            :<div>
              {userInvoices.map(inv=>{const bst=getItemStatus(inv,cats,users);return(
                <div key={inv.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F5F0EA",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{inv.vendor||inv.description}</div>
                    <div style={{fontSize:9,color:"#9CAA9F",marginTop:1}}>{fmtDate(inv.dueDate||inv.date)} · {inv.category}{inv.recurring===1&&inv.recurrenceRule?` · ${recurrenceRuleLabel(inv.recurrenceRule,t)}`:""}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:G}}>{fmtExpenseAmt(inv)}</div>
                    <div style={{display:"inline-block",padding:"1px 5px",borderRadius:5,fontSize:8,fontWeight:600,background:ST[bst].bg,color:ST[bst].color,marginTop:1}}>{t("status."+bst)}</div>
                  </div>
                </div>
              );})}
            </div>
          }
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ─────────────────────────────────────────────────────────────── */
function DashboardView(){
  const{t,user,expenses,cats,users,isAdmin,myPending,
        totApproved,totFixed,perPerson,go,openNew,openNewInvoice,setView,setDetailId,setPanel,goToMyRejected,departmentsWithStats,departments}=useApp();
  const today=new Date();
  const m0=new Date(today.getFullYear(),today.getMonth(),1).toISOString().slice(0,10);
  const ym=today.toISOString().slice(0,7);
  const mBillsTotal=expenses
    .filter(e=>e.expenseType==="invoice"&&e.paymentStatus==="paid"&&(e.dueDate||e.date||"").slice(0,7)===ym)
    .reduce((s,e)=>s+eurForExpense(e),0);
  const mTotalAll=expenses.filter(e=>getItemStatus(e,cats,users)==="approved"&&e.date>=m0)
    .reduce((s,e)=>s+eurForExpense(e),0)+mBillsTotal;
  const pendAll=expenses.filter(e=>getItemStatus(e,cats,users)==="pending").length;
  const mine=expenses.filter(e=>(e.ownerId||e.submittedBy)===user.id);
  const mTotalMine=mine.filter(e=>getItemStatus(e,cats,users)==="approved"&&e.date>=m0).reduce((s,e)=>s+eurForExpense(e),0);
  const pendMine=mine.filter(e=>getItemStatus(e,cats,users)==="pending").length;
  const totApprovedMine=mine.filter(e=>getItemStatus(e,cats,users)==="approved").reduce((s,e)=>s+eurForExpense(e),0);
  const mTotal=mTotalAll;
  const pend=isAdmin?pendAll:pendMine;
  const dashTotApproved=totApproved;
  const myActivityGastosMonth=expenses.filter(e=>e.submittedBy===user.id&&e.expenseType!=="invoice"&&e.date?.slice(0,7)===ym);
  const myActivityFacturasMonth=expenses.filter(e=>e.submittedBy===user.id&&e.expenseType==="invoice"&&(e.dueDate||e.date||"").slice(0,7)===ym);
  const apprMine=[...myActivityGastosMonth.filter(e=>getItemStatus(e,cats,users)==="approved"),...myActivityFacturasMonth.filter(b=>getItemStatus(b,cats,users)==="approved")];
  const apprSum=apprMine.reduce((s,e)=>s+eurForExpense(e),0);
  const apprCnt=apprMine.length;
  const pendList=[...myActivityGastosMonth.filter(e=>getItemStatus(e,cats,users)==="pending"),...myActivityFacturasMonth.filter(b=>getItemStatus(b,cats,users)==="pending")];
  const pendSum=pendList.reduce((s,e)=>s+eurForExpense(e),0);
  const pendCnt=pendList.length;
  const rejList=[...myActivityGastosMonth.filter(e=>getItemStatus(e,cats,users)==="rejected"),...myActivityFacturasMonth.filter(b=>getItemStatus(b,cats,users)==="rejected")];
  const rejSum=rejList.reduce((s,e)=>s+eurForExpense(e),0);
  const rejCnt=rejList.length;
  const watchCats=cats.filter(c=>!c.archived&&c.budget!=null&&c.budget>0&&effectiveExpenseApproverIds({category:c.name},cats,users)[0]===user.id);
  const [drillPerson,setDrillPerson]=useState(null);
  const [fixedTipOpen,setFixedTipOpen]=useState(false);
  const [fixedTipHover,setFixedTipHover]=useState(false);
  const [fixedTipPos,setFixedTipPos]=useState({top:0,left:0});
  const fixedTipIconRef=useRef(null);
  const fixedTipRef=useRef(null);
  const deptBudgetActive=(departmentsWithStats||[]).filter(d=>!d.archived&&Number(d.budget)>0);
  const budgetTotalActive=deptBudgetActive.reduce((s,d)=>s+Number(d.budget||0),0);
  const spentActive=deptBudgetActive.reduce((s,d)=>s+Number(d.spent||0),0);
  const budgetRemainingTotal=budgetTotalActive-spentActive;
  const budgetProgressPct=budgetTotalActive>0 ? (spentActive/budgetTotalActive)*100 : 0;
  const upcoming15=[];
  expenses.filter(e=>e.expenseType==="invoice"&&e.paymentStatus==="unpaid"&&e.dueDate).forEach(e=>{
    const diff=daysUntilISO(String(e.dueDate).slice(0,10));
    if(diff!=null&&diff>=0&&diff<=15)upcoming15.push({...e,name:e.vendor||e.description,daysUntil:diff});
  });
  upcoming15.sort((a,b)=>a.daysUntil-b.daysUntil);
  const fixedTipActive=fixedTipOpen||fixedTipHover;
  const monthSpendByDept=React.useMemo(()=>{
    const now = new Date();
    const ym = now.getFullYear()+"-"+String(now.getMonth()+1).padStart(2,"0");
    const spendByDept = {};
    (expenses||[]).forEach(e => {
      if(e.status==="approved" && e.expenseType!=="invoice" && e.date && e.date.startsWith(ym) && e.departmentId){
        spendByDept[e.departmentId] = (spendByDept[e.departmentId]||0) + (Number(e.amount)||0);
      }
    });
    return spendByDept;
  },[expenses]);
  const alerts=React.useMemo(()=>{
    return (departments||[]).filter(d => {
      if(!d.budget || Number(d.budget) <= 0 || d.archived) return false;
      const spent = monthSpendByDept[d.id] || 0;
      return spent >= Number(d.budget) * 0.70;
    }).map(d => {
      const spent = monthSpendByDept[d.id] || 0;
      const pct = Math.round((spent / Number(d.budget)) * 100);
      return { ...d, spent, pct };
    }).sort((a,b) => b.pct - a.pct);
  },[departments,monthSpendByDept]);
  useEffect(()=>{
    if(!fixedTipActive||!fixedTipIconRef.current)return;
    const r=fixedTipIconRef.current.getBoundingClientRect();
    setFixedTipPos({top:r.top-8,left:r.left+r.width/2});
  },[fixedTipActive]);
  useEffect(()=>{
    if(!fixedTipActive)return;
    const onDocClick=e=>{
      const n=e.target;
      if(fixedTipIconRef.current&&fixedTipIconRef.current.contains(n))return;
      if(fixedTipRef.current&&fixedTipRef.current.contains(n))return;
      setFixedTipOpen(false);
      setFixedTipHover(false);
    };
    document.addEventListener("click",onDocClick);
    return()=>document.removeEventListener("click",onDocClick);
  },[fixedTipActive]);
  return(
    <div>
      {drillPerson&&<PersonDrilldown userId={drillPerson} onClose={()=>setDrillPerson(null)}/>}
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G,marginBottom:3}}>{t("nav.dashboard")}</h1>
      <p style={{fontSize:13,color:"#6B7B72",marginBottom:16}}>{t("dash.welcome")}, {user.name.split(" ")[0]}</p>
      {myPending.length>0&&(
        <div style={{background:"#F5E8F4",border:"1px solid #D4AED0",borderRadius:11,padding:"10px 13px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:9,flexWrap:"wrap"}}>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#5C1057"}}>{myPending.length} pendiente(s) de tu aprobación</div>
          </div>
          <button className="btn-sm" style={{fontSize:12}} onClick={()=>go("approvals")}>{t("dash.review")}</button>
        </div>
      )}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:16}}>
        {[{bg:G,label:t("dash.addExpense"),sub:t("dash.logCost"),fn:openNew},{bg:T,label:t("dash.newInvoice"),sub:t("dash.newInvoiceSub"),fn:openNewInvoice}].map((a,i)=>(
          <div key={i} style={{background:a.bg,borderRadius:11,padding:"12px 13px",cursor:"pointer"}} onClick={a.fn}
            onMouseEnter={e=>e.currentTarget.style.opacity="0.88"} onMouseLeave={e=>e.currentTarget.style.opacity="1"}>
            <div style={{fontSize:16,color:"rgba(250,247,242,0.4)",lineHeight:1,marginBottom:3}}>+</div>
            <div style={{fontWeight:700,fontSize:13,color:"#FAF7F2"}}>{a.label}</div>
            <div style={{fontSize:11,color:"rgba(250,247,242,0.4)",marginTop:1}}>{a.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
        {(() => {
          const monthLong=today.toLocaleString("es-ES",{month:"long"});
          const monthLabel="Gasto en "+monthLong.charAt(0).toUpperCase()+monthLong.slice(1);

          const totalKpiLabel="Total gastado";
          const budgetKpiLabel="Presupuesto disponible";
          const fixedKpiLabel=(
            <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
              <span>Coste fijo mensual</span>
              <span style={{display:"inline-flex",alignItems:"center"}}>
                <span
                  ref={fixedTipIconRef}
                  style={{fontSize:11,color:"#9CAA9F",lineHeight:1,cursor:"pointer"}}
                  onMouseEnter={()=>setFixedTipHover(true)}
                  onMouseLeave={()=>setFixedTipHover(false)}
                  onClick={e=>{e.stopPropagation();setFixedTipOpen(v=>!v);}}

            </span>

          const budgetKpiBg=budgetRemainingTotal<0 ? "#FEF2F2" : "#BBF7D0";
          const budgetKpiText=budgetRemainingTotal<0 ? "#991B1B" : "#064E3B";
          const monthKpiBg="#FDE68A";
          const monthKpiText="#92400E";
          const fixedKpiBg="#F5F0EA";

              {renderKpiCard("k-total",totalKpiLabel,dashTotApproved,totalKpiBg,totalKpiText,totalSub,"#DC2626",true,28,"#7F1D1D","#991B1B","#FCA5A5",`${budgetProgressPct.toFixed(1)}% usado`,"#7F1D1D")}
              {renderKpiCard("k-budget",budgetKpiLabel,budgetRemainingTotal,budgetKpiBg,budgetKpiText,budgetSub,"#059669",true,28,"#064E3B","#065F46","#6EE7B7",`${budgetProgressPct.toFixed(1)}% disponible`,"#064E3B")}
              {renderKpiCard("k-month",monthLabel,mTotal,monthKpiBg,monthKpiText,monthSub,null,false,22,"#78350F","#78350F")}
              <div style={{cursor:"pointer"}} onClick={()=>{setView("expenses");}}>
                {renderKpiCard("k-fixed",fixedKpiLabel,totFixed,fixedKpiBg,fixedKpiText,fixedSub,null,false)}
              </div>
            </>
          );
        })()}
      </div>
      {alerts.length>0&&(
        <div className="card" style={{marginBottom:14}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>Alertas de presupuesto</div>
          <div style={{display:"grid",gap:8}}>
            {alerts.map(a=>{
              const tone=a.pct>=100
                ? {bg:"#FEE2E2",border:"#DC2626"}
                : a.pct>=90
                  ? {bg:"#FFF7ED",border:"#F97316"}
                  : {bg:"#FFFBEB",border:"#F59E0B"};
              return(
                <div key={a.id} style={{background:tone.bg,borderLeft:`3px solid ${tone.border}`,borderRadius:8,padding:"8px 10px"}}>
                  <div style={{fontWeight:700,fontSize:12,marginBottom:2}}>{a.name||"—"}</div>
                  <div style={{fontSize:11,color:"#6B7B72"}}>
                    {a.pct}% del presupuesto mensual · {fmt(a.spent)} de {fmt(Number(a.budget)||0)}
                  </div>
                  <div style={{height:4,background:"rgba(0,0,0,0.08)",borderRadius:2,marginTop:6}}>
                    <div style={{height:"100%",width:`${Math.min(100,Math.max(0,a.pct))}%`,background:tone.border,borderRadius:2}}/>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{t("dash.activityTitle")}</div>
        <div style={{display:"flex",justifyContent:"space-between",gap:8,textAlign:"center"}}>
          {[{lbl:t("dash.approvedShort"),cnt:apprCnt,sum:apprSum,st:"approved"},{lbl:t("dash.pendingShort"),cnt:pendCnt,sum:pendSum,st:"pending"},{lbl:t("dash.rejectedShort"),cnt:rejCnt,sum:rejSum,st:"rejected"}].map(col=>(
            <div key={col.st} style={{flex:1}}>
              <div style={{display:"inline-block",padding:"2px 8px",borderRadius:11,fontSize:10,fontWeight:700,marginBottom:6,background:ACTIVITY_COLORS[col.st].bg,color:ACTIVITY_COLORS[col.st].color}}>{col.lbl}</div>
              <div style={{fontWeight:800,fontSize:16,color:ACTIVITY_COLORS[col.st].color}}>{col.cnt}</div>
              <div style={{fontSize:11,color:"#9CAA9F"}}>{col.cnt===0?fmt(0):fmt(col.sum)}</div>
            </div>
          ))}
        </div>
        {rejCnt>0&&<button type="button" style={{width:"100%",marginTop:10,background:"none",border:"none",color:T,fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",textAlign:"left"}} onClick={goToMyRejected}>{t("dash.fixRejectedLink").replace("{n}",String(rejCnt))}</button>}
      </div>
      <DepartmentBudgetBars t={t} rows={departmentsWithStats} title={t("dash.deptBudgetsTitle")}/>
      {watchCats.length>0&&(
        <div className="card" style={{marginBottom:11}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:8}}>{t("dash.budgetStatus")}</div>
          {watchCats.map(c=>{
            const spent=expenses.filter(e=>e.category===c.name&&getItemStatus(e,cats,users)==="approved"&&e.date?.slice(0,7)===ym).reduce((s,e)=>s+eurForExpense(e),0);
            const pct=c.budget>0?spent/c.budget*100:0;
            const barColor=pct<75?"#16A34A":pct<=100?"#D97706":"#DC2626";
            return(
              <div key={c.id} style={{marginBottom:8}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11}}><span>{c.name}</span><span style={{fontWeight:600}}>{fmt(spent)} / {fmt(c.budget)}</span></div>
                <div style={{height:4,background:"#EDE8E0",borderRadius:2,marginTop:4}}><div style={{height:"100%",width:`${Math.min(100,pct)}%`,background:barColor,transition:"width 0.4s",borderRadius:2}}/></div>
              </div>
            );
          })}
        </div>
      )}
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:9}}>{t("dash.investByPerson")}</div>
        {perPerson.map(u=>(
          <div key={u.id} className="row-hover" style={{display:"flex",alignItems:"center",gap:8,marginBottom:7,cursor:"pointer",borderRadius:7,padding:"3px 4px",margin:"0 -4px 7px"}} onClick={()=>setDrillPerson(u.id)}>
            <UserAvatar user={u} size={24} fontSize={7}/>
            <div style={{flex:1}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:2,fontSize:11}}><span style={{fontWeight:500}}>{u.name}</span><span style={{fontWeight:700,color:G}}>{fmt(u.total)}</span></div><div style={{height:3,background:"#EDE8E0",borderRadius:2}}><div style={{height:"100%",borderRadius:2,background:u.color,width:totApproved>0?`${Math.min(100,u.total/totApproved*100)}%`:"0%",transition:"width 0.4s"}}/></div></div>
            <div style={{fontSize:9,color:"#9CAA9F"}}>›</div>
          </div>
        ))}
      </div>
      {/* Upcoming invoices · 15 days */}
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:9}}>{t("dash.upcomingBills")}</div>
        {upcoming15.length===0
          ?<div style={{fontSize:11,color:"#9CAA9F",padding:"4px 0"}}>{t("dash.noBillsSoon")}</div>
          :upcoming15.map((b,i)=>{
            const dueTxt=b.daysUntil===0?t("dash.dueToday"):b.daysUntil===1?t("dash.dueTomorrow"):t("dash.dueIn").replace("{n}",String(b.daysUntil));
            const dueS=String(b.dueDate||"").slice(0,10);
            const dayBox=dueS.length>=10?parseInt(dueS.slice(8,10),10):"—";
            return(
              <div key={b.id+"-"+i} style={{display:"flex",alignItems:"center",padding:"6px 0",borderBottom:i<upcoming15.length-1?"1px solid #F5F0EA":"none",gap:9}}>
                <div style={{width:32,height:32,borderRadius:6,background:G,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#FAF7F2",lineHeight:1}}>{dayBox}</div>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:11,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.name}</div>
                <div style={{fontSize:11,color:b.daysUntil<=3?"#C4622D":"#9CAA9F",marginTop:1,fontWeight:b.daysUntil<=3?600:400}}>{dueTxt}</div>
                </div>
                <div style={{fontWeight:700,color:G,fontSize:12,fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmtExpenseAmt(b)}</div>
              </div>
            );
          })
        }
      </div>

      <div className="card">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}><div style={{fontWeight:600,fontSize:13}}>{isAdmin?t("dash.recentAll"):t("dash.recentMine")}</div><button style={{background:"none",border:"none",color:T,fontSize:11,fontWeight:500,cursor:"pointer"}} onClick={()=>go("expenses")}>{t("action.viewAll")}</button></div>
        {(()=>{
          const pool=expenses.slice();
          const sorted=[...pool].sort((a,b)=>String(b.date).localeCompare(String(a.date))).slice(0,5);
          if(sorted.length===0)return<div style={{fontSize:12,color:"#9CAA9F"}}>{isAdmin?"Sin datos":t("dash.recentEmpty")}</div>;
          return sorted.map((e,i)=>{const st=getItemStatus(e,cats,users);const desc=e.description||"";const short=desc.length>40?desc.slice(0,40)+"…":desc;const ac=ACTIVITY_COLORS[st]||ACTIVITY_COLORS.pending;const sub=(users.find(x=>x.id===(e.ownerId||e.submittedBy))||{name:UNKNOWN_USER_NAME}).name;return(
            <div key={e.id} className="row-hover" style={{display:"flex",alignItems:"flex-start",padding:"7px 3px",borderBottom:i<sorted.length-1?"1px solid #F5F0EA":"none",cursor:"pointer"}} onClick={()=>{go("expenses");setTimeout(()=>{setDetailId(e.id);setPanel("detail");},50);}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <div style={{fontSize:12,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1,minWidth:0}}>{short}</div>
                  {(e.paidBy||[]).length>1&&<span style={{display:"inline-flex",alignItems:"center",gap:2,fontSize:10,fontWeight:700,color:"#4B5E52",background:"#EDE8E0",padding:"1px 5px",borderRadius:6,flexShrink:0,fontVariantNumeric:"tabular-nums"}} aria-hidden="true">👥 {(e.paidBy||[]).length}</span>}
                </div>
                <div style={{fontSize:11,color:"#9CAA9F",marginTop:1}}>{fmtDate(e.date)} · {t("filter.submitter")}: {sub} · {e.category}</div>
              </div>
              <div style={{marginLeft:9,textAlign:"right",flexShrink:0,display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <div style={{fontSize:12,fontWeight:700,color:G}}>{fmt(eurForExpense(e))}</div>
                <span style={{padding:"1px 6px",borderRadius:11,fontSize:8,fontWeight:700,background:ac.bg,color:ac.color}}>{t("status."+st)}</span>
              </div>
            </div>
          );});
        })()}
      </div>
    </div>
  );
}

/* ── EXPENSES VIEW ─────────────────────────────────────────────────────────── */
function ExpensesView(){
  const{t,expenses,cats,users,byStatus,filtered,expFlt,setExpFlt,expSrc,setExpSrc,
        catFlt,setCatFlt,submFlt,setSubmFlt,dateFrom,setDateFrom,dateTo,setDateTo,activeFilterCount,
        detailId,setDetailId,panel,setPanel,openNew,resetForm,isAdmin,user,aNote,setANote,approve,clearMyExpenseFilter,totApproved,
        expKindFlt,setExpKindFlt,markExpensePaid}=useApp();
  const [payOpenId,setPayOpenId]=useState(null);
  const [payDate,setPayDate]=useState(()=>new Date().toISOString().slice(0,10));
  const pendingTotal=expenses.filter(e=>getItemStatus(e,cats)==="pending").reduce((s,e)=>s+eurForExpense(e),0);
  const naturalFrom = expenses.length
    ? expenses.reduce((min, e) => e.date < min ? e.date : min, expenses[0].date)
    : "";
  const naturalTo = expenses.length
    ? expenses.reduce((max, e) => e.date > max ? e.date : max, expenses[0].date)
    : "";

  const [pendingFrom, setPendingFrom] = React.useState(naturalFrom);
  const [pendingTo,   setPendingTo]   = React.useState(naturalTo);

  const isDefaultRange = pendingFrom === naturalFrom && pendingTo === naturalTo;
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G}}>{t("nav.expenses")}</h1>
        <button className="btn-primary" style={{fontSize:13,padding:"7px 14px"}} onClick={openNew}>{t("action.newExpense")}</button>
      </div>
      <div style={{fontSize:12,color:"#6B7B72",marginBottom:11,background:"#F5F0EA",borderRadius:7,padding:"7px 11px"}}>
        {t("page.expensesDefBody")}
      </div>
      {/* ── Status pills */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:7}}>
        {["all","pending","approved","rejected"].map(f=>(
          <button key={f} style={{padding:"3px 10px",borderRadius:18,fontSize:11,fontWeight:500,border:"1.5px solid",borderColor:expFlt===f?G:"#DDD6CC",background:expFlt===f?G:"#fff",color:expFlt===f?"#fff":"#4B5E52",cursor:"pointer"}} onClick={()=>setExpFlt(f)}>
            {t("filter."+f)} ({byStatus[f]?.length||0})
          </button>
        ))}
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:7}}>
        <span style={{fontSize:11,color:"#4B5E52",fontWeight:600,whiteSpace:"nowrap"}}>Todos · Gastos · Facturas</span>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {[
            ["all",t("expenses.filterAll")],
            ["expense",t("expenses.filterExpenses")],
            ["invoice",t("expenses.filterInvoices")],
          ].map(([k,lb])=>{
            const active=expKindFlt===k;
            const fill=k==="invoice"&&active?"#C4622D":active?"#3C0A37":"#fff";
            const border=active?(k==="invoice"?"#C4622D":"#3C0A37"):"#DDD6CC";
            const color=active?"#fff":"#4B5E52";
            return(
              <button key={k} type="button" style={{padding:"3px 12px",borderRadius:18,fontSize:11,fontWeight:600,border:`1.5px solid ${border}`,background:fill,color,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setExpKindFlt(k)}>
                {lb}
              </button>
            );
          })}
        </div>
      </div>
      {/* ── Search + extended filters */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:9}}>
        <input className="inp" style={{flex:1,minWidth:140,maxWidth:220,padding:"5px 9px",fontSize:12}}
          placeholder={t("filter.codeSearch")} value={expSrc}
          onChange={e=>setExpSrc(e.target.value)}/>
        <select className="inp" style={{padding:"5px 8px",fontSize:11,width:"auto",minWidth:110,cursor:"pointer"}}
          value={catFlt} onChange={e=>setCatFlt(e.target.value)}>
          <option value="">{t("filter.category")}: {t("filter.all")}</option>
          {cats.filter(c=>!c.archived).map(c=><option key={c.id} value={c.name}>{tCat(c.name,t)}</option>)}
        </select>
        <select className="inp" style={{padding:"5px 8px",fontSize:11,width:"auto",minWidth:120,cursor:"pointer"}}
          value={submFlt} onChange={e=>setSubmFlt(e.target.value)}>
          <option value="">{t("filter.submitter")}: {t("filter.all")}</option>
          {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
        </select>
        <div style={{display:"flex",alignItems:"center",border:"1.5px solid",
          borderColor:isDefaultRange?"#DDD6CC":"#3C0A37",borderRadius:7,
          overflow:"hidden",background:"#FAFAF9",height:32,flexShrink:0}}>
          <div style={{display:"flex",alignItems:"center",gap:4,padding:"0 10px",
            borderRight:"1px solid #EDE8E0"}}>
            <span style={{fontSize:9,color:"#9CAA9F",fontWeight:500,
              textTransform:"uppercase",letterSpacing:"0.05em"}}>Desde</span>
            <input type="date" style={{border:"none",background:"transparent",
              fontSize:12,color:"#3C0A37",outline:"none",cursor:"pointer",
              fontFamily:"inherit",width:110}}
              value={pendingFrom}
              onChange={e => setPendingFrom(e.target.value)}/>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:4,padding:"0 10px"}}>
            <span style={{fontSize:9,color:"#9CAA9F",fontWeight:500,
              textTransform:"uppercase",letterSpacing:"0.05em"}}>Hasta</span>
            <input type="date" style={{border:"none",background:"transparent",
              fontSize:12,color:"#3C0A37",outline:"none",cursor:"pointer",
              fontFamily:"inherit",width:110}}
              value={pendingTo}
              onChange={e => setPendingTo(e.target.value)}/>
          </div>
        </div>
        <button
          disabled={isDefaultRange && !catFlt && !submFlt && !expSrc}
          style={{padding:"5px 14px",borderRadius:7,fontSize:12,fontWeight:600,
            border:"none",cursor:isDefaultRange?"default":"pointer",
            background:isDefaultRange?"#EDE8E0":"#3C0A37",
            color:isDefaultRange?"#9CAA9F":"#fff",
            fontFamily:"inherit",height:32,display:"flex",alignItems:"center",gap:6}}
          onClick={()=>{
            setDateFrom(isDefaultRange ? "" : pendingFrom);
            setDateTo(isDefaultRange ? "" : pendingTo);
          }}>
          Aplicar
          {!isDefaultRange && (
            <span style={{background:"rgba(255,255,255,0.25)",borderRadius:8,
              fontSize:10,padding:"1px 5px",fontWeight:700}}>
              {[catFlt,submFlt,!isDefaultRange?"range":"",expSrc].filter(Boolean).length}
            </span>
          )}
        </button>
        {activeFilterCount>0&&(
          <button style={{padding:"4px 10px",borderRadius:18,fontSize:11,fontWeight:600,border:"1.5px solid "+G,background:"transparent",color:G,cursor:"pointer"}}
            onClick={()=>{
              try{
                ["sol-flt-status","sol-flt-cat","sol-flt-subm","sol-flt-from","sol-flt-to","sol-flt-kind"].forEach(k=>sessionStorage.removeItem(k));
              }catch(e){}
              setExpFlt("all");
              setCatFlt("");
              setSubmFlt("");
              setDateFrom("");
              setDateTo("");
              setExpSrc("");
              setExpKindFlt("all");
              setPendingFrom(naturalFrom);
              setPendingTo(naturalTo);
            }}>
            {t("filter.clearFilters")} ({activeFilterCount + (expSrc?1:0)})
          </button>
        )}
      </div>
      <div className="card" style={{padding:0,overflow:"hidden"}}>
        {filtered.length===0&&<div style={{padding:24,textAlign:"center",color:"#9CAA9F",fontSize:12}}>{t("empty.expenses")}</div>}
        {filtered.map((e,idx)=>{
          const st=getItemStatus(e,cats,users),sel=detailId===e.id&&panel==="detail";
          const approverIds=effectiveExpenseApproverIds(e,cats,users);
          const submitterName=(users.find(u=>u.id===e.submittedBy)||{name:UNKNOWN_USER_NAME}).name;
          const isInvRow=e.expenseType==="invoice";
          const ps=e.paymentStatus||"na";
          let payBadge=null;
          if(isInvRow&&st==="approved")payBadge=invoicePaymentBadgeStyle(e.paymentStatus);
          const rowTitle=isInvRow?(e.vendor||e.description):e.description;
          const metaDate=isInvRow&&e.dueDate?`${t("expenses.vence")} ${fmtDate(e.dueDate)} · `:fmtDate(e.date)+" · ";
          return(
            <div key={e.id}>
              <div className="row-hover" style={{padding:"9px 13px",borderBottom:(payOpenId===e.id||idx<filtered.length-1)?"1px solid #F5F0EA":"none",cursor:"pointer",background:sel?"#F5F0EA":"#FFFFFF",display:"flex",alignItems:"flex-start",gap:8}}
                onClick={()=>{setDetailId(e.id);setPanel("detail");resetForm();}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                    <span style={{fontSize:12,fontWeight:600}}>{rowTitle}</span>
                    {isInvRow&&(
                      <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10,textTransform:"uppercase",letterSpacing:"0.05em",background:"#C4622D",color:"#fff",flexShrink:0,display:"inline-block"}}>FACTURA</span>
                    )}
                    {!isInvRow&&expKindFlt!=="invoice"&&(
                      <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:10,textTransform:"uppercase",letterSpacing:"0.05em",background:"#3C0A37",color:"#fff",flexShrink:0,display:"inline-block"}}>GASTO</span>
                    )}
                    <span style={{padding:"1px 5px",borderRadius:7,fontSize:9,fontWeight:600,background:ST[st].bg,color:ST[st].color,flexShrink:0}}>{t("status."+st)}</span>
                    {payBadge&&<span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:10,display:"inline-block",background:payBadge.bg,color:payBadge.color,flexShrink:0}}>{payBadge.text}</span>}
                    {(e.paidBy||[]).length>1&&<span title={t("label.splitBadge")} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"1px 6px",borderRadius:7,fontSize:9,fontWeight:700,background:"#EDE8E0",color:"#4B5E52",flexShrink:0,fontVariantNumeric:"tabular-nums"}} aria-label={`${t("label.splitBadge")}: ${(e.paidBy||[]).length}`}><span aria-hidden="true">👥</span><span>{(e.paidBy||[]).length}</span></span>}
                  </div>
                  <div style={{fontSize:10,color:"#9CAA9F",marginTop:2}}>
                    {metaDate}{t("filter.submitter")}: {submitterName} · {e.category}
                  </div>
                  {st==="pending"&&<div style={{display:"flex",gap:6,marginTop:2,flexWrap:"wrap"}}>{approverIds.map(aid=>{const a=approvalVoteFor(e.approvals,aid,users);return<span key={aid} style={{fontSize:9,display:"flex",alignItems:"center",gap:2}}><span style={{width:4,height:4,borderRadius:"50%",background:a==="approved"?"#16A34A":a==="rejected"?"#DC2626":"#D97706",display:"inline-block"}}/><span style={{color:a==="approved"?"#166534":a==="rejected"?"#991B1B":"#92400E"}}>{(users.find(u=>u.id===aid)||{name:UNKNOWN_USER_NAME}).name}</span></span>})}</div>}
                </div>
                <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:5,flexShrink:0}}>
                  <div style={{display:"flex",alignItems:"center",gap:5}}>
                    {(e.comments||[]).length>0&&<span style={{minWidth:15,minHeight:15,borderRadius:"50%",background:BL,color:"#fff",fontSize:8,fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}} aria-hidden="true">{(e.comments||[]).length}</span>}
                    {(e.receiptPath||(e.receipt&&!e._apiType))&&(
                      <span style={{
                        fontSize:8,fontWeight:700,padding:"1px 5px",borderRadius:4,
                        background:"#EDE8E0",color:"#4B5E52",flexShrink:0
                      }} title="Tiene adjunto">
                        {(e.receiptType||e.receiptPath||"").includes("pdf")?"PDF":"IMG"}
                      </span>
                    )}
                    <div style={{fontSize:13,fontWeight:700,color:G,fontVariantNumeric:"tabular-nums"}}>{fmtExpenseAmt(e)}</div>
                  </div>
                  {AUTH_URL&&isInvRow&&ps!=="paid"&&(
                    <button type="button" className="btn-sm" style={{fontSize:10,padding:"3px 8px",fontWeight:600}}
                      onClick={ev=>{
                        ev.stopPropagation();
                        setPayDate(new Date().toISOString().slice(0,10));
                        setPayOpenId(payOpenId===e.id?null:e.id);
                      }}>{t("expenses.markPaid")}</button>
                  )}
                </div>
              </div>
              {payOpenId===e.id&&(
                <div style={{padding:"8px 13px",background:"#FFFBEB",borderBottom:idx<filtered.length-1?"1px solid #F5F0EA":"none",display:"flex",flexWrap:"wrap",alignItems:"center",gap:8,fontSize:11}}
                  onClick={ev=>ev.stopPropagation()}>
                  <span style={{color:"#78350F"}}>{t("expenses.confirmMarkPaid")}</span>
                  <label style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#6B7B72"}}>{t("expenses.paidDateLabel")}</span>
                    <input className="inp" type="date" style={{padding:"4px 8px",fontSize:11,width:"auto"}} value={payDate} onChange={ev=>setPayDate(ev.target.value)}/>
                  </label>
                  <button type="button" className="btn-primary" style={{fontSize:11,padding:"5px 12px"}} onClick={()=>{markExpensePaid(e.id,payDate);setPayOpenId(null);}}>{t("action.confirm")}</button>
                  <button type="button" className="btn-secondary" style={{fontSize:11,padding:"5px 12px"}} onClick={()=>setPayOpenId(null)}>{t("action.cancel")}</button>
                </div>
              )}
            </div>
          );
        })}
      </div>
      {panel==="detail"&&detailId&&<div className="mob-only" style={{marginTop:11,background:"#fff",borderRadius:11,padding:14}}><DetailPanel/></div>}
    </div>
  );
}

/* ── RECEIPT THUMB (admin queue) ─────────────────────────────────────────── */
function ReceiptThumb({expenseId}){
  const [url,setUrl]=useState(null);
  useEffect(()=>{
    const path="/expenses/"+encodeURIComponent(expenseId)+"/receipt";
    if(!expenseId||!AUTH_URL)return;
    let dead=false;
    (async()=>{
      try{
        const blob=await API.fetchBinary(path);
        if(dead)return;
        if(blob.type&&blob.type.includes("pdf")){
          setUrl("__pdf__");
          return;
        }
        setUrl(URL.createObjectURL(blob));
      }catch(e){}
    })();
    return()=>{
      dead=true;
      setUrl(u=>{if(u)URL.revokeObjectURL(u);return null;});
    };
  },[expenseId]);
  if(url==="__pdf__") return(
    <div style={{width:52,height:52,borderRadius:8,background:"#F5E8F4",flexShrink:0,
      display:"flex",alignItems:"center",justifyContent:"center",
      fontSize:9,fontWeight:700,color:"#5C1057"}}>PDF</div>
  );
  if(!url)return<div style={{width:52,height:52,borderRadius:8,background:"#EDE8E0",flexShrink:0}} title="Recibo"/>;
  return<img src={url} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:8,flexShrink:0}}/>;
}

/* ── APPROVALS ─────────────────────────────────────────────────────────────── */
function ApprovalsView(){
  const{t,expenses,cats,users,departments,isAdmin,isApprover,user,aNote,setANote,approve,go,setView,setDetailId,setPanel}=useApp();
  const [expandedId,setExpandedId]=useState(null);
  const [typeFilter,setTypeFilter]=useState("all");
  const getU=id=>users.find(u=>u.id===id)||{name:UNKNOWN_USER_NAME,color:"#999"};
  const priorityForItem=(item)=>{
    const ids=effectiveExpenseApproverIds(item,cats,users);
    const myVote=approvalVoteFor(item.approvals||{},user.id,users);
    const st=getItemStatus(item,cats,users);
    if(st==="approved")return 3;
    if(myVote==="approved")return 2;
    const others=ids.filter(id=>id!==user.id);
    const othersApproved=others.length>0&&others.every(id=>approvalVoteFor(item.approvals||{},id,users)==="approved");
    if(othersApproved)return 0;
    return 1;
  };
  const sortByPriority=(list)=>[...list].sort((a,b)=>{
    const pa=priorityForItem(a),pb=priorityForItem(b);
    if(pa!==pb)return pa-pb;
    const da=String(a.date||a.dueDate||"");
    const db=String(b.date||b.dueDate||"");
    return db.localeCompare(da);
  });
  const baseList=isApprover
    ? expenses.filter(e=>effectiveExpenseApproverIds(e,cats,users).includes(user.id))
    : expenses;
  const kindFiltered=baseList.filter(e=>{
    if(typeFilter==="all")return true;
    if(typeFilter==="expense")return e.expenseType!=="invoice";
    return e.expenseType==="invoice";
  });
  const activeRows=sortByPriority(kindFiltered);
  const cAll=baseList.length;
  const cExp=baseList.filter(e=>e.expenseType!=="invoice").length;
  const cInv=baseList.filter(e=>e.expenseType==="invoice").length;
  return(
    <div>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G,marginBottom:3}}>{t("nav.approvals")}</h1>
      <p style={{fontSize:13,color:"#6B7B72",marginBottom:14}}>{AUTH_URL?"Gastos enviados al servidor pendientes de decisión.":t("dash.bothMustApprove")}</p>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
          {[
            ["all",t("expenses.filterAll"),cAll],
            ["expense",t("expenses.filterExpenses"),cExp],
            ["invoice",t("expenses.filterInvoices"),cInv],
          ].map(([k,lb,cnt])=>{
            const active=typeFilter===k;
            const fill=k==="invoice"&&active?"#C4622D":active?"#3C0A37":"#fff";
            const border=active?(k==="invoice"?"#C4622D":"#3C0A37"):"#DDD6CC";
            const color=active?"#fff":"#4B5E52";
            return(
              <button key={k} type="button" style={{padding:"3px 12px",borderRadius:18,fontSize:11,fontWeight:600,border:`1.5px solid ${border}`,background:fill,color,cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setTypeFilter(k)}>
                {lb} ({cnt})
              </button>
            );
          })}
        </div>
      </div>
      {activeRows.length===0?<div className="card" style={{textAlign:"center",padding:36,color:"#9CAA9F",fontSize:13}}>{baseList.length===0?t("empty.approvals"):t("empty.approvalsFilter")}</div>:
        activeRows.map(item=>{
          const isInv=item.expenseType==="invoice";
          const itemId=item.id;
          const rowApproverIds=effectiveExpenseApproverIds(item,cats,users);
          const submitterName=(users.find(u=>u.id===item.submittedBy)||{name:UNKNOWN_USER_NAME}).name;
          const ownerName=(users.find(u=>u.id===(item.ownerId||item.submittedBy))||{name:UNKNOWN_USER_NAME}).name;
          const rowDate=isInv?(item.dueDate||item.date):item.date;
          const rowTitle=isInv?(String(item.vendor||item.proveedor||"").trim()||item.description):item.description;
          const st=getItemStatus(item,cats,users);
          const stStyle=ST[st]||ST.pending;
          const cardBg =
            st === 'approved' ? '#F0FDF4' :
            st === 'rejected' ? '#FFF1F2' :
            '#FFFBEB';
          const cardBorder = priorityForItem(item) === 0
            ? '1.5px solid #D4AED0'
            : '1px solid transparent';
          const canActOnRow=isAdmin||rowApproverIds.includes(user.id);
          const isExpanded=itemId===expandedId;
          const payBadge=isInv&&st==="approved"?invoicePaymentBadgeStyle(item.paymentStatus):null;
          const deemph=st==="rejected"||st==="deleted";
          return(
            <div key={item.id} className="card row-hover" style={{marginBottom:9,background:cardBg,opacity:deemph?0.55:1,border:cardBorder}}>
              <div
                style={{display:"flex",gap:10,alignItems:"flex-start",marginBottom:7,cursor:canActOnRow?"pointer":"default"}}
                onClick={canActOnRow?()=>setExpandedId(prev=>prev===itemId?null:itemId):undefined}
              >
                {AUTH_URL&&item.receiptPath&&(
                  <ReceiptThumb expenseId={item.id}/>
                )}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:2}}>
                        <span style={{fontWeight:700,fontSize:14}}>{rowTitle}</span>
                        <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:10,
                          background:isInv?"#FEE2CC":"#EDE9F6",
                          color:isInv?"#C4622D":"#3C0A37"}}>
                          {isInv?"FACTURA":"GASTO"}
                        </span>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:1}}>
                        <span style={{color:"#6B7B72"}}>Titular: <strong>{ownerName}</strong></span>
                        <span style={{fontWeight:700,color:G}}>{fmt(item.amount||0)}</span>
                      </div>
                      <div style={{fontSize:11,color:"#9CAA9F",marginBottom:1}}>
                        {isInv ? "Vence: " : ""}{fmtDate(rowDate)}
                        {" · "}{item.category||"—"}
                        {item.departmentId ? " · "+(departments.find(d=>d.id===item.departmentId)||{}).name : ""}
                      </div>
                      <div style={{fontSize:11,color:"#9CAA9F"}}>
                        Enviado por: {submitterName}
                      </div>
                    </div>
                    <div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:18,fontWeight:700,color:G,fontVariantNumeric:"tabular-nums"}}>{fmtExpenseAmt(item)}</div>
                      <div style={{marginTop:6,display:"flex",gap:6,alignItems:"center",justifyContent:"flex-end",flexWrap:"wrap"}}>
                        <span style={{padding:"2px 8px",borderRadius:11,fontSize:10,fontWeight:700,background:stStyle.bg,color:stStyle.color}}>
                          {t("status."+st)}
                        </span>
                        {payBadge&&<span style={{fontSize:9,fontWeight:600,padding:"2px 6px",borderRadius:10,display:"inline-block",background:payBadge.bg,color:payBadge.color}}>{payBadge.text}</span>}
                        {st !== 'rejected' && !isExpanded&&canActOnRow&&(
                          <button type="button" className="btn-sm" style={{fontSize:11,padding:"4px 10px"}} onClick={ev=>{ev.stopPropagation();setExpandedId(itemId);}}>
                            Revisar
                          </button>
                        )}
                        {isExpanded&&canActOnRow&&(
                          <button type="button" style={{background:"none",border:"none",color:"#9CAA9F",cursor:"pointer",fontSize:16,lineHeight:1,fontFamily:"inherit"}} onClick={ev=>{ev.stopPropagation();setExpandedId(null);}}>
                            ×
                          </button>
                        )}
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              {(item.paidBy||[]).length>1&&<div style={{marginBottom:7}}><ExpenseSplitBreakdown e={item} t={t} users={users} alwaysInline/></div>}
              <div style={{marginBottom:7}}>{rowApproverIds.map(aid=>{const a=approvalVoteFor(item.approvals||{},aid,users);return<div key={aid} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,marginBottom:2}}><div style={{width:5,height:5,borderRadius:"50%",background:a==="approved"?"#16A34A":a==="rejected"?"#DC2626":"#D97706"}}/><span style={{fontWeight:500}}>{getU(aid).name}:</span><span style={{color:a==="approved"?"#166534":a==="rejected"?"#991B1B":"#92400E"}}>{a?t("status."+a):t("status.pending")}</span></div>})}</div>
              {canActOnRow&&isExpanded&&(
                <div onClick={ev=>ev.stopPropagation()}>
                  <label className="lbl" style={{marginBottom:3}}>{t("label.note")}</label>
                  <textarea className="inp" rows={2} placeholder="" value={aNote[itemId]||""} onChange={ev=>setANote(p=>({...p,[itemId]:ev.target.value}))} style={{marginBottom:6,resize:"vertical",fontSize:13}}/>
                  <div style={{fontSize:10,color:(aNote[itemId]||"").trim().length<10?"#DC2626":"#6B7B72",textAlign:"right",marginTop:2}}>
                    {(aNote[itemId]||"").trim().length}/10 mín.
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button className="btn-primary" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>{approve(itemId,"approved");setExpandedId(null);}}>{t("action.approve")}</button>
                    <button className="btn-danger" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>{approve(itemId,"rejected");setExpandedId(null);}}>{t("action.reject")}</button>
                  </div>
                </div>
              )}
              {st === 'rejected' && item.rejectionNote && (
                <div style={{
                  marginTop: 8, padding: '8px 10px',
                  background: '#FEE2E2', borderRadius: 8,
                  fontSize: 11, color: '#991B1B'
                }}>
                  <strong>Motivo del rechazo:</strong> {item.rejectionNote}
                </div>
              )}
            </div>
          );
        })
      }
    </div>
  );
}


/* ── PAYMENT CALENDAR ──────────────────────────────────────────────────────── */
function PaymentCalendar({reportExpenses}){
  const{expenses,cats,t,go,setDetailId,setPanel}=useApp();
  const srcExpenses=Array.isArray(reportExpenses)?reportExpenses:expenses;
  const [cur,setCur]=useState(()=>new Date());
  const year=cur.getFullYear(),mon=cur.getMonth();
  const firstDay=(new Date(year,mon,1).getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(year,mon+1,0).getDate();
  const events={};
  srcExpenses.forEach(e=>{
    const isInv=e.expenseType==="invoice";
    const dateRaw=isInv?(e.dueDate||e.date):e.date;
    if(!dateRaw)return;
    try{
      const dt=new Date(String(dateRaw).slice(0,10)+"T12:00:00");
      if(dt.getFullYear()===year&&dt.getMonth()===mon){
        const day=dt.getDate();
        if(!events[day])events[day]=[];
        events[day].push({
          type:isInv?"invoice":"expense",
          id:e.id,
          label:isInv?(e.vendor||e.proveedor||e.description):e.description,
          amount:eurForExpense(e),
        });
      }
    }catch(err){}
  });
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const today=new Date();
  const isToday=d=>d===today.getDate()&&mon===today.getMonth()&&year===today.getFullYear();
  const monthName=(()=>{const mn=cur.toLocaleString("es-ES",{month:"long"});const yr=cur.getFullYear();return mn.charAt(0).toUpperCase()+mn.slice(1)+" "+yr;})();
  const dayLabels=["cal.mon","cal.tue","cal.wed","cal.thu","cal.fri","cal.sat","cal.sun"].map(k=>t(k));
  const [selDay,setSelDay]=useState(null);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button style={{border:"none",background:"#F5F0EA",borderRadius:6,padding:"4px 10px",fontSize:14,cursor:"pointer",fontWeight:600}} onClick={()=>setCur(new Date(year,mon-1,1))}>‹</button>
        <span style={{fontWeight:700,fontSize:13,textTransform:"capitalize"}}>{monthName}</span>
        <button style={{border:"none",background:"#F5F0EA",borderRadius:6,padding:"4px 10px",fontSize:14,cursor:"pointer",fontWeight:600}} onClick={()=>setCur(new Date(year,mon+1,1))}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
        {dayLabels.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:8,fontWeight:600,color:"#9CAA9F",padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((d,i)=>(
          <div key={i} onClick={()=>d&&setSelDay(selDay===d?null:d)} style={{minHeight:32,borderRadius:5,background:d&&isToday(d)?"rgba(60,10,55,0.08)":d&&events[d]?"#FFFBF5":"#FAFAF8",border:d&&isToday(d)?`1.5px solid ${G}`:d&&selDay===d?"1.5px solid "+T:"1px solid transparent",padding:"3px 2px",cursor:d?"pointer":"default",transition:"border 0.1s"}}>
            {d&&<><div style={{fontSize:9,fontWeight:isToday(d)?700:400,color:isToday(d)?G:"#4B5E52",textAlign:"center"}}>{d}</div><div style={{display:"flex",flexWrap:"wrap",gap:1,justifyContent:"center",marginTop:1}}>{(events[d]||[]).map((ev,j)=><div key={j} title={ev.label} style={{width:5,height:5,borderRadius:"50%",background:ev.type==="invoice"?"#C4622D":"#3C0A37"}}/>)}</div></>}
          </div>
        ))}
      </div>
      {selDay&&events[selDay]&&(
        <div style={{marginTop:10,background:"#F5F0EA",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontWeight:600,fontSize:11,marginBottom:6,color:G}}>{selDay} {cur.toLocaleString("es-ES",{month:"long"})}</div>
          {events[selDay].map((ev,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,marginBottom:3,gap:6}}>
              <span style={{display:"flex",alignItems:"center",gap:4,flex:1,minWidth:0}}><span style={{width:5,height:5,borderRadius:"50%",background:ev.type==="invoice"?"#C4622D":"#3C0A37",display:"inline-block",flexShrink:0}}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.label}</span></span>
              <span style={{fontWeight:700,fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmt(ev.amount)}</span>
              <button style={{fontSize:9,padding:"1px 6px",borderRadius:4,border:`1px solid ${G}`,background:"transparent",color:G,cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap"}} onClick={()=>{go("expenses");setTimeout(()=>{setDetailId(ev.id);setPanel("detail");},50);}}>{t("action.viewAll")}</button>
            </div>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:12,marginTop:8,fontSize:9}}>
        <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:"#C4622D",display:"inline-block"}}/>{t("expenses.typeInvoice")}</span>
        <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:"#3C0A37",display:"inline-block"}}/>{t("nav.expenses")}</span>
      </div>
    </div>
  );
}

/* ── REPORTS VIEW ──────────────────────────────────────────────────────────── */
function ReportsView(){
  const{t,expenses,cats,users,totApproved,totFixed,user,saveExp,adminIds,go,setCatFlt,setView,setExpFlt,setDetailId,setPanel}=useApp();
  const [statusFilter, setStatusFilter] = useState("all");
  const [ivaFilter, setIvaFilter] = useState("both");
  const [reportFrom, setReportFrom] = React.useState("");
  const [reportTo, setReportTo] = React.useState(new Date().toISOString().slice(0,10));
  React.useEffect(()=>{
    const allDates = (expenses||[])
      .filter(e => e.status !== "deleted" && e.date && e.date.length >= 10)
      .map(e => e.date.slice(0,10))
      .sort();
    if(allDates.length > 0){
      setReportFrom(allDates[0]);
    } else if(AUTH_URL){
      // try to fetch oldest from server
      const tok = (()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
      if(tok){
        fetch(AUTH_URL+"/expenses?limit=1&sort=date&order=asc", {headers:{Authorization:"Bearer "+tok}})
          .then(r=>r.json())
          .catch(()=>({}))
          .then(j=>{
            const first = (j.expenses||[])[0];
            if(first&&first.date) setReportFrom(first.date.slice(0,10));
            else setReportFrom("2000-01-01");
          });
      } else {
        setReportFrom("2000-01-01");
      }
    } else {
      setReportFrom("2000-01-01");
    }
  }, [expenses]);
  const rangeFilteredExpenses=useMemo(()=>{
    const getRefDate=e=>{
      return ((e.expenseType==="invoice"?(e.dueDate||e.date):e.date)||"").slice(0,10);
    };
    return expenses.filter(e=>{
      const d=getRefDate(e);
      if(!d)return false;
      if(reportFrom&&d<reportFrom)return false;
      if(reportTo&&d>reportTo)return false;
      return true;
    });
  },[expenses,reportFrom,reportTo]);
  const displayExpenses = rangeFilteredExpenses.filter(e => {
    if (statusFilter === "approved") return e.status === "approved";
    if (statusFilter === "pending") return e.status !== "approved" && e.status !== "rejected" && e.status !== "deleted";
    return true;
  });
  const filterLabel = statusFilter==="all" ? ""
    : statusFilter==="approved" ? ` — ${t("reports.approvedOnly")}`
    : ` — ${t("reports.pendingOnly")}`;
  const [openPersonLog,setOpenPersonLog]=useState({});
  const personInvestmentRows=useMemo(()=>users.map(u=>{
    const filteredTotal=displayExpenses.reduce((s,e)=>s+shareEurInExpense(e,u.id),0);
    const submittedCount=displayExpenses.filter(e=>e.submittedBy===u.id&&getItemStatus(e,cats,users)!=="deleted").length;
    const logItems=displayExpenses.filter(e=>{
      const st=getItemStatus(e,cats,users);
      if(st==="deleted"||st==="rejected")return false;
      if(st!=="approved"&&st!=="pending")return false;
      const ownerId=e.ownerId||e.submittedBy;
      const inPaidBy=(e.paidBy||[]).some(p=>p&&p.userId===u.id);
      return ownerId===u.id||inPaidBy;
    }).map(e=>({...e,__kind:e.expenseType==="invoice"?"invoice":"expense",__sortDate:(e.expenseType==="invoice"?(e.dueDate||e.date):e.date)||""}))
      .sort((a,b)=>String(b.__sortDate||"").localeCompare(String(a.__sortDate||"")));
    return{...u,filteredTotal,submittedCount,logItems};
  }).sort((a,b)=>b.filteredTotal-a.filteredTotal),[users,displayExpenses,cats]);
  const catTotals=cats.filter(c=>!c.archived).map(c=>({
    cat:c.name,
    total:displayExpenses.filter(e=>e.category===c.name&&expenseCountsTowardDeptSpend(e,cats,users)).reduce((s,e)=>s+eurForExpense(e),0),
  })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxC=catTotals[0]?.total||1;
  const monthlyData = React.useMemo(()=>{
    const months = [];
    const now = new Date();
    for(let i=11; i>=0; i--){
      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const ym = d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      const label = d.toLocaleDateString("es-ES",{month:"short",year:"2-digit"});
      const rows = (expenses||[]).filter(e=>
        e.status!=="deleted" && e.date && e.date.startsWith(ym)
      );
      const gastos = rows.filter(e=>e.expenseType!=="invoice").reduce((s,e)=>s+(Number(e.amount)||0),0);
      const facturas = rows.filter(e=>e.expenseType==="invoice").reduce((s,e)=>s+(Number(e.amount)||0),0);
      months.push({ym, label, gastos, facturas, total:gastos+facturas});
    }
    return months;
  }, [expenses]);
  const maxMonthlyTotal=Math.max(...monthlyData.map(m=>m.total),1);
  const monthlyChartHeight=200;
  const monthlyChartBaseY=160;
  const monthlyMaxBarHeight=120;
  const totalPeriodo=displayExpenses.reduce((s,e)=>s+(Number(e.amount)||0),0);
  const exportCSV=(includeIva=true)=>{
    const ivaM=includeIva ? (ivaFilter==="with" ? "with_iva" : "both") : "without_iva";
    const data=statusFilter;
    const src=displayExpenses;
    const now=new Date().toISOString();
    const exportedUser=user;
    if(!AUTH_URL){
      const updatedSrc=src.map(e=>({...e,auditTrail:[...(e.auditTrail||[]),{action:"exported",by:exportedUser.id,at:now,meta:{format:"csv",filter:data,ivaMode:ivaM}}]}));
      saveExp(expenses.map(e=>{const u=updatedSrc.find(x=>x.id===e.id);return u||e;}));
    }
    appLog("info","csv_exported",{filter:data,ivaMode:ivaM,count:src.length,userId:exportedUser.id,codes:src.map(e=>e.itemCode||e.id)});
    const headerBase=[
      t("item.code"),
      t("csv.itemType"),
      t("label.date"),
      t("label.description"),
      t("label.category"),
      t("label.status"),
      t("filter.submitter"),
      t("label.paidBy"),
      t("label.notes"),
      t("label.approvers"),
    ];
    const amountHeaders=
      ivaM==="with_iva"?["Total con IVA"]
      :ivaM==="without_iva"?["Base imponible"]
      :["Base imponible","Cuota IVA","Total con IVA"];
    const rows=[
      [...headerBase,...amountHeaders],
      ...src.map(e=>{
        const approverIds=effectiveExpenseApproverIds(e,cats,users);
        const amtEur=eurForExpense(e);
        const ivaAmt=e.ivaAmount!=null?Number(e.ivaAmount):0;
        const base=e.ivaRate!=null?Math.round((amtEur-ivaAmt)*100)/100:amtEur;
        const tipo=e.expenseType==="invoice"?"Factura":"Gasto";
        const commonFields=[
          e.itemCode||e.id,
          tipo,
          e.date,
          e.description,
          e.category,
          getItemStatus(e,cats,users),
          (users.find(u=>u.id===(e.ownerId||e.submittedBy))||{name:UNKNOWN_USER_NAME}).name,
          e.paidBy.map(p=>`${(users.find(u=>u.id===p.userId)||{name:UNKNOWN_USER_NAME}).name}:${fmt(p.amount)}`).join(";"),
          e.notes||"",
          approverIds.map(id=>(users.find(u=>u.id===id)||{name:UNKNOWN_USER_NAME}).name).join(";"),
        ];
        if(ivaM==="with_iva")return[...commonFields,amtEur];
        if(ivaM==="without_iva")return[...commonFields,base];
        return[...commonFields,base,ivaAmt,amtEur];
      }),
    ];
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Bold + background for header row
    const headerStyle = {
      font: { bold: true, color: { rgb: "FFFFFF" } },
      fill: { fgColor: { rgb: "3C0A37" } },
    };
    if(ws['!ref']) {
      const range = XLSX.utils.decode_range(ws['!ref']);
      for(let C = range.s.c; C <= range.e.c; C++) {
        const addr = XLSX.utils.encode_cell({ r: 0, c: C });
        if(!ws[addr]) continue;
        ws[addr].s = headerStyle;
      }
    }
    // Auto column widths based on max content length (cap at 40 chars)
    const colWidths = rows[0].map((_, ci) =>
      Math.min(40, Math.max(...rows.map(r => String(r[ci]||"").length))) + 2
    );
    ws['!cols'] = colWidths.map(w => ({ wch: w }));
    XLSX.utils.book_append_sheet(wb, ws, "Gastos");
    XLSX.writeFile(wb, `solana-${data}-${ivaM}-${new Date().toISOString().slice(0,10)}.xlsx`);
  };
  const downloadPdf=async()=>{
    if(!AUTH_URL)return;
    try{API.ensureSessionToken();}catch(e){}
    const tok=API.token||(typeof sessionStorage!=="undefined"?sessionStorage.getItem("sol-session-token"):"")||"";
    if(!tok){dispatchSolanaToast(t("msg.sessionExpired"),"error");return;}
    const {from,to}={ from: reportFrom, to: reportTo };
    const qs=new URLSearchParams({from,to,type:"all"});
    let r;
    try{
      r=await fetch(AUTH_URL+"/reports/export/pdf?"+qs.toString(),{headers:{Authorization:"Bearer "+tok}});
    }catch(e){
      dispatchSolanaToast(t("msg.genericShort"),"error");
      return;
    }
    if(!r.ok){
      let msg=t("msg.genericShort");
      try{
        const ct=r.headers.get("content-type")||"";
        if(ct.includes("application/json")){const j=await r.json();msg=j.error||msg;}
      }catch(e){/* ignore */}
      dispatchSolanaToast(msg,"error");
      return;
    }
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=Object.assign(document.createElement("a"),{href:url,download:`report-${from}-to-${to}.pdf`});
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:6}}>

          <select className="inp" style={{width:"auto",fontSize:11,padding:"4px 8px"}}
            value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}>
            <option value="all">Mostrar: Todos</option>
            <option value="approved">Solo aprobados</option>
            <option value="pending">Solo pendientes</option>
          </select>
          <select className="inp" style={{width:"auto",fontSize:11,padding:"4px 8px"}}
            value={ivaFilter} onChange={e=>setIvaFilter(e.target.value)}>
            <option value="both">IVA: Con y sin IVA</option>
            <option value="with">Con IVA</option>
            <option value="without">Sin IVA</option>
          </select>
          <select className="inp" style={{width:"auto",fontSize:11,padding:"4px 8px"}}
            value="" onChange={e=>{
              const v = e.target.value;
              if (v === "csv") exportCSV(ivaFilter !== "without");
              if (v === "pdf") void downloadPdf();
              e.target.value = "";
            }}>
            <option value="">Exportar…</option>
            <option value="csv">Exportar CSV</option>
            {AUTH_URL && <option value="pdf">Exportar PDF</option>}
          </select>
        </div>
      </div>
      <div className="card" style={{marginBottom:11,padding:"10px 12px"}}>
        <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
          <label style={{fontSize:11}}>Desde</label>
          <input type="date" className="inp" style={{width:"auto",fontSize:11,padding:"4px 8px"}}
            value={reportFrom} onChange={e=>setReportFrom(e.target.value)}/>
          <label style={{fontSize:11}}>Hasta</label>
          <input type="date" className="inp" style={{width:"auto",fontSize:11,padding:"4px 8px"}}
            value={reportTo} onChange={e=>setReportTo(e.target.value)}/>
        </div>
      </div>
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontWeight:600,fontSize:13,color:"#1A2B1E",marginBottom:10}}>Actividad mensual (12 meses)</div>
        <div style={{display:"flex",alignItems:"center",gap:12,fontSize:11,color:"#4B5E52",marginBottom:8}}>
          <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,background:"#3C0A37",display:"inline-block",borderRadius:2}}/>Gastos</span>
          <span style={{display:"flex",alignItems:"center",gap:5}}><span style={{width:10,height:10,background:"#C4622D",display:"inline-block",borderRadius:2}}/>Facturas</span>
        </div>
        <svg width="100%" height="200" viewBox={`0 0 ${monthlyData.length*34+24} 200`} preserveAspectRatio="xMinYMin meet" aria-label="Actividad mensual">
          <line x1="12" y1={monthlyChartBaseY} x2={monthlyData.length*34+12} y2={monthlyChartBaseY} stroke="#E5E0D8" strokeWidth="1"/>
          {monthlyData.map((m,idx)=>{

            return(

                  <title>{`${m.label} · Gastos: ${fmt(m.gastos)}`}</title>

                <rect x={groupX+14} y={yF} width="12" height={hF} fill="#C4622D" rx="2">

        <div style={{display:"flex",justifyContent:"space-between",marginTop:8,fontSize:12}}>

/* ── ADMIN README ─────────────────────────────────────────────────────────
   Operational reference for admins/superadmins: roles, item codes,
   attachment storage, exports, troubleshooting.
─────────────────────────────────────────────────────────────────────────── */
function AdminReadme(){
  const[open,setOpen]=useState(false);
  const S={heading:{fontWeight:700,fontSize:11,color:"#3C0A37",marginBottom:4,marginTop:10},
           body:{fontSize:10,color:"#4B5E52",lineHeight:1.7},
           code:{fontFamily:"monospace",fontSize:9,background:"#F5F0EA",padding:"2px 5px",borderRadius:4,color:"#3C0A37"}};
  return(
    <div className="card" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}
        onClick={()=>setOpen(v=>!v)}>
        <div style={{fontWeight:600,fontSize:13}}>Guía operacional de administración</div>
        <span style={{fontSize:11,color:"#9CAA9F"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:12}}>

          <div style={S.heading}>ROLES</div>
          <div style={S.body}>
            <b>user</b> puede enviar gastos y facturas, subir recibos, exportar.<br/>
            <b>admin</b> todo lo anterior + aprobar/rechazar ítems de sus categorías, pausar/eliminar facturas.<br/>
            <b>superadmin</b> todo lo anterior + gestionar usuarios, categorías, ver el App Log y aprobar cuentas nuevas.
          </div>

          <div style={S.heading}>CÓDIGOS DE ÍTEM</div>
          <div style={S.body}>
            Formato: <span style={S.code}>EXP-YYYYMMDD-XXXX</span> (gasto) / <span style={S.code}>FAC-YYYYMMDD-XXXX</span> (factura).<br/>
            Son <b>inmutables</b>, se generan en el momento del envío y no cambian aunque el ítem se edite.<br/>
            Úsalos como ancla de trazabilidad en auditorías, conciliaciones y exports.<br/>
            El código aparece en la fila de lista, en el panel de detalle y en el CSV exportado.
          </div>

          <div style={S.heading}>ADJUNTOS (RECIBOS)</div>
          <div style={S.body}>
            Los recibos se almacenan como <b>Base64 inline</b> en <span style={S.code}>localStorage</span> (clave <span style={S.code}>sol-exp</span>).<br/>
            Tipos permitidos: JPEG, PNG, WEBP, PDF · Tamaño máximo: 4 MB por archivo.<br/>
            El campo <span style={S.code}>receiptType</span> indica el MIME type; <span style={S.code}>receipt</span> contiene el Base64.<br/>
            Los adjuntos eliminados registran un evento <span style={S.code}>attachment_removed</span> en el auditTrail del ítem.
          </div>

          <div style={S.heading}>EXPORTACIONES</div>
          <div style={S.body}>
            CSV: incluye código, fecha, descripción, categoría, importe, estado, enviado por, pagado por, notas, aprobadores.<br/>
            JSON: snapshot completo de gastos + facturas con toda la estructura interna.<br/>
            Cada exportación CSV registra un evento <span style={S.code}>exported</span> en el auditTrail de cada ítem exportado.
          </div>

          <div style={S.heading}>LOCALSTORE: CLAVES</div>
          <div style={S.body}>
            <span style={S.code}>sol-users</span> usuarios · <span style={S.code}>sol-exp</span> gastos y facturas (campo <span style={S.code}>expenseType</span>) · <span style={S.code}>sol-cats</span> categorías<br/>
            <span style={S.code}>sol-pwd</span> contraseñas (plaintext, solo modo local)<br/>
            <span style={S.code}>sol-app-log</span> log de la app (máx {LOG_MAX} entradas) · <span style={S.code}>sol-lang</span> reservado (es)
          </div>

          <div style={S.heading}>RESOLUCIÓN DE PROBLEMAS COMUNES</div>
          <div style={S.body}>
            <b>"Storage full"</b> → Ve a Zona peligrosa → Exporta JSON y elimina recibos grandes.<br/>
            <b>Usuario no puede aprobar</b> → Comprueba que su ID aparezca en <span style={S.code}>approverIds</span> de la categoría.<br/>
            <b>Ítem sin código</b> → Ítems migrados de v1/v2 pueden carecer de código; se asigna al primer guardado (normalizeItem).<br/>
            <b>Login con servidor de auth</b> → Verifica que <span style={S.code}>AUTH_URL</span> apunte al servidor activo y que CORS_ORIGIN esté configurado.<br/>
            <b>Email de verificación no llega</b> → Comprueba <span style={S.code}>RESEND_API_KEY</span> y que FROM_EMAIL esté verificado en Resend.<br/>
            <b>Sesión cerrada automáticamente</b> → El timeout de inactividad es 30 min. Ajusta <span style={S.code}>IDLE_TIMEOUT_MS</span> en el código.
          </div>

        </div>
      )}
    </div>
  );
}

/* ── APP LOG (Settings accordion body) ─────────────────────────────────────
   Structured in-browser log: timestamp, level, event, metadata.
─────────────────────────────────────────────────────────────────────────── */
function AppLogPanelBody(){

    try{setEntries(JSON.parse(localStorage.getItem(APP_LOG_KEY)||"[]").reverse());}

  };

    void (async()=>{
      if(!(await confirmUI("Borrar el log de la aplicación?")))return;
      localStorage.removeItem(APP_LOG_KEY);setEntries([]);
      dispatchSolanaToast("Log borrado.","info");
    })();
  };
  const LEVEL_COLOR={error:"#DC2626",warn:"#D97706",info:"#9CAA9F"};
  const EVENT_COLOR={
    "auth:login":"#3C0A37","auth:init":"#9CA3AF","auth:boot":"#9CA3AF",
    "session_idle_expired":"#D97706","password_changed":"#D97706",
    "expense_submitted":"#065F46","bill_submitted":"#065F46",
    "item_approved":"#065F46","item_rejected":"#DC2626",
    "csv_exported":"#2563EB","attachment_uploaded":"#7A4F9A",
    "attachment_removed":"#991B1B","upload_rejected":"#DC2626",
  };
  useEffect(()=>{loadLog();},[]);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:8}}>
