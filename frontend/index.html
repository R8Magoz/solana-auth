        <p style={{fontSize:11,color:"#6B7B72",marginBottom:9}}>{t("settings.passwordDesc")}</p>
        {!AUTH_URL&&!passwords?.[user.id]&&<div style={{background:"#FEF3C7",borderRadius:6,padding:"6px 9px",fontSize:10,color:"#92400E",marginBottom:8}}>{t("msg.passwordNoExisting")}</div>}
        <div style={{display:"grid",gap:7}}>
          {(AUTH_URL||passwords?.[user.id])&&<div><label className="lbl">{t("label.currentPassword")}</label><input className="inp" type="password" value={pwForm.cur} onChange={e=>setPwForm(p=>({...p,cur:e.target.value}))} autoComplete="current-password"/></div>}
          <div><label className="lbl">{t("label.newPassword")}</label><input className="inp" type="password" value={pwForm.nw} onChange={e=>setPwForm(p=>({...p,nw:e.target.value}))}/></div>
          <div><label className="lbl">{t("label.confirmPassword")}</label><input className="inp" type="password" value={pwForm.cn} onChange={e=>setPwForm(p=>({...p,cn:e.target.value}))}/></div>
        </div>
        {pwMsg&&<div style={{marginTop:7,fontSize:11,padding:"5px 8px",borderRadius:6,background:pwOk?"#D1FAE5":"#FEE2E2",color:pwOk?"#065F46":"#7F1D1D"}}>{pwMsg}</div>}
        <button type="button" className="btn-primary" style={{marginTop:9,fontSize:12,padding:"6px 12px"}} disabled={pwSaving} onClick={()=>void savePw()}>{pwSaving?"…":(passwords?.[user.id]?t("action.changePassword"):t("action.setPassword"))}</button>
      </AccordionSection>

      {(isSA||isAdmin)&&<DepartmentsSettingsBlock t={t}/>}

      {isSA&&<AccordionSection title="Parámetros del sistema">
        <ServerSettingsView/>
      </AccordionSection>}

      {isSA&&<AccordionSection title="Ajustes de aplicación">
        {appSetMsg&&<div style={{padding:"6px 9px",borderRadius:6,background:"#D1FAE5",color:"#065F46",fontSize:11,marginBottom:8}}>{appSetMsg}</div>}
        {appSetErr&&<div style={{padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",fontSize:11,marginBottom:8}}>{appSetErr}</div>}

        <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:8}}>IVA Rates</div>
        <div style={{marginBottom:8}}>
          <label className="lbl">{t("settings.ivaDefault")}</label>
          <select className="inp" style={{fontSize:14}} value={appIvaDefaultDraft===null?"":String(appIvaDefaultDraft)} onChange={e=>{const v=e.target.value;setAppIvaDefaultDraft(v===""?null:Number(v));}}>
            {ivaRates.map(r=><option key={"app-iva-def-"+(r.value==null?"sin":String(r.value))+"-"+r.name} value={r.value===null||r.value==="none"?"":String(r.value)}>{formatIvaOptionLabel(r)}</option>)}
          </select>
        </div>
        <IvaRatesEditorBlock t={t} ivaRates={ivaRates} onSave={(rates)=>{void saveAppIvaSettings(rates,appIvaDefaultDraft);}}/>

        <hr style={{border:"none",borderTop:"1px solid #E8E2DC",margin:"14px 0"}}/>
        <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:8}}>Categorías</div>
        <div style={{display:"flex",flexDirection:"column",gap:7,marginBottom:8}}>
          {appCatsDraft.map((c,idx)=>(
            <div key={c.id||("tmp-"+idx)} style={{display:"flex",gap:7,alignItems:"center"}}>
              <input className="inp" style={{flex:1,fontSize:13,opacity:c.archived?0.65:1}} value={c.name||""} onChange={e=>setAppCatsDraft(prev=>prev.map((x,i)=>i===idx?{...x,name:e.target.value}:x))}/>
              <button type="button" className="btn-secondary" style={{fontSize:10,padding:"4px 8px"}} onClick={()=>setAppCatsDraft(prev=>prev.map((x,i)=>i===idx?{...x,archived:!x.archived}:x))}>
                {c.archived?"Restaurar":"Archivar"}
              </button>
            </div>
          ))}
        </div>
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <button type="button" className="btn-sm" style={{fontSize:10}} onClick={()=>setAppCatsDraft(prev=>[...prev,{id:"c_"+Date.now(),name:"Nueva categoría",archived:false,approverIds:[]}])}>Añadir categoría</button>
          <button type="button" className="btn-primary" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>void saveAppCategories()}>Guardar categorías</button>
        </div>

        <hr style={{border:"none",borderTop:"1px solid #E8E2DC",margin:"14px 0"}}/>
        <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:8}}>Currency</div>
        <label className="lbl">Moneda base</label>
        <input className="inp" style={{maxWidth:120,fontSize:13,marginBottom:6,textTransform:"uppercase"}} maxLength={3} value={appCurrency} onChange={e=>setAppCurrency(String(e.target.value||"").toUpperCase().replace(/[^A-Z]/g,"").slice(0,3))}/>
        <div style={{fontSize:10,color:"#9CAA9F",marginBottom:8}}>Solo afecta a etiquetas visuales. Los importes ya registrados no se convierten.</div>
        <button type="button" className="btn-primary" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>void saveAppCurrency()}>Guardar moneda</button>
      </AccordionSection>}

      {isSA&&AUTH_URL&&<PendingUsersPanel/>}

      {isSA&&<AccordionSection title={t("settings.accordion.appLog")}>
        <AppLogPanelBody/>
      </AccordionSection>}

      {isSA&&<AccordionSection title={t("settings.accordion.backups")}>
        {backupsMsg&&<div style={{padding:"6px 9px",borderRadius:6,background:"#D1FAE5",color:"#065F46",fontSize:11,marginBottom:8}}>{backupsMsg}</div>}
        {backupsError&&<div style={{padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",fontSize:11,marginBottom:8}}>{backupsError}</div>}
        <div style={{padding:"8px 10px",borderRadius:8,background:"#FFFBEB",border:"1px solid #FDE68A",fontSize:11,color:"#92400E",lineHeight:1.45,marginBottom:10}}>
          ⚠ Las copias se guardan en el mismo disco. Descarga semanalmente a Google Drive como copia externa.
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{fontSize:11,color:"#6B7B72"}}>{backupsLoading?"Cargando copias...":"Copias disponibles: "+backups.length}</div>
          <button type="button" className="btn-primary" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>void runBackupNow()}>Crear copia ahora</button>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {backups.map((b,i)=>{
            const sizeKb=Math.round((Number(b.sizeBytes)||0)/1024);
            const dt=b.modifiedAt?new Date(b.modifiedAt).toLocaleString("es-ES"):"";
            return(
              <div key={b.filename||i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid #F5F0EA"}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.filename}</div>
                  <div style={{fontSize:10,color:"#9CAA9F"}}>{sizeKb} KB{dt?" · "+dt:""}</div>
                </div>
                <button type="button" className="btn-secondary" style={{fontSize:10,padding:"4px 8px"}} onClick={()=>void openBackupDownload(b.filename)}>Descargar</button>
              </div>
            );
          })}
          {!backupsLoading&&backups.length===0&&<div style={{fontSize:11,color:"#9CAA9F"}}>No hay copias de seguridad.</div>}
        </div>
      </AccordionSection>}

      {/* ── Danger zone (superadmin only) ── */}
      {isSA&&<AccordionSection title={t("settings.accordion.danger")} accent={"#991B1B"}>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #EDE8E0"}}>
          <div style={{fontWeight:600,fontSize:12,color:"#991B1B",marginBottom:4}}>{t("settings.deleteAccount")}</div>
          {!dSelf?<button className="btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDSelf(true)}>{t("settings.requestDeletion")}</button>:(
            <div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>{t("msg.removeAccount")}</div><div style={{display:"flex",gap:6}}><button className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>{saveUsers(users.filter(u=>u.id!==user.id));onSignOut();}}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDSelf(false)}>{t("action.cancel")}</button></div></div>
          )}
        </div>
      </AccordionSection>}

      <div style={{marginTop:12,padding:"8px 12px",background:"#F5F0EA",borderRadius:8,fontSize:10,color:"#9CAA9F",display:"flex",justifyContent:"flex-end",alignItems:"center",gap:10,flexWrap:"wrap"}}>
        <span>Data schema v{DATA_VERSION} · {new Date().getFullYear()}</span>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════════════════
   MAIN APP COMPONENT
══════════════════════════════════════════════════════════════════════════════ */
function SolanaExpenses(){
  /* ── STATE ──────────────────────────────────────────────────────────────── */
  /* With AUTH_URL, roster is replaced from GET /auth/team after login; seed DEF_USERS is only the initial placeholder until that fetch runs. */
  const [users,   setUsers]   =useState(()=>{
    migrateItemCodes();
    migrateDataModel();
    const d=ls("sol-users",DEF_USERS);
    const n=d.map(u=>normalizeItem(u,"user"));
    appLog("info","auth:init",{userIds:n.map(u=>u.id),count:n.length});
    return n;
  });
  const [user,    setUser]    =useState(null);
  const [expenses,setExpenses]=useState(()=>{
    if(AUTH_URL)return[];
    let d=ls("sol-exp",[]);
    return d.map(e=>normalizeItem(e,"expense"));
  });
  const [ledgerLoading,setLedgerLoading]=useState(false);
  const [cats,    setCats]    =useState(()=>{
    const d=ls("sol-cats",DEF_CATS);
    return d.map(c=>normalizeItem(c,"cat"));
  });
  const [passwords,setPasswords]=useState(()=>ls("sol-pwd",{}));
  const sessionRestoreAttempted = useRef(false);
  // appReady: small deliberate delay so the root div never flashes empty
  const [appReady,setAppReady]=useState(false);
  useEffect(()=>{
    appLog("info","auth:boot",{ts:new Date().toISOString()});
    setAppReady(true);
  },[]);
  // currency is hardcoded EUR
  useEffect(()=>{
    if(!AUTH_URL)return;
    if(sessionRestoreAttempted.current)return;
    const stored=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch{return "";}})();
    if(!stored){sessionRestoreAttempted.current=true;return;}
    sessionRestoreAttempted.current=true;
    API.token=stored;
    void (async()=>{
      try{
        // Verify the token is still valid via /auth/refresh
        const refreshRes=await fetch(AUTH_URL+"/auth/refresh",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+stored}
        });
        // Only clear token on explicit auth rejection, not server errors
        if(!refreshRes.ok){
          if(refreshRes.status===401||refreshRes.status===403){
            API.token=null;
            try{sessionStorage.removeItem("sol-session-token");}catch(e){}
          }
          return;
        }
        const refreshData=await refreshRes.json();
        if(refreshData.sessionToken){
          API.token=refreshData.sessionToken;
          try{sessionStorage.setItem("sol-session-token",refreshData.sessionToken);}catch(e){}
        }
        const loggedInUserId=refreshData.userId;
        if(!loggedInUserId)return;

        // Load the team roster
        const teamRes=await fetch(AUTH_URL+"/auth/team",{
          headers:{"Authorization":"Bearer "+API.token}
        });
        if(!teamRes.ok)return;
        const teamData=await teamRes.json();
        if(!teamData.users||!Array.isArray(teamData.users))return;
        const meRaw=teamData.users.find(u=>u.id===loggedInUserId);
        if(!meRaw)return;
        const me=normalizeItem(meRaw,"user");
        setUsers(teamData.users.map(u=>normalizeItem(u,"user")));
        try{localStorage.setItem(LAST_ACTIVITY_KEY,String(Date.now()));}catch(e){}
        setIdleTrackingEnabled(true);
        setUser(me);
        appLog("info","auth:session_restored",{userId:me.id});

        // Load data for the restored session
        try{
          const de=await fetch(AUTH_URL+"/expenses",{headers:{"Authorization":"Bearer "+API.token}}).then(r=>r.ok?r.json():{expenses:[]});
          if(de.expenses&&de.expenses.length){
            saveExp(mapExpensesFromApi(de.expenses));
          }
        }catch(e){/* non-fatal */}

      }catch(e){
        // Non-fatal — keep token, user must log in manually
        appLog("warn","auth:restore_failed",{error:e?.message||"unknown"});
      }
    })();
  },[]);
  useEffect(()=>{try{if(localStorage.getItem("sol-lang")==null)localStorage.setItem("sol-lang","es");}catch(e){}},[]);
  const t=React.useMemo(()=>mkT(),[]);
  const [ivaRates,setIvaRates]=useState(()=>readIvaRates());
  const saveIvaRates=useCallback(rates=>{
    const n=normalizeIvaRatesPayload(rates);
    lsSet(IVA_RATES_KEY,n);
    setIvaRates(readIvaRates());
    try{
      const raw=localStorage.getItem(IVA_DEFAULT_KEY);
      if(raw===null||raw===""){localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(n[0].value));return;}
      const v=JSON.parse(raw);
      if(v===null)return;
      if(typeof v!=="number"||isNaN(v)||!n.some(r=>r.value===v))localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(n[0].value));
    }catch(e){}
  },[]);

  const [view,    setViewState]    =useState("dashboard");
  const parseViewFromPath=useCallback((pathname)=>{
    const raw=String(pathname||"/").split("?")[0].split("#")[0];
    const seg=raw.replace(/^\/+/,"").split("/")[0]||"";
    if(seg==="serverSettings")return"settings";
    return VALID_VIEWS.has(seg)?seg:"dashboard";
  },[]);
  const setView=useCallback((nextView)=>{
    const mapped=nextView==="serverSettings"?"settings":nextView;
    const safeView=VALID_VIEWS.has(mapped)?mapped:"dashboard";
    setViewState(safeView);
    if(typeof window==="undefined"||!user)return;
    window.history.pushState({view:safeView},"","/"+safeView);
  },[user]);
  const [detailId,setDetailId]=useState(null);
  const [panel,   setPanel]   =useState(null);
  const [expFlt,  setExpFlt]  =useSessionState("sol-flt-status","all");
  const [expSrc,  setExpSrc]  =useState("");
  const [catFlt,  setCatFlt]  =useSessionState("sol-flt-cat","");   // category name or ""
  const [submFlt, setSubmFlt] =useSessionState("sol-flt-subm","");   // userId or ""
  const [dateFrom,setDateFrom]=useSessionState("sol-flt-from","");   // YYYY-MM-DD or ""
  const [dateTo,  setDateTo]  =useSessionState("sol-flt-to","");   // YYYY-MM-DD or ""
  const [expKindFlt,setExpKindFlt]=useSessionState("sol-flt-kind","all");
  const myExpFilterClearedRef=useRef(false);
  const resetExpenseFiltersToDefault=useCallback(()=>{
    try{
      ["sol-flt-status","sol-flt-cat","sol-flt-subm","sol-flt-from","sol-flt-to","sol-flt-kind"].forEach(k=>sessionStorage.removeItem(k));
    }catch(e){}
    setExpFlt("all");
    setCatFlt("");
    setSubmFlt("");
    setDateFrom("");
    setDateTo("");
    setExpSrc("");
    setExpKindFlt("all");
  },[setExpFlt,setCatFlt,setSubmFlt,setDateFrom,setDateTo,setExpSrc,setExpKindFlt]);

  const [form,    setForm]    =useState(()=>{
    const base={
      ...BF,
      ivaRate:ivaRateToFormString(readIvaDefault()),
      ownerId: users.find(u => u.id === user?.id) ? user.id : (users[0]?.id || ""),
    };
    try{
      const saved=sessionStorage.getItem(DRAFT_KEY);
      if(!saved)return base;
      const parsed=JSON.parse(saved);
      if(parsed&&typeof parsed==="object"&&!Array.isArray(parsed))return{...base,...parsed};
    }catch(e){}
    return base;
  });
  const [splitOn, setSplitOn] =useState(false);
  const [splits,  setSplits]  =useState([]);
  const [spMode,  setSpMode]  =useState("amount");
  const [receipt, setReceipt] =useState(null);
  const [recPrev, setRecPrev] =useState(null);
  const [formError, setFormError] =useState("");
  const [sessionExpired, setSessionExpired]=useState(false);
  const [idleTrackingEnabled,setIdleTrackingEnabled]=useState(false);
  const [online,setOnline]=useState(()=>typeof navigator!=="undefined"&&navigator.onLine);
  const [toasts,setToasts]=useState([]);
  const [confirmModal,setConfirmModal]=useState(null);
  const [idleWarning,   setIdleWarning]   =useState(false);
  const idleTimer   =useRef(null);
  const idleDeadlineRef = useRef(0);
  const warnTimer   =useRef(null);
  const [aNote,   setANote]   =useState({});
  const [departments,setDepartments]=useState([]);
  const refreshDepartments=useCallback(async()=>{
    if(AUTH_URL){
      try{
        API.ensureSessionToken();
        if(!API.token)return;
        const d=await API.get("/departments");
        setDepartments(d.departments||[]);
      }catch(e){/* keep list */}
    }else{
      setDepartments(readLocalDepartments());
    }
  },[]);
  useEffect(()=>{
    if(!user)return;
    void refreshDepartments();
  },[user?.id,refreshDepartments]);
  const departmentsWithStats=React.useMemo(
    ()=>enrichDepartmentsForUI(departments,expenses,cats,users,false),
    [departments,expenses,cats,users],
  );
  const defaultDeptId=React.useMemo(()=>{
    const active=departments.filter(d=>!d.archived);
    const hit=active.find(d=>d.id===DEFAULT_DEPT_ID);
    return hit?.id||active[0]?.id||DEFAULT_DEPT_ID;
  },[departments]);
  const [camOn,setCamOn]=useState(false);
  const [camStr,setCamStr]=useState(null);
  const videoRef=useRef(null);
  const canvasRef=useRef(null);
  const fileRef  =useRef(null);
  /** When set, receipt file/camera targets edit form (DetailPanel) instead of new expense. */
  const receiptAltHandlerRef=useRef(null);
  const importRef=useRef(null);
  const migrAttemptRef=useRef(false);

  const confirmHandler=useCallback((message)=>new Promise(resolve=>{
    setConfirmModal({message:String(message||"").trim()||"¿Confirmar?",resolve});
  }),[]);
  useEffect(()=>{
    _confirmHandler=confirmHandler;
    return()=>{if(_confirmHandler===confirmHandler)_confirmHandler=null;};
  },[confirmHandler]);

  const clearMyExpenseFilter=useCallback(()=>{
    myExpFilterClearedRef.current=true;
    setSubmFlt("");
  },[setSubmFlt]);
  const onSignOut=useCallback(()=>{
    myExpFilterClearedRef.current=false;
    migrAttemptRef.current=false;
    resetExpenseFiltersToDefault();
    void API.logout();
    try{sessionStorage.removeItem("sol-session-token");}catch(e){}
    try{sessionStorage.removeItem(DRAFT_KEY);}catch(e){}
    try{localStorage.removeItem(LAST_ACTIVITY_KEY);}catch(e){}
    API.token=null;
    setIdleTrackingEnabled(false);
    setUser(null);
    setView("dashboard");
    if(typeof window!=="undefined"){
      window.history.replaceState({},"","/");
    }
    setDetailId(null);
    setPanel(null);
    if(AUTH_URL){setExpenses([]);}
    setDepartments([]);
  },[resetExpenseFiltersToDefault,setView]);

  useEffect(()=>{
    if(!user)return;
    const initialView=parseViewFromPath(window.location.pathname);
    setViewState(initialView);
    window.history.replaceState({view:initialView},"","/"+initialView);
    const onPopState=(event)=>{
      const stateView=event&&event.state&&event.state.view;
      const nextView=VALID_VIEWS.has(stateView)?stateView:parseViewFromPath(window.location.pathname);
      setViewState(nextView);
    };
    window.addEventListener("popstate",onPopState);
    return()=>window.removeEventListener("popstate",onPopState);
  },[user,parseViewFromPath]);

  /* ── SAVES ──────────────────────────────────────────────────────────────── */
  const saveUsers   =d=>{
    const n=d.map(u=>normalizeItem(u,"user"));
    setUsers(prev=>{
      const removedIds=prev.filter(u=>!n.some(x=>x.id===u.id)).map(u=>u.id);
      if(removedIds.length){
        setCats(prevCats=>{
          const nextCats=prevCats.map(c=>({...c,approverIds:(c.approverIds||[]).filter(aid=>!removedIds.includes(aid))}));
          lsSet("sol-cats",nextCats);
          return nextCats;
        });
      }
      lsSet("sol-users",n);
      return n;
    });
  };
  const saveExp     =d=>{const n=d.map(e=>normalizeItem(e,"expense"));setExpenses(n);if(!AUTH_URL)lsSet("sol-exp",n);};
  const saveCats    =d=>{const n=d.map(c=>normalizeItem(c,"cat"));setCats(n);lsSet("sol-cats",n);};
  const savePasswords=d=>{setPasswords(d);if(!AUTH_URL)lsSet("sol-pwd",d);};

  /* ── HELPERS ────────────────────────────────────────────────────────────── */
  const getUser   =id=>users.find(u=>u.id===id)||{id,name:UNKNOWN_USER_NAME,color:"#999",role:"user",title:"",avatar:null};
  const adminIds  =React.useMemo(()=>getAdminIds(users),[users]); // dynamic, never hardcoded
  const isAdmin   =user?.role==="admin"||user?.role==="superadmin";
  const isSA      =user?.role==="superadmin";

  /* Sync token from storage when user is set — never wipe API.token with null/empty
     (login sets sessionStorage + API.token before setUser; a blind ||null here caused 403). */
  useEffect(()=>{
    if(!user){
      API.token=null;
      return;
    }
    try{
      const s=sessionStorage.getItem("sol-session-token");
      if(s) API.token=s;
    }catch(e){/* keep existing API.token from login */}
  },[user]);

  useEffect(()=>{
    try{
      sessionStorage.setItem(DRAFT_KEY,JSON.stringify(form));
    }catch(e){}

    if(remaining<=0){runIdleExpiry();return;}
    idleTimer.current=setTimeout(()=>{
      scheduleIdleExpiry();
    }, Math.min(remaining, MAX_BROWSER_TIMEOUT_MS));

  const calcEqual=useCallback((spl,amt)=>{
    const on=spl.filter(s=>s.checked);const n=on.length;if(!n)return spl;
    const pct=parseFloat((100/n).toFixed(2)),remPct=parseFloat((100-pct*(n-1)).toFixed(2));
    const each=amt?parseFloat((amt/n).toFixed(2)):0,rem=amt?parseFloat((amt-each*(n-1)).toFixed(2)):0;
    let i=0;return spl.map(s=>{if(!s.checked)return{...s,percent:0,value:0};i++;const last=i===n;return{...s,percent:last?remPct:pct,value:last?rem:each};});
  },[]);

  /* ── SUBMIT EXPENSE ─────────────────────────────────────────────────────── */
  const submitExp=()=>{
    const ownerId = (form.ownerId && String(form.ownerId).trim())
      ? String(form.ownerId).trim()
      : (user?.id || "");
    const ownerExists = users.find(u => u.id === ownerId);
    if (!ownerExists) {
      setFormError("Selecciona un titular válido.");
      return;
    }
    const amount=parseMoney(form.amount);
    if(!amount||amount<=0||!String(form.description||"").trim()||!String(form.category||"").trim()||!String(form.date||"").trim()||!form.departmentId||!ownerId){
      setFormError("Completa los campos obligatorios marcados con *");
      return;
    }
    const expDate = new Date(form.date);
    const now = new Date();
    const minDate = new Date(now.getFullYear() - 5, 0, 1);
    const maxDate = new Date(now.getFullYear() + 1, 11, 31);
    if(!form.date || isNaN(expDate.getTime()) || expDate < minDate || expDate > maxDate) {
      setFormError("La fecha debe estar entre los últimos 5 años y el próximo año.");
      return;
    }
    const isInvSubmit=form.expenseType==="invoice";
    const proveedorSubmit=String(form.proveedor||"").trim();
    if(isInvSubmit&&!proveedorSubmit){setFormError("Indica el proveedor.");return;}
    const condicionesPagoSubmit=String(form.paymentTermMode||"0");
    const fechaVencimientoSubmit=condicionesPagoSubmit==="custom"
      ? String(form.invoiceDueDateDirect||"").slice(0,10)
      : addDaysToISODate(form.date, Number(condicionesPagoSubmit)||0);
    if(isInvSubmit&&condicionesPagoSubmit==="custom"&&!fechaVencimientoSubmit){setFormError("Indica la fecha de vencimiento.");return;}
    if(isInvSubmit&&!String(form.vendor||"").trim()){setFormError("Indica el proveedor.");return;}
    const cadSubmit=cadenceToRecurringPayload(form);
    const ptdSubmit=paymentTermDaysFromForm(form);
    const computedDueIso=computeInvoiceDueISO(form);
    const invExtras=isInvSubmit?{
      expenseType:"invoice",
      vendor:String(form.vendor||"").trim(),
      paymentTermDays:ptdSubmit,
      paymentStatus:"unpaid",
      dueDate:computedDueIso||null,
    }:{
      expenseType:"expense",
      paymentStatus:"na",
    };
    const facturaExtras={
      proveedor:proveedorSubmit,
      condicionesPago:condicionesPagoSubmit,
      fechaVencimiento:fechaVencimientoSubmit||null,
    };
    const recExtras=cadSubmit.recurring?{recurring:1,recurrenceRule:cadSubmit.recurrenceRule}:{recurring:0,recurrenceRule:null};
    let paidBy=[{userId:ownerId,amount,pct:100}];
    let splitModeOut=undefined;
    if(splitOn&&splits.filter(s=>s.checked).length>1){
      const sel=splits.filter(s=>s.checked);
      if(sel.length<2){setFormError(t("split.minParticipants"));return;}
      if(spMode==="amount"){
        const sumAmt=sel.reduce((s,x)=>s+(Number(x.value)||0),0);
        if(Math.abs(sumAmt-amount)>0.01){setFormError(t("msg.valueMustMatch")+fmt(amount));return;}
      }
      paidBy=buildPaidByFromSplitState(splits.filter(s=>users.some(u=>u.id===s.userId)),amount,spMode);
      if(paidBy.length>1)splitModeOut=spMode;
    }
    if(!paidBy.length||paidBy.some(p=>!users.some(u=>u.id===p.userId))){
      const fallback=users.some(u=>u.id===ownerId)?ownerId:user.id;
      paidBy=[{userId:fallback,amount,pct:100}];
      splitModeOut=undefined;
    }
    const canSubmitterAutoApprove=String(user.id)===String(ownerId);
    if(AUTH_URL){
      const expApproverIdsAuth=effectiveExpenseApproverIds({category:form.category},cats,users);
      const approvalRequiredForSubmit=expApproverIdsAuth.filter(id=>id!==user.id);
      const shouldAutoApproveSubmitterAuth=canSubmitterAutoApprove&&approvalRequiredForSubmit.includes(user.id);
      void (async()=>{
        const clientRef="tmp_exp_"+genUuid();
        const ivaRateAuth=parseFormIvaRateString(form.ivaRate);
        const ivaAmountAuth=calcIvaParts(amount,ivaRateAuth).iva;
        try{

          const body={

  /* deleteExp — removes expense with permission check and audit trail */
  const deleteExp=(expId)=>{
    const exp=expenses.find(e=>e.id===expId);
    if(!exp)return;
    const canDel=user.id===exp.submittedBy||isAdmin;
    if(!canDel){dispatchSolanaToast(t("action.deleteOwnOnly"),"error");return;}
    const st=getItemStatus(exp,cats,users);
    if(st==="approved"&&!isAdmin){dispatchSolanaToast(t("action.deleteApproved"),"error");return;}
    void (async()=>{
      if(!(await confirmUI(t("action.deleteConfirm"))))return;
      appLog("info","expense_deleted",{itemCode:exp.itemCode,userId:user.id,wasApproved:st==="approved"});
      if(AUTH_URL){
        if(exp._pendingSync){dispatchSolanaToast("Espera a sincronizar este gasto antes de eliminarlo.","error");return;}
        try{
          await API.delete("/expenses/"+encodeURIComponent(expId));
          saveExp(expenses.filter(e=>e.id!==expId));
          setDetailId(null);setPanel(null);
        }catch(e){
          if(isOfflineQueuedError(e)){
            saveExp(expenses.filter(x=>x.id!==expId));
            setDetailId(null);setPanel(null);
            return;
          }
          dispatchSolanaToast(e.message||"No se pudo eliminar.","error");
        }
        return;

      saveExp(expenses.filter(e=>e.id!==expId));
      setDetailId(null);setPanel(null);
    })();
  };

  /* editExp — saves edited expense, triggers re-approval if relevant fields changed */
  const editExp=(expId, updates, oldExp)=>{
    if(AUTH_URL&&oldExp._apiType==="expense"){
      if(oldExp._pendingSync){dispatchSolanaToast("Espera a sincronizar este gasto antes de editarlo.","error");return;}
      void (async()=>{
        try{
          const body={
            amount:updates.amount,
            description:updates.description,
            category:updates.category,
            date:updates.date,
            notes:updates.notes,
            departmentId:updates.departmentId,
            ivaRate:updates.ivaRate,
            ivaAmount:updates.ivaAmount,
            recurring:updates.recurring,
            recurrenceRule:updates.recurrenceRule,
          };
          if(oldExp.status==="rejected"){
            body.status="submitted";
            body.approvalRequired=effectiveExpenseApproverIds({category:updates.category||oldExp.category},cats,users);
          }
          await API.put("/expenses/"+encodeURIComponent(expId),body);
          if(updates.receipt){
            await API.post("/expenses/"+encodeURIComponent(expId)+"/receipt",{
              b64:updates.receipt,
              mediaType:updates.receiptType||"image/jpeg",
            });
          }
          const full=await API.get("/expenses");
          saveExp((full.expenses||[]).map(expenseFromApi));
        }catch(e){
          if(isOfflineQueuedError(e)){
            saveExp(expenses.map(e=>e.id!==expId?e:{...e,...updates}));
            return;
          }
          dispatchSolanaToast(e.message||"No se pudo guardar.","error");
        }
      })();
      return;
    }
    const relevantChanged=REAPPROVAL_FIELDS.some(k=>{
      if(k==="paidBy") return JSON.stringify(updates.paidBy)!==JSON.stringify(oldExp.paidBy);
      if(k==="splitMode") return String(updates.splitMode??"")!==String(oldExp.splitMode??"");
      if(k==="receipt") return (updates.receipt||null)!==(oldExp.receipt||null);
      if(k==="ivaRate") return!expenseIvaRatesEqual(updates.ivaRate,oldExp.ivaRate);
      if(k==="ivaAmount") return Number(updates.ivaAmount??NaN)!==Number(oldExp.ivaAmount??NaN);
      if(k==="departmentId") return String(updates.departmentId||"")!==String(oldExp.departmentId||"");
      return String(updates[k]||"")!==String(oldExp[k]||"");
    });
    const wasApproved=getItemStatus(oldExp,cats,users)==="approved";
    const wasRejected=getItemStatus(oldExp,cats,users)==="rejected";
    const now=new Date().toISOString();
    let newTrail=[...(oldExp.auditTrail||[]),{action:"edited",by:user.id,at:now,
      meta:{fields:REAPPROVAL_FIELDS.filter(k=>{
        if(k==="paidBy") return JSON.stringify(updates.paidBy)!==JSON.stringify(oldExp.paidBy);
        if(k==="splitMode") return String(updates.splitMode??"")!==String(oldExp.splitMode??"");
        if(k==="receipt") return (updates.receipt||null)!==(oldExp.receipt||null);
        if(k==="ivaRate") return!expenseIvaRatesEqual(updates.ivaRate,oldExp.ivaRate);
        if(k==="ivaAmount") return Number(updates.ivaAmount??NaN)!==Number(oldExp.ivaAmount??NaN);
        if(k==="departmentId") return String(updates.departmentId||"")!==String(oldExp.departmentId||"");
        return String(updates[k]||"")!==String(oldExp[k]||"");
      })}}];
    let newApprovals=oldExp.approvals;
    let nextSeen=oldExp.seenBy||[];
    if(wasApproved&&relevantChanged){
      newApprovals={};
      const approverIdsRc=effectiveExpenseApproverIds({category:updates.category||oldExp.category},cats,users);
      let trailExtra=[...newTrail];
      if(approverIdsRc.includes(user.id)){
        newApprovals={[user.id]:"approved"};
        trailExtra=[...trailExtra,{action:"auto_approved",by:user.id,at:now,meta:{reason:"submitter_is_approver"}}];
      }
      newTrail=[...trailExtra,{action:"reapproval_required",by:user.id,at:now}];
      nextSeen=seenByAfterActor(user.id);
      appLog("info","expense_reapproval",{itemCode:oldExp.itemCode,userId:user.id});
    } else if(wasRejected&&relevantChanged){
      newApprovals={};
      newTrail=[...newTrail,{action:"resubmitted",by:user.id,at:now}];
      nextSeen=seenByAfterActor(user.id);
    }
    const updated={...oldExp,...updates,approvals:newApprovals,auditTrail:newTrail,seenBy:nextSeen};
    saveExp(expenses.map(e=>e.id===expId?updated:e));
    appLog("info","expense_edited",{itemCode:oldExp.itemCode,userId:user.id,relevantChanged,wasApproved});
    if(wasApproved&&relevantChanged)dispatchSolanaToast(t("expense.reapprovalDone"),"info");
  };

  const fixResubmitExpense=(expId)=>{
    const exp=expenses.find(e=>e.id===expId);
    if(!exp||getItemStatus(exp,cats,users)!=="rejected"||exp.submittedBy!==user.id)return;
    if(AUTH_URL){
      void (async()=>{
        try{

          const full=await API.get("/expenses");
          saveExp((full.expenses||[]).map(expenseFromApi));
        }catch(e){
          if(isOfflineQueuedError(e)){
            const expApproverIdsRs=effectiveExpenseApproverIds(exp,cats,users);
            const baseTr=[{action:"submitted",by:exp.submittedBy,at:new Date().toISOString()}];
            const{approvals:ra,auditTrail:tr}=autoApprove(exp.submittedBy,expApproverIdsRs,{},baseTr);
            const allR=expApproverIdsRs.length>0&&expApproverIdsRs.every(id=>ra[id]==="approved");
            saveExp(expenses.map(x=>x.id!==expId?x:{...x,status:allR?"approved":"submitted",approvals:ra,approvalRequired:expApproverIdsRs,auditTrail:[...(x.auditTrail||[]),...tr]}));
            return;
          }
          dispatchSolanaToast(e.message||"No se pudo reenviar.","error");
        }
      })();
      return;
    }
    const now=new Date().toISOString();
    saveExp(expenses.map(e=>e.id!==expId?e:{
      ...e,
      approvals:{},
      seenBy:seenByAfterActor(user.id),
      auditTrail:[...(e.auditTrail||[]),{action:"resubmitted",by:user.id,at:now}],
    }));

  const addExpenseComment=(expId,text)=>{

      ...e,
      comments:[...(e.comments||[]),c],
      seenBy:seenByAfterActor(user.id),

    }));
  };
  const markExpenseRead=(expId)=>{
    const exp=expenses.find(e=>e.id===expId);
    if(!exp||(exp.seenBy||[]).includes(user.id))return;
    // Persist to localStorage keyed by user
    try{
      const key="sol-seen-"+user.id;
      const seen=JSON.parse(localStorage.getItem(key)||"[]");

        seen.push(expId);

    saveExp(expenses.map(e=>e.id!==expId?e:{...e,seenBy:[...new Set([...(e.seenBy||[]),user.id])]}));
  };

  const markExpensePaid=(expId,paidAtIso)=>{
    if(!AUTH_URL)return;
    const ex=expenses.find(x=>x.id===expId);
    if(ex&&ex._pendingSync){dispatchSolanaToast("Espera a sincronizar este movimiento.","error");return;}
    const pay=(paidAtIso&&String(paidAtIso).slice(0,10))||new Date().toISOString().slice(0,10);
    void (async()=>{
      try{
        await API.post("/expenses/"+encodeURIComponent(expId)+"/mark-paid",{paidAt:pay});
        const d=await API.get("/expenses");
        saveExp(mapExpensesFromApi(d.expenses||[]));
      }catch(e){
        if(isOfflineQueuedError(e)){
          const ts=Date.parse(pay+"T12:00:00");
          saveExp(expenses.map(x=>x.id!==expId?x:{...x,paymentStatus:"paid",paidAt:Number.isFinite(ts)?ts:Date.now()}));

  /* ── APPROVE ────────────────────────────────────────────────────────────── */
  const approve=async(itemId,action)=>{
    if (action === "rejected") {
      const item = expenses.find(x => x.id === itemId);
      const isFullyApproved = item && (
        item.status === "approved" ||
        (item._apiType === "expense" && item.status === "approved")
      );
      if (isFullyApproved) {
        const confirmed = await confirmUI(
          "Este gasto ha sido aprobado por todos los revisores. ¿Seguro que quieres rechazarlo? Esta acción revertirá la aprobación completa."
        );
        if (!confirmed) return;
      }
    }
    const note=aNote[itemId]||"";
    const item=expenses.find(x=>x.id===itemId);
    if (action === "rejected") {
      const noteVal = (aNote[itemId] || "").trim();
      if (noteVal.length < 10) {
        dispatchSolanaToast("Escribe un motivo de rechazo (mínimo 10 caracteres).", "error");
        return;
      }
    }
    appLog("info","item_"+action,{itemId,itemCode:item?.itemCode,userId:user.id,note:note||undefined});
    if(AUTH_URL){
      if(item&&item._pendingSync){
        dispatchSolanaToast("Este ítem aún no está en el servidor; sincroniza antes de aprobar.","error");
        return;
      }
      void (async()=>{
        try{
          if(action==="approved")await API.post("/expenses/"+encodeURIComponent(itemId)+"/approve",{note:note||undefined});
          else await API.post("/expenses/"+encodeURIComponent(itemId)+"/reject",{note:note||undefined});
          const full=await API.get("/expenses");
          saveExp(mapExpensesFromApi(full.expenses||[]));
        }catch(e){
          if(isOfflineQueuedError(e)){
            saveExp(expenses.map(x=>{
              if(x.id!==itemId)return x;
              if(x._apiType==="expense"&&Array.isArray(x.approvalRequired)&&x.approvalRequired.length>0){
                if(action==="rejected"){
                  return{...x,status:"rejected",rejectionNote:note||x.rejectionNote,approvals:{}};
                }
                const newApprovals={...(x.approvals||{}),[user.id]:"approved"};
                const reqCanon=canonicalApproverIdList(x.approvalRequired,users);
                const all=reqCanon.length>0&&reqCanon.every(id=>newApprovals[id]==="approved");
                return{...x,approvals:newApprovals,...(all?{status:"approved"}:{})};
              }
              return{...x,status:action==="approved"?"approved":"rejected",rejectionNote:action==="rejected"?(note||x.rejectionNote):x.rejectionNote};
            }));
            setANote(p=>({...p,[itemId]:""}));
            return;
          }
          dispatchSolanaToast(e.message||"Error al procesar.","error");
          return;
        }
        setANote(p=>({...p,[itemId]:""}));
      })();
      return;
    }
    saveExp(expenses.map(e=>e.id!==itemId?e:{...e,approvals:{...e.approvals,[user.id]:action},auditTrail:[...e.auditTrail,{action,by:user.id,at:new Date().toISOString(),note}],seenBy:seenByAfterActor(user.id)}));
    setANote(p=>({...p,[itemId]:""}));
  };

  /* ── EARLY RETURN — after all hooks, before derived values that need user ── */
  if(!user)return<div style={{position:"relative",minHeight:"100vh",background:"#3C0A37"}}>
    <div style={{opacity:appReady?1:0,transition:"opacity 400ms ease",transitionDelay:appReady?"600ms":"0ms"}}>
      <LoginScreen users={users} onLogin={u=>{appLog("info","auth:login",{userId:u.id,role:u.role});try{localStorage.setItem(LAST_ACTIVITY_KEY,String(Date.now()));}catch(e){}setIdleTrackingEnabled(true);setUser(u);}} passwords={passwords} sessionRestoreAttempted={sessionRestoreAttempted}/>
    </div>
    <div style={{position:"fixed",inset:0,background:"#3C0A37",display:"flex",alignItems:"center",justifyContent:"center",pointerEvents:"none",opacity:appReady?0:1,transform:appReady?"translateY(-40%)":"translateY(0)",transition:"transform 400ms ease, opacity 400ms ease",transitionDelay:appReady?"600ms":"0ms"}}>
      <div style={{opacity:1}}><SolanaLogo theme="light" size="lg"/></div>
    </div>
  </div>;
  // F3: Force password change for users created with a temporary password
  console.log("[AUTH] mustChangePassword:", user?.mustChangePassword, user?.id);
  if(user.mustChangePassword)return<ForcePasswordChange
    user={user} passwords={passwords} savePasswords={savePasswords}
    saveUsers={saveUsers} users={users}
    onDone={updated=>{setUser(updated);appLog("info","auth:forced_pw_done",{userId:updated.id});}}
  />;
  // auth:session logged only at login transition — not on every render

  /* ── DERIVED (user is guaranteed set below this line) ────────────────────── */
  // Plain consts — hooks cannot appear after a conditional return (Rules of Hooks).
  // t and adminIds are memoized above the early returns where it is safe.
  const expVisible=expenses.filter(e=>getItemStatus(e,cats,users)!=="deleted");
  const byStatus={
    all:expVisible,
    pending:expVisible.filter(e=>getItemStatus(e,cats,users)==="pending"),
    approved:expVisible.filter(e=>getItemStatus(e,cats,users)==="approved"),
    rejected:expVisible.filter(e=>getItemStatus(e,cats,users)==="rejected"),
  };
  const filtered=(byStatus[expFlt]||expVisible).filter(e=>{
    const src=expSrc.toLowerCase().trim();
    if(src){
      const matchDesc=e.description.toLowerCase().includes(src);
      const matchCode=(e.itemCode||"").toLowerCase().includes(src);
      const matchVendor=e.expenseType==="invoice"&&String(e.vendor||"").toLowerCase().includes(src);
      if(!matchDesc&&!matchCode&&!matchVendor)return false;
    }
    if(catFlt&&e.category!==catFlt)return false;
    if(submFlt&&e.submittedBy!==submFlt)return false;
    if(dateFrom&&e.date<dateFrom)return false;
    if(dateTo&&e.date>dateTo)return false;
    if(expKindFlt==="invoice"&&e.expenseType!=="invoice")return false;
    if(expKindFlt==="expense"&&e.expenseType==="invoice")return false;
    return true;
  });
  const dateFilterActive = dateFrom !== "" || dateTo !== "";
  const activeFilterCount = [catFlt, submFlt, dateFilterActive?"range":"", expKindFlt!=="all"?"kind":""]
    .filter(Boolean).length;
  const isApprover = isAdmin || cats.some(c=>{
    if(c.archived)return false;
    return effectiveExpenseApproverIds({category:c.name},cats,users).includes(user.id);
  });
  const myPending=AUTH_URL
    ?expenses.filter(e=>{
      if(e._apiType!=="expense"||e._pendingSync)return false;
      if(getItemStatus(e,cats,users)!=="pending")return false;
      const ids=effectiveExpenseApproverIds(e,cats,users);
      return ids.includes(user.id)&&approvalVoteFor(e.approvals,user.id,users)!=="approved";
    })
    :expenses.filter(e=>{
      const ids=effectiveExpenseApproverIds(e,cats,users);
      return ids.includes(user.id)&&getItemStatus(e,cats,users)==="pending"&&approvalVoteFor(e.approvals,user.id,users)!=="approved";
    });
  /* Approved: totApproved = sum EUR per ítem aprobado (all expenseType); per-person = reparto paidBy */
  const approvedForTot=expenses.filter(e=>getItemStatus(e,cats,users)==="approved");
  const totApproved=approvedForTot.reduce((s,e)=>s+eurForExpense(e),0);
  const perPerson=users.map(u=>({
    ...u,
    total:approvedForTot.reduce((sum,e)=>sum+shareEurInExpense(e,u.id),0),
  })).sort((a,b)=>b.total-a.total);
  const totFixed=expenses.reduce((s,e)=>{
    if(!e.cadenceKey||e.cadenceKey==="once")return s;
    if(getItemStatus(e,cats,users)!=="approved")return s;
    return s+invoiceForecastMonthlyEUR(e);
  },0);

  const go=v=>{setView(v);if(v!=="expenses"){setDetailId(null);setPanel(null);}};
  const rpOpen=view==="expenses"&&(panel==="new"||(panel==="detail"&&detailId));
  const totalBadge=myPending.length;
  const expenseNavBadge=expenses.filter(e=>{
    if((e.seenBy||[]).includes(user.id))return false;
    const seenKey="sol-seen-"+user.id;
    const localSeen=(()=>{try{return JSON.parse(localStorage.getItem(seenKey)||"[]");}catch(e){return[];}})();
    if(localSeen.includes(e.id))return false;
    const isSubmitter=e.submittedBy===user.id;
    const isCommenter=(e.comments||[]).some(c=>c.by===user.id);
    const isPaidBy=(e.paidBy||[]).some(p=>p.userId===user.id);
    if(!isSubmitter&&!isCommenter&&!isPaidBy)return false;
    return(e.comments||[]).length>0;
  }).length;

  const navItems=[
    {id:"dashboard",label:t("nav.dashboard")},
    {id:"expenses", label:t("nav.expenses"),badge:expenseNavBadge},
    {id:"approvals",label:t("nav.approvals"),badge:(isApprover||isAdmin)?totalBadge:0},
    {id:"reports",  label:t("nav.reports")},
    // Settings (profile) — accessed via profile avatar
  ];
  const mobNav=[
    {id:"dashboard",label:t("nav.dashboard"),badge:0},
    {id:"expenses", label:t("nav.expenses"),badge:expenseNavBadge},
    {id:"approvals",label:t("nav.approvals"),badge:(isApprover||isAdmin)?totalBadge:0},
    {id:"reports",  label:t("nav.reports"),badge:0},

  ];

  /* ── CONTEXT VALUE ──────────────────────────────────────────────────────── */
  const ctxVal={
    t,user,users,expenses,cats,passwords,ivaRates,saveIvaRates,
    saveUsers,saveExp,saveCats,savePasswords,
    departments,departmentsWithStats,refreshDepartments,defaultDeptId,
    isAdmin,isApprover,isSA,getUser,ledgerLoading,markExpensePaid,
    view,setView,go,panel,setPanel,openNew,openNewInvoice,
    detailId,setDetailId,
    form,setForm,splitOn,setSplitOn,splits,setSplits,spMode,setSpMode,
    receipt,setReceipt,recPrev,setRecPrev,formError,setFormError,
    handleReceiptFile,calcEqual,fileRef,startCam,capturePhoto,stopCam,receiptAltHandlerRef,
    submitExp,resetForm,
    aNote,setANote,approve,
    myPending,byStatus,filtered,
    totApproved,totFixed,perPerson,
    expFlt,setExpFlt,expSrc,setExpSrc,activeFilterCount,
    expKindFlt,setExpKindFlt,
    catFlt,setCatFlt,submFlt,setSubmFlt,dateFrom,setDateFrom,dateTo,setDateTo,
    clearMyExpenseFilter,
    importRef,
    removeAttachment,editExp,deleteExp,adminIds,
    fixResubmitExpense,addExpenseComment,markExpenseRead,
    goToMyRejected,
    onSignOut,
    setUser,
  };

  /* ── RENDER ─────────────────────────────────────────────────────────────── */
  return(
    <Ctx.Provider value={ctxVal}>
      <div style={{display:"flex",height:"100vh",width:"100vw",fontFamily:"'DM Sans',system-ui,sans-serif",background:"#F5F0EA",color:"#1A0E18",overflow:"hidden",WebkitOverflowScrolling:"touch"}}>
        {AUTH_URL&&!online&&(
          <div style={{position:"fixed",top:0,left:0,right:0,zIndex:7500,background:"rgba(245,240,234,0.95)",color:"#5C4A56",fontSize:11,padding:"7px 14px",textAlign:"center",borderBottom:"1px solid rgba(60,10,55,0.1)",fontWeight:500}}>
            Sin conexión, los cambios se guardarán localmente
          </div>
        )}
        {toasts.length>0&&(
          <div style={{position:"fixed",bottom:16,left:"50%",transform:"translateX(-50%)",zIndex:7600,display:"flex",flexDirection:"column",gap:8,maxWidth:"min(92vw,380px)",pointerEvents:"none"}}>
            {toasts.map(t=>(
              <div key={t.id} style={{
                pointerEvents:"auto",
                padding:"10px 14px",
                borderRadius:8,
                fontSize:12,
                fontWeight:500,
                boxShadow:"0 4px 14px rgba(0,0,0,0.12)",
                background:t.kind==="error"?"#FEE2E2":t.kind==="conflict"?"#FEF3C7":t.kind==="sync"?"#E8F5E9":t.kind==="offline"?"#E0F2FE":"#fff",
                color:t.kind==="error"?"#7F1D1D":t.kind==="conflict"?"#92400E":"#1A0E18",
                border:t.kind==="sync"?"1px solid #A7F3D0":t.kind==="offline"?"1px solid #7DD3FC":"1px solid rgba(0,0,0,0.06)",
              }}>{t.message}</div>
            ))}
          </div>
        )}
        {confirmModal&&(
          <div style={{position:"fixed",inset:0,zIndex:7700,background:"rgba(0,0,0,0.35)",display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
            <div style={{width:"min(92vw,420px)",background:"#fff",borderRadius:12,padding:"16px 16px 14px",boxShadow:"0 10px 30px rgba(0,0,0,0.25)"}}>
              <div style={{fontWeight:700,fontSize:14,color:G,marginBottom:8}}>Confirmación</div>
              <div style={{fontSize:13,color:"#1A0E18",lineHeight:1.35,marginBottom:14,whiteSpace:"pre-wrap"}}>{confirmModal.message}</div>
              <div style={{display:"flex",gap:8}}>
                <button type="button" className="btn-secondary" style={{flex:1,fontSize:12,padding:"7px 10px"}} onClick={()=>{
                  try{confirmModal.resolve(false);}catch(e){}
                  setConfirmModal(null);
                }}>Cancelar</button>
                <button type="button" className="btn-primary" style={{flex:1,fontSize:12,padding:"7px 10px"}} onClick={()=>{
                  try{confirmModal.resolve(true);}catch(e){}
                  setConfirmModal(null);
                }}>Confirmar</button>
              </div>
            </div>
          </div>
        )}
        {AUTH_URL&&ledgerLoading&&(
          <div style={{position:"fixed",inset:0,background:"rgba(245,240,234,0.88)",zIndex:8000,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:600,color:G}}>
            Cargando datos…
          </div>
        )}
        <style>{`
          *{box-sizing:border-box;}
          h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:600;}
          h2{font-family:'DM Sans',system-ui,sans-serif;font-size:16px;font-weight:600;}
          ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(60,10,55,0.2);border-radius:2px;}
          .card{background:#fff;border-radius:11px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
          .inp{width:100%;background:#FAF7F8;border:1.5px solid #DDD6CC;border-radius:7px;padding:8px 11px;font-size:14px;color:#1A0E18;font-family:inherit;transition:border-color 0.15s;outline:none;display:block;}
          .inp:focus{border-color:${G};}
          .expense-form-fields-wrap .inp:focus{border-color:var(--expense-action, ${G})!important;}
          .lbl{font-size:12px;font-weight:600;color:#6B7B72;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:4px;display:block;}
          .btn-primary{background:${G};color:#fff;border:none;padding:9px 18px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
          .btn-primary:hover{background:${GH};}.btn-primary:disabled{opacity:0.5;cursor:default;}
          .btn-secondary{background:transparent;color:${G};border:1.5px solid ${G};padding:8px 18px;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;}
          .btn-secondary:hover{background:${GL};}
          .btn-sm{background:${G};color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;}
          .btn-danger{background:transparent;color:#991B1B;border:1.5px solid #ECA3A3;padding:8px 18px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
          .btn-danger:hover{background:#FEE2E2;}
          .row-hover:hover{background:rgba(60,10,55,0.04)!important;}
          @keyframes spin{to{transform:rotate(360deg);}}
          @keyframes slideIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
          @keyframes fadeIn{from{opacity:0;transform:translateY(-4px);}to{opacity:1;transform:translateY(0);}}
          @keyframes expandDown{from{opacity:0;max-height:0;}to{opacity:1;max-height:600px;}}
          .slide-in{animation:slideIn 0.18s ease;}
          .fade-in{animation:fadeIn 0.15s ease;}
          /* Smooth transitions on interactive elements */
          .card{transition:box-shadow 0.15s;}
          .card:hover{box-shadow:0 3px 10px rgba(0,0,0,0.09);}
          .row-hover{transition:background 0.1s;}
          .btn-primary,.btn-secondary,.btn-danger,.btn-sm{transition:opacity 0.15s,transform 0.1s,background 0.15s;}
          .btn-primary:active,.btn-secondary:active,.btn-danger:active,.btn-sm:active{transform:scale(0.97);}
          /* Right panel slide */
          .panel-slide{animation:slideIn 0.2s cubic-bezier(0.22,1,0.36,1);}
          /* Bill detail expand */
          .expand-down{animation:expandDown 0.2s ease;}
          /* Respect reduced motion */
          @media(prefers-reduced-motion:reduce){
            *{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}
          }
          @media(max-width:767px){.dt-only{display:none!important;}}
          @media(min-width:768px){.mob-only{display:none!important;}}
        `}</style>

        {/* Session expired overlay */}
        {sessionExpired&&(
          <div style={{position:"fixed",inset:0,background:"rgba(245,240,234,0.97)",zIndex:9999,
            display:"flex",alignItems:"center",justifyContent:"center",
            fontFamily:"'DM Sans',system-ui,sans-serif",backdropFilter:"blur(4px)"}}>
            <div style={{background:"#fff",borderRadius:16,padding:"36px 32px",maxWidth:380,
              width:"90%",textAlign:"center",
              boxShadow:"0 4px 32px rgba(60,10,55,0.14),0 1px 4px rgba(0,0,0,0.06)",
              border:"1px solid #EDE8E0"}}>
              <div style={{marginBottom:20}}><SolanaLogo theme="dark" size="md" variant="auth"/></div>
              <div style={{fontSize:18,fontWeight:700,color:"#3C0A37",marginBottom:8,
                fontFamily:"'Playfair Display',serif"}}>{t("session.expiredTitle")}</div>
              <p style={{fontSize:13,color:"#8A7A87",marginBottom:24,lineHeight:1.6}}>{t("session.expiredMsg")}</p>
              <button style={{width:"100%",background:"#3C0A37",color:"#FAF7F2",border:"none",
                borderRadius:9,padding:"12px",fontSize:15,fontWeight:700,cursor:"pointer",
                fontFamily:"inherit"}}
                onClick={()=>{setSessionExpired(false);}}>
                {t("login.signIn")}
              </button>
            </div>
          </div>
        )}
        {/* Desktop sidebar */}
        <div className="dt-only" style={{width:198,background:G,display:"flex",flexDirection:"column",padding:"15px 8px",flexShrink:0,overflowY:"auto"}}>
          <div style={{padding:"3px 6px 14px",borderBottom:"1px solid rgba(255,255,255,0.09)",marginBottom:9,cursor:"pointer"}} onClick={()=>go("dashboard")}>
            <SolanaLogo theme="light" size="md"/>
            <div style={{fontSize:8,color:"rgba(250,247,242,0.28)",marginTop:4,paddingLeft:1,letterSpacing:"0.06em",textTransform:"uppercase"}}>Gestión de Gastos</div>
          </div>
          {navItems.map(n=>(
            <div key={n.id} onClick={()=>go(n.id)} style={{padding:"6px 9px",borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:500,marginBottom:2,transition:"background 0.15s",background:view===n.id?"rgba(250,247,242,0.12)":"transparent",color:view===n.id?"#FAF7F2":"rgba(250,247,242,0.5)",borderLeft:`3px solid ${view===n.id?T:"transparent"}`,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
              <span style={{display:"flex",alignItems:"center",gap:7,minWidth:0}}>
                <span>{n.label}</span>
              </span>
              {n.badge>0&&<span style={{background:BL,color:"#fff",borderRadius:"50%",width:15,height:15,display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,flexShrink:0}}>{n.badge}</span>}
            </div>
          ))}
          <div style={{marginTop:"auto",paddingTop:10,borderTop:"1px solid rgba(255,255,255,0.07)"}}>
            <div style={{display:"flex",alignItems:"flex-start",gap:8,marginBottom:8}}>
              <div onClick={()=>go("settings")} title={t("login.profile")} style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:6,cursor:"pointer",borderRadius:7,padding:"4px 6px",transition:"background 0.15s",background:view==="settings"?"rgba(250,247,242,0.12)":"transparent"}}
                onMouseEnter={e=>e.currentTarget.style.background="rgba(250,247,242,0.12)"}
                onMouseLeave={e=>e.currentTarget.style.background=view==="settings"?"rgba(250,247,242,0.12)":"transparent"}>
                {user.avatar
                  ?<img src={user.avatar} alt="" style={{width:28,height:28,borderRadius:"50%",objectFit:"cover",flexShrink:0,border:"1.5px solid rgba(250,247,242,0.25)"}}/>
                  :<div style={{width:28,height:28,borderRadius:"50%",background:T,display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:700,color:"#fff",flexShrink:0}}>{inits(user.name)}</div>
                }
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:10,fontWeight:600,color:"#FAF7F2",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.name}</div>
                  <div style={{fontSize:8,color:"rgba(250,247,242,0.75)"}}>{user.role==="superadmin"?t("role.superadmin"):isAdmin?t("role.admin"):t("role.user")}</div>
                </div>
                <div style={{fontSize:10,color:"#FAF7F2",opacity:0.75,fontWeight:600}}>···</div>
              </div>
            </div>
            <button style={{width:"100%",padding:4,borderRadius:4,border:"1px solid rgba(250,247,242,0.18)",background:"transparent",color:"rgba(250,247,242,0.75)",fontSize:9,cursor:"pointer",fontFamily:"inherit"}} onClick={onSignOut}>{t("nav.signOut")}</button>
          </div>
        </div>

        {/* Content area */}
        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          {/* Mobile header */}
          <div className="mob-only" style={{background:G,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
            <div style={{cursor:"pointer"}} onClick={()=>go("dashboard")}><SolanaLogo theme="light" size="sm"/></div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div onClick={()=>go("settings")} title={t("login.profile")} style={{cursor:"pointer",flexShrink:0,width:40,height:40,display:"flex",alignItems:"center",justifyContent:"center",borderRadius:"50%"}}>
                {user.avatar
                  ?<img src={user.avatar} alt="" style={{width:34,height:34,borderRadius:"50%",objectFit:"cover",border:"2px solid rgba(250,247,242,0.5)"}}/>
                  :<div style={{width:34,height:34,borderRadius:"50%",background:T,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff"}}>{inits(user.name)}</div>
                }
              </div>
            </div>
          </div>

          <div style={{flex:1,overflow:"hidden",display:"flex",minWidth:0}}>
            <div style={{flex:1,overflowY:"auto",padding:"14px 12px 80px",minWidth:0,WebkitOverflowScrolling:"touch"}}>
              {view==="dashboard"&&<DashboardView/>}
              {view==="expenses" &&<ExpensesView/>}
              {view==="approvals"&&<ApprovalsView/>}
              {view==="reports"  &&<ReportsView/>}
              {view==="settings" &&<SettingsView/>}
            </div>
            {rpOpen&&(
              <div className="dt-only panel-slide" style={{width:350,borderLeft:"1px solid #E5DDD2",overflowY:"auto",padding:16,flexShrink:0,background:"#fff"}}>
                {panel==="new"?<NewPanel/>:<DetailPanel/>}
              </div>
            )}
          </div>

          {/* Mobile bottom nav — badge inline, no absolute positioning */}
          <div className="mob-only" style={{background:"#fff",borderTop:"1px solid #E5DDD2",display:"flex",flexShrink:0,position:"fixed",bottom:0,left:0,right:0,zIndex:50}}>
            {mobNav.map(n=>(
              <div key={n.id} style={{flex:1,padding:"8px 2px 6px",textAlign:"center",cursor:"pointer",borderTop:`2px solid ${view===n.id?G:"transparent"}`}} onClick={()=>go(n.id)}>
                <div style={{display:"inline-flex",alignItems:"center",gap:2,flexWrap:"wrap",justifyContent:"center"}}>
                  <span style={{fontSize:11,fontWeight:view===n.id?700:500,color:view===n.id?G:"#6B7B72"}}>{n.label}</span>
                  {n.badge>0&&<span style={{background:BL,color:"#fff",borderRadius:"50%",width:13,height:13,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,flexShrink:0}}>{n.badge}</span>}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Mobile new expense overlay */}
        {panel==="new"&&view==="expenses"&&(
          <div className="mob-only" style={{position:"fixed",inset:0,background:"#F5F0EA",zIndex:100,display:"flex",flexDirection:"column"}}>
            <div style={{background:G,padding:"8px 12px",display:"flex",alignItems:"center",gap:9,flexShrink:0}}>
              <button style={{border:"none",background:"none",color:"#FAF7F2",fontSize:19,cursor:"pointer",lineHeight:1}} onClick={()=>{resetForm();setPanel(null);}}>&#8592;</button>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"#FAF7F2"}}>{form.expenseType==="invoice"?t("dash.newInvoice"):t("form.newExpense")}</div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:12,paddingBottom:18}}><NewPanel/></div>
          </div>
        )}

        {/* Import file input */}
        <input ref={importRef} type="file" accept="application/json" style={{display:"none"}} onChange={e=>{
          const f=e.target.files?.[0];if(!f)return;
          if(f.size>20*1024*1024){dispatchSolanaToast("Archivo demasiado grande (máx 20 MB para importación JSON).","error");e.target.value="";return;}
          const r=new FileReader();
          r.onload=ev=>{
            try{
              if(AUTH_URL){dispatchSolanaToast("La importación JSON no escribe en el servidor. Desactiva AUTH_URL o usa la API.","error");return;}
              const d=JSON.parse(ev.target.result);
              const errs=[];
              if(d.expenses!==undefined&&!Array.isArray(d.expenses))errs.push("expenses must be array");
              if(!d.expenses&&!d.users&&!d.cats)errs.push("no valid keys found");
              if(Array.isArray(d.expenses)&&d.expenses.length>0&&(typeof d.expenses[0].amount!=="number"))errs.push("expenses malformed");
              if(errs.length>0){dispatchSolanaToast("Import rejected: "+errs.join(", "),"error");return;}
              const counts={};
              if(d.expenses){saveExp(d.expenses);counts.expenses=d.expenses.length;}
              if(d.users){saveUsers(d.users);counts.users=d.users.length;}
              if(d.cats){saveCats(d.cats);counts.cats=d.cats.length;}
              appLog("info","json_imported",{file:f.name,userId:user?.id,...counts});
              dispatchSolanaToast(t("msg.importSuccess"),"info");
            }catch(err){
              appLog("error","json_import_failed",{file:f.name,error:err?.message});
              dispatchSolanaToast(t("msg.invalidFile"),"error");
            }
          };
          r.readAsText(f);e.target.value="";
        }}/>
        {/* Hidden file ref for receipt upload */}
        <input ref={fileRef} type="file" accept={RECEIPT_FILE_ACCEPT} style={{display:"none"}} onChange={handleReceiptFile}/>

        {camOn&&(
          <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"#000",zIndex:9999,display:"flex",flexDirection:"column"}}>
            <video ref={videoRef} autoPlay playsInline muted style={{flex:1,width:"100%",minHeight:0,objectFit:"cover"}}/>
            <canvas ref={canvasRef} style={{display:"none"}}/>
            <div style={{background:"rgba(0,0,0,0.92)",padding:"14px 18px 22px",display:"flex",gap:11,justifyContent:"center",alignItems:"center",flexShrink:0}}>
              <button type="button" style={{background:T,color:"#fff",border:"none",borderRadius:9,padding:"13px 36px",fontSize:16,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}} onClick={capturePhoto}>{t("action.capturePhoto")}</button>
              <button type="button" style={{background:"transparent",color:"rgba(255,255,255,0.6)",border:"1.5px solid rgba(255,255,255,0.22)",borderRadius:9,padding:"13px 20px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}} onClick={stopCam}>{t("action.cancel")}</button>
            </div>
          </div>
        )}
      </div>
    </Ctx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppErrorBoundary><SolanaExpenses/></AppErrorBoundary>);
</script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>
</body>
</html>
