function formatSettingKeyLabel(key){
  return String(key||"").split("_").filter(Boolean).map(w=>w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(" ");
}
function inferServerSettingWidget(key,value){
  const numKey=key==="iva_default"||["_threshold","_days","_mb","_above"].some(s=>key.endsWith(s));
  if(numKey)return"number";
  if(Array.isArray(value))return value.length===0||value.every(x=>typeof x==="string")?"chips":"json";
  if(typeof value==="boolean")return"boolean";
  if(value!==null&&typeof value==="object")return"json";
  return"text";
}
function draftFromSchemaRow(row){
  const v=row.value;
  const w=inferServerSettingWidget(row.key,v);
  if(w==="number")return v===null||v===undefined?"":String(v);
  if(w==="chips")return Array.isArray(v)?v.filter(x=>typeof x==="string").slice():[];
  if(w==="boolean")return!!v;
  if(w==="json")return typeof v==="string"?v:JSON.stringify(v,null,2);
  if(v===null||v===undefined)return"";
  if(typeof v==="object")return JSON.stringify(v);
  return String(v);
}
function buildPayloadForSetting(key,schemaValue,draft,w){
  if(w==="number"){
    const n=parseFloat(String(draft).replace(",","."));
    if(!Number.isFinite(n)||n<0)throw new Error("NUM");
    return n;
  }
  if(w==="chips"){
    if(!Array.isArray(draft))throw new Error("ARR");
    return draft.slice();
  }
  if(w==="boolean")return!!draft;
  if(w==="json")return JSON.parse(String(draft));
  return draft;
}

function ServerSettingsView(){
  const{t}=useApp();
  const [rows,setRows]=useState([]);
  const [drafts,setDrafts]=useState({});
  const [chipBuf,setChipBuf]=useState({});
  const [loading,setLoading]=useState(true);
  const [loadErr,setLoadErr]=useState("");
  const [rowErr,setRowErr]=useState({});
  const [saving,setSaving]=useState({});

  const authTok=useCallback(()=>{
    try{API.ensureSessionToken();}catch(e){}
    return API.token||(typeof sessionStorage!=="undefined"?sessionStorage.getItem("sol-session-token"):"")||"";
  },[]);

  const loadSchema=useCallback(async()=>{
    if(!AUTH_URL){setLoading(false);setRows([]);setLoadErr("");return;}
    setLoadErr("");setLoading(true);
    try{
      const r=await fetch(AUTH_URL+"/settings/schema",{headers:{Authorization:"Bearer "+authTok()}});
      const d=await r.json().catch(()=>({}));
      if(!r.ok){setLoadErr(d.error||t("settings.serverLoadError"));setRows([]);setDrafts({});return;}
      const sch=(Array.isArray(d.schema)?[...d.schema]:[]).sort((a,b)=>String(a.key).localeCompare(String(b.key)));
      setRows(sch);
      const dr={};
      sch.forEach(row=>{dr[row.key]=draftFromSchemaRow(row);});
      setDrafts(dr);
      setRowErr({});
      setChipBuf({});
    }catch(e){setLoadErr(e.message||t("settings.serverLoadError"));setRows([]);}
    finally{setLoading(false);}
  },[authTok,t]);

  useEffect(()=>{void loadSchema();},[loadSchema]);

  const saveRow=async row=>{
    const key=row.key;
    const w=inferServerSettingWidget(key,row.value);
    setRowErr(e=>({...e,[key]:""}));
    setSaving(s=>({...s,[key]:true}));
    let payloadVal;
    try{
      payloadVal=buildPayloadForSetting(key,row.value,drafts[key],w);
    }catch(e){
      let m=t("msg.genericShort");
      if(e&&e.message==="NUM")m="Número ≥ 0 requerido.";
      else if(e&&e.message==="ARR")m="Lista inválida.";
      else if(w==="json")m="JSON inválido.";
      setRowErr(er=>({...er,[key]:m}));
      setSaving(s=>({...s,[key]:false}));
      return;
    }
    try{
      const r=await fetch(AUTH_URL+"/settings/"+encodeURIComponent(key),{
        method:"PUT",
        headers:{"Content-Type":"application/json",Authorization:"Bearer "+authTok()},
        body:JSON.stringify({value:payloadVal}),
      });
      const d=await r.json().catch(()=>({}));
      if(!r.ok){setRowErr(er=>({...er,[key]:d.error||t("msg.genericShort")}));return;}
      setRows(prev=>prev.map(x=>x.key===key?{...x,value:d.value!==undefined?d.value:payloadVal,updatedAt:Date.now(),updatedBy:x.updatedBy}:x));
      setDrafts(prev=>{
        const next={...prev};
        const merged={...row,value:d.value!==undefined?d.value:payloadVal};
        next[key]=draftFromSchemaRow(merged);
        return next;
      });
      dispatchSolanaToast(t("settings.serverSaveOk"),"sync");
      void fetchAndApplyServerSettings(AUTH_URL,authTok());
    }catch(e){setRowErr(er=>({...er,[key]:e.message||t("msg.genericShort")}));}
    setSaving(s=>({...s,[key]:false}));
  };

  if(!AUTH_URL){
    return(
      <p style={{fontSize:13,color:"#6B7B72"}}>{t("settings.serverOffline")}</p>
    );
  }

  return(
    <>
      <div style={{fontSize:12,color:"#5C6B62",background:"#EDE8E0",borderRadius:8,padding:"10px 12px",marginBottom:16,lineHeight:1.45}}>{t("settings.serverBanner")}</div>
      {loading&&<div style={{fontSize:13,color:"#6B7B72"}}>…</div>}
      {loadErr&&!loading&&<div style={{fontSize:12,padding:"8px 10px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",marginBottom:10}}>{loadErr}</div>}
      {!loading&&!loadErr&&rows.map(row=>{
        const key=row.key;
        const w=inferServerSettingWidget(key,row.value);
        const lab=formatSettingKeyLabel(key);
        const desc=row.description||"";
        const err=rowErr[key];
        const busy=!!saving[key];
        return(
          <div key={key} style={{marginBottom:18,paddingBottom:16,borderBottom:"1px solid #F0EBE3"}}>
            <div style={{fontWeight:600,fontSize:13,color:"#1A0E18",marginBottom:4}}>{lab}</div>
            {desc&&<div style={{fontSize:11,color:"#9CAA9F",marginBottom:8,lineHeight:1.4}}>{desc}</div>}
            {w==="number"&&(
              <input type="number" min={0} step="any" className="inp" style={{fontSize:14,maxWidth:280}} value={drafts[key]??""} onChange={e=>setDrafts(d=>({...d,[key]:e.target.value}))}/>
            )}
            {w==="text"&&(
              <input type="text" className="inp" style={{fontSize:14}} value={drafts[key]??""} onChange={e=>setDrafts(d=>({...d,[key]:e.target.value}))}/>
            )}
            {w==="boolean"&&(
              <label style={{display:"inline-flex",alignItems:"center",gap:8,cursor:"pointer",fontSize:13}}>
                <input type="checkbox" role="switch" style={{width:18,height:18,accentColor:G}} checked={!!drafts[key]} onChange={e=>setDrafts(d=>({...d,[key]:e.target.checked}))}/>
                <span>{drafts[key]?t("label.yes"):t("label.no")}</span>
              </label>
            )}
            {w==="chips"&&(
              <div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:8}}>
                  {(Array.isArray(drafts[key])?drafts[key]:[]).map((chip,idx)=>(
                    <span key={idx} style={{display:"inline-flex",alignItems:"center",gap:4,background:"#EDE8E0",color:"#1A0E18",fontSize:12,padding:"4px 8px",borderRadius:6}}>
                      {chip}
                      <button type="button" style={{border:"none",background:"transparent",cursor:"pointer",fontSize:14,lineHeight:1,color:"#6B7B72",padding:0}} onClick={()=>setDrafts(d=>{
                        const arr=[...(Array.isArray(d[key])?d[key]:[])];
                        arr.splice(idx,1);
                        return{...d,[key]:arr};
                      })} aria-label={t("action.remove")}>×</button>
                    </span>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <input type="text" className="inp" style={{flex:1,minWidth:160,fontSize:13}} placeholder="EUR, USD…" value={chipBuf[key]??""} onChange={e=>setChipBuf(b=>({...b,[key]:e.target.value}))}
                    onKeyDown={e=>{
                      if(e.key==="Enter"||e.key===","){
                        e.preventDefault();
                        const raw=(chipBuf[key]||"").trim();

                        const parts=raw.split(",").map(s=>s.trim()).filter(Boolean);
                        setDrafts(d=>{
                          const arr=[...(Array.isArray(d[key])?d[key]:[])];
                          parts.forEach(p=>{if(!arr.includes(p))arr.push(p);});
                          return{...d,[key]:arr};
                        });
                        setChipBuf(b=>({...b,[key]:""}));
                      }
                    }}/>
                  <button type="button" className="btn-secondary" style={{fontSize:11,padding:"6px 10px"}} onClick={()=>{
                    const raw=(chipBuf[key]||"").trim();
                    if(!raw)return;
                    const parts=raw.split(",").map(s=>s.trim()).filter(Boolean);
                    setDrafts(d=>{
                      const arr=[...(Array.isArray(d[key])?d[key]:[])];
                      parts.forEach(p=>{if(!arr.includes(p))arr.push(p);});
                      return{...d,[key]:arr};
                    });
                    setChipBuf(b=>({...b,[key]:""}));
                  }}>{t("action.add")}</button>
                </div>
              </div>
            )}
            {w==="json"&&(
              <textarea className="inp" style={{fontSize:12,minHeight:120,fontFamily:"ui-monospace,monospace",width:"100%"}} value={drafts[key]??""} onChange={e=>setDrafts(d=>({...d,[key]:e.target.value}))}/>
            )}
            {err&&<div style={{fontSize:11,marginTop:6,color:"#B91C1C"}}>{err}</div>}
            <div style={{marginTop:10}}>
              <button type="button" className="btn-primary" style={{fontSize:12,padding:"7px 16px"}} disabled={busy} onClick={()=>void saveRow(row)}>{busy?"…":t("action.save")}</button>
            </div>
          </div>
        );
      })}
    </>
  );
}

    return tok?{Authorization:"Bearer "+tok,"Content-Type":"application/json"}:null;
  };

  const loadPending=async()=>{
    if(!AUTH_URL){setLoading(false);setPending([]);return;}
    const h=authHeaders();
    if(!h){setLoading(false);setPending([]);return;}
    setLoading(true);setMsg("");
    try{
      const r=await fetch(AUTH_URL+"/admin/users/pending",{headers:{Authorization:h.Authorization}});
      if(r.status===403||r.status===401){setMsg("No autorizado.");setPending([]);setLoading(false);return;}
      const d=await r.json().catch(()=>({}));
      setPending(Array.isArray(d.users)?d.users:[]);
    }catch(e){setMsg("No se pudo conectar al servidor.");setPending([]);}
    setLoading(false);
  };

  useEffect(()=>{void loadPending();},[user?.id]);

  const act=async(userId,action)=>{
    const h=authHeaders();
    if(!h)return;
    setActionLoading(userId);setMsg("");
    try{
      const r=await fetch(`${AUTH_URL}/admin/users/${encodeURIComponent(userId)}/${action}`,{
        method:"POST",
        headers:h,
        body:JSON.stringify({adminId:user?.id||"admin"}),
      });
      const d=await r.json().catch(()=>({}));
      if(!r.ok){setMsg(d.error||t("msg.genericShort"));setActionLoading(null);return;}
      setPending(p=>p.filter(u=>u.id!==userId));
      setMsg(action==="approve"?"Usuario aprobado.":"Usuario denegado.");
    }catch(e){setMsg("Error de conexión.");}
    setActionLoading(null);
  };

  if(!AUTH_URL)return null;

        {pending.map(u=>(
          <div key={u.id} style={{padding:"10px 0",borderBottom:"1px solid #F5F0EA",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>

function padDept2(n){return n<10?"0"+n:String(n);}
function calendarMonthRangeJs(d){
  const y=d.getFullYear(),m=d.getMonth();
  const from=`${y}-${padDept2(m+1)}-01`;
  const last=new Date(y,m+1,0).getDate();
  const to=`${y}-${padDept2(m+1)}-${padDept2(last)}`;
  return{from,to};
}
function fiscalYearRangeFromMmDd(mmdd,now){
  const s=String(mmdd||"01-01").trim();
  const m=s.match(/^(\d{2})-(\d{2})$/);
  const mm=m?parseInt(m[1],10):1;
  const dd=m?parseInt(m[2],10):1;
  const y=now.getFullYear();
  const cur=new Date(y,now.getMonth(),now.getDate());
  let start=new Date(y,mm-1,dd);
  if(cur<start)start=new Date(y-1,mm-1,dd);
  const end=new Date(start);
  end.setFullYear(end.getFullYear()+1);
  end.setDate(end.getDate()-1);
  const ymd=x=>`${x.getFullYear()}-${padDept2(x.getMonth()+1)}-${padDept2(x.getDate())}`;
  return{from:ymd(start),to:ymd(end)};
}
function localApprovedExpenseDeptSpend(expenses,cats,users,fromStr,toStr){
  const out={};
  for(const e of expenses||[]){
    if(!e||e.expenseType==="invoice")continue;
    if(getItemStatus(e,cats,users)!=="approved")continue;
    const ds=e.date||"";
    if(ds<fromStr||ds>toStr)continue;
    const id=e.departmentId;
    if(!id)continue;
    out[id]=(out[id]||0)+eurForExpense(e);
  }
  return out;
}
function barColorForPctUsed(pct){
  if(pct<=75)return"#22c55e";
  if(pct<=90)return"#f59e0b";
  return"#ef4444";
}

      const fy=fiscalYearRangeFromMmDd(fyS,new Date());
      const ry=await fetch(AUTH_URL+"/reports/summary?from="+encodeURIComponent(fy.from)+"&to="+encodeURIComponent(fy.to),{headers:{Authorization:"Bearer "+tok}});
      const jy=await ry.json().catch(()=>({}));
      if(!ry.ok){setErr(jy.error||t("settings.serverLoadError"));return;}
      setByM(jm.byDepartment&&typeof jm.byDepartment==="object"?jm.byDepartment:{});
      setByY(jy.byDepartment&&typeof jy.byDepartment==="object"?jy.byDepartment:{});
    }catch(e){setErr(e.message||t("msg.genericShort"));}
    finally{setLoading(false);}
  },[view,active.length,deptSig,expenses,cats,users,t,sessionTok]);
  useEffect(()=>{if(view==="settings")void load();},[load,view]);
  const saveBudget=async dept=>{
    if(!AUTH_URL||!isSA)return;
    const b=parseFloat(String(budDraft).replace(",","."))||0;
    if(!Number.isFinite(b)){setErr(t("msg.genericShort"));return;}
    try{API.ensureSessionToken();}catch(e){}
    const tok=API.token||sessionTok;
    if(!tok)return;
    try{
      const r=await fetch(AUTH_URL+"/departments/"+encodeURIComponent(dept.id),{method:"PUT",headers:{"Content-Type":"application/json",Authorization:"Bearer "+tok},body:JSON.stringify({budget:b})});
      const d=await r.json().catch(()=>({}));
      if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
      setBudEdit(null);
      await refreshDepartments();
      void load();
    }catch(e){setErr(e.message||t("msg.genericShort"));}
  };
  if(active.length===0)return null;
  return(
    <div style={{marginBottom:16,paddingBottom:14,borderBottom:"1px solid #EDE8E0"}}>
      <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:10}}>{t("settings.deptTrackerTitle")}</div>
      {loading&&<div style={{fontSize:11,color:"#9CAA9F",marginBottom:8}}>…</div>}
      {err&&<div style={{fontSize:11,padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",marginBottom:8}}>{err}</div>}
      {active.map(d=>{
        const budget=Number(d.budget)||0;
        const sm=Number(byM[d.id])||0;
        const sy=Number(byY[d.id])||0;
        const pctRaw=budget>0?(sy/budget)*100:(sy>0?100:0);
        const fill=Math.min(100,pctRaw);
        const pctDisp=budget>0?Math.round(pctRaw*10)/10:0;
        const rem=budget-sy;
        const over=rem<0;
        const fillCol=barColorForPctUsed(pctRaw);
        return(
          <div key={d.id} style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:6}}>
              <span style={{fontSize:13,fontWeight:600}}>{d.name}</span>
              {over&&<span style={{fontSize:9,fontWeight:700,color:"#fff",background:"#ef4444",padding:"2px 8px",borderRadius:999}}>{t("settings.overBudgetBadge")}</span>}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(140px,1fr))",gap:8,fontSize:11,marginBottom:8}}>
              <div>
                <div style={{color:"#9CAA9F",fontSize:9,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>{t("settings.deptTrackerBudget")}</div>
                {budEdit===d.id?(
                  <input className="inp" style={{fontSize:13,padding:"4px 8px"}} autoFocus value={budDraft} onChange={e=>setBudDraft(e.target.value)}
                    onKeyDown={e=>{
                      if(e.key==="Enter"){e.preventDefault();skipBlurSaveRef.current=true;void saveBudget(d);}
                      if(e.key==="Escape"){e.preventDefault();setBudEdit(null);}
                    }}
                    onBlur={()=>{
                      if(skipBlurSaveRef.current){skipBlurSaveRef.current=false;return;}
                      if(budEdit===d.id)void saveBudget(d);
                    }}/>
                ):isSA?(
                  <button type="button" onClick={()=>{setBudEdit(d.id);setBudDraft(String(budget));}} style={{
                    border:"none",background:"transparent",padding:0,cursor:"pointer",fontSize:13,fontWeight:700,color:G,
                    textAlign:"left",fontVariantNumeric:"tabular-nums",
                  }}>{fmt(budget)} {getCurrency()}</button>
                ):(
                  <span style={{fontSize:13,fontWeight:700,color:G,fontVariantNumeric:"tabular-nums"}}>{fmt(budget)} {getCurrency()}</span>
                )}
              </div>
              <div>
                <div style={{color:"#9CAA9F",fontSize:9,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>{t("settings.deptTrackerMonth")}</div>
                <div style={{fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{fmt(sm)} {getCurrency()}</div>
              </div>
              <div>
                <div style={{color:"#9CAA9F",fontSize:9,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>{t("settings.deptTrackerYear")}</div>
                <div style={{fontWeight:600,fontVariantNumeric:"tabular-nums"}}>{fmt(sy)} {getCurrency()}</div>
              </div>
              <div>
                <div style={{color:"#9CAA9F",fontSize:9,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:2}}>{t("settings.deptTrackerRemaining")}</div>
                <div style={{fontWeight:600,fontVariantNumeric:"tabular-nums",color:over?"#DC2626":"#1A0E18"}}>{fmt(rem)} {getCurrency()}</div>
              </div>
            </div>
            <div style={{marginBottom:4}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#6B7B72"}}>
                <span>{t("settings.deptTrackerUsed")}</span>
                <span>{budget>0?`${pctDisp}%`:"—"}</span>
              </div>
              <div style={{height:6,borderRadius:999,background:"#EDE8E0",overflow:"hidden"}}>
                <div style={{height:"100%",width:`${budget>0?fill:0}%`,maxWidth:"100%",borderRadius:999,background:budget>0?fillCol:"#E5E7EB",transition:"width 0.2s"}}/>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

/* ── DEPARTMENT BUDGET BARS (dashboard + presupuestos view) ───────────────── */
function DepartmentBudgetBars({t,rows,title}){
  if(!rows||rows.length===0)return null;
  const visible=rows.filter(d=>!d.archived&&(Number(d.budget)||0)>0);
  if(visible.length===0)return null;
  return(
    <div className="card" style={{marginBottom:14}}>
      {title&&<div style={{fontWeight:600,fontSize:13,marginBottom:10}}>{title}</div>}
      {visible.map((d,i)=>(
        <BudgetVsActualRow key={d.id} t={t} name={d.name} spent={d.spent} budget={d.budget} remaining={d.remaining} noBottomMargin={i===visible.length-1}/>
      ))}
    </div>
  );
}

/* ── DEPARTMENTS CRUD (superadmin, settings) ───────────────────────────────── */
function DepartmentsSettingsBlock({t}){
  const{departments,refreshDepartments,isSA,isAdmin}=useApp();
  const [name,setName]=useState("");
  const [bud,setBud]=useState("");
  const [editId,setEditId]=useState(null);
  const [ef,setEf]=useState({name:"",budget:""});
  const [msg,setMsg]=useState("");
  const [err,setErr]=useState("");
  const [delId,setDelId]=useState(null);
  const [showArchived,setShowArchived]=useState(false);
  if(!isSA&&!isAdmin)return null;
  const sessionTok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
  const saveLocal=(next)=>{
    lsSet(DEPTS_LS_KEY,next.map(x=>({id:x.id,name:x.name,budget:Number(x.budget)||0,archived:!!x.archived,createdAt:x.createdAt||Date.now()})));
    void refreshDepartments();
  };
  const addDept=async()=>{
    setErr("");setMsg("");
    const n=name.trim();
    if(!n){setErr("Nombre requerido.");return;}
    const b=parseFloat(String(bud).replace(",","."))||0;
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments",{method:"POST",headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionTok},body:JSON.stringify({name:n,budget:b})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setName("");setBud("");setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      const id="dept_"+Date.now();
      saveLocal([...departments,{id,name:n,budget:b,archived:false,createdAt:Date.now()}]);
      setName("");setBud("");setMsg(t("settings.deptSaved"));
    }
  };
  const saveEdit=async row=>{
    setErr("");setMsg("");
    const n=(ef.name||"").trim();
    if(!n){setErr("Nombre requerido.");return;}
    const b=parseFloat(String(ef.budget).replace(",","."))||0;
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments/"+encodeURIComponent(row.id),{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionTok},body:JSON.stringify({name:n,budget:b})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setEditId(null);setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      saveLocal(departments.map(x=>x.id===row.id?{...x,name:n,budget:b}:x));
      setEditId(null);setMsg(t("settings.deptSaved"));
    }
  };
  const doDelete=async row=>{
    setErr("");setMsg("");
    if(!(await confirmUI("¿Eliminar permanentemente? Los gastos vinculados quedarán como \"Sin departamento\".")))return;
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments/"+encodeURIComponent(row.id),{method:"DELETE",headers:{Authorization:"Bearer "+sessionTok}});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setDelId(null);setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      if(!row.archived){setErr("Solo se pueden eliminar departamentos archivados.");return;}
      saveLocal(departments.filter(x=>x.id!==row.id));
      setDelId(null);setMsg(t("settings.deptSaved"));
    }
  };
  const setArchived=async(row,val)=>{
    setErr("");setMsg("");
    if(AUTH_URL){
      if(!sessionTok){setErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/departments/"+encodeURIComponent(row.id),{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionTok},body:JSON.stringify({archived:!!val})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setErr(d.error||t("msg.genericShort"));return;}
        setMsg(t("settings.deptSaved"));void refreshDepartments();
      }catch(e){setErr(e.message||t("msg.genericShort"));}
    }else{
      saveLocal(departments.map(x=>x.id===row.id?{...x,archived:!!val}:x));
      setMsg(t("settings.deptSaved"));
    }
  };
  const active=departments.filter(d=>!d.archived);
  const archived=departments.filter(d=>!!d.archived);
  return(
    <AccordionSection title={t("settings.accordion.budgets")}>
      <p style={{fontSize:11,color:"#6B7B72",marginBottom:10,lineHeight:1.45}}>{t("settings.deptIntro")}</p>
      {msg&&<div style={{fontSize:11,padding:"6px 9px",borderRadius:6,background:"#D1FAE5",color:"#065F46",marginBottom:8}}>{msg}</div>}
      {err&&<div style={{fontSize:11,padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",marginBottom:8}}>{err}</div>}
      <DepartmentBudgetTrackerSection t={t}/>
      <div style={{background:"#F5F0EA",borderRadius:9,padding:12,marginBottom:12}}>
        <div style={{fontWeight:600,fontSize:12,marginBottom:8}}>{t("settings.deptAdd")}</div>
        <label className="lbl">{t("settings.deptName")}</label>
        <input className="inp" style={{fontSize:14,marginBottom:8}} value={name} onChange={e=>setName(e.target.value)}/>
        <label className="lbl">{t("settings.deptBudget")}</label>
        <input className="inp" style={{fontSize:14,marginBottom:8}} type="text" inputMode="decimal" value={bud} onChange={e=>setBud(e.target.value)}/>
        <button type="button" className="btn-primary" style={{fontSize:12,padding:"6px 12px"}} onClick={()=>void addDept()}>{t("action.add")}</button>
      </div>
      <div style={{fontSize:9,fontWeight:700,color:"#9CAA9F",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:8}}>Departamentos activos</div>
      {active.map(d=>(
        <div key={d.id} style={{borderBottom:"1px solid #F5F0EA",padding:"8px 0"}}>
          {editId===d.id?(
            <div style={{background:"#F5F0EA",borderRadius:8,padding:10}}>
              <label className="lbl">{t("settings.deptName")}</label>
              <input className="inp" style={{fontSize:14,marginBottom:6}} value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/>
              <label className="lbl">{t("settings.deptBudget")}</label>
              <input className="inp" style={{fontSize:14,marginBottom:8}} value={ef.budget} onChange={e=>setEf(p=>({...p,budget:e.target.value}))}/>
              <div style={{display:"flex",gap:6}}>
                <button type="button" className="btn-primary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>void saveEdit(d)}>{t("action.save")}</button>
                <button type="button" className="btn-secondary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>setEditId(null)}>{t("action.cancel")}</button>
              </div>
            </div>
          ):(
            <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <div style={{flex:1,minWidth:120}}>
                <div style={{fontSize:12,fontWeight:600}}>{d.name}</div>
                <div style={{fontSize:10,color:"#9CAA9F"}}>{fmt(Number(d.budget)||0)} {getCurrency()}</div>
              </div>
              <div style={{display:"flex",gap:4}}>
                <button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #DDD6CC",background:"transparent",color:"#4B5E52",cursor:"pointer"}} onClick={()=>{setEditId(d.id);setEf({name:d.name,budget:String(d.budget!=null?d.budget:"")});setDelId(null);}}>{t("action.edit")}</button>
                {isSA&&<button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer"}} onClick={()=>{void (async()=>{if(await confirmUI("¿Archivar este departamento? No aparecerá en el panel ni en nuevos gastos, pero los gastos existentes se mantienen."))void setArchived(d,true);})();}}>Archivar</button>}
              </div>
            </div>
          )}
        </div>
      ))}
      <div style={{marginTop:12,borderTop:"1px solid #EDE8E0",paddingTop:10}}>
        <button type="button" style={{width:"100%",textAlign:"left",background:"transparent",border:"1px solid #DDD6CC",borderRadius:6,padding:"6px 8px",fontSize:11,color:"#4B5E52",cursor:"pointer"}} onClick={()=>setShowArchived(v=>!v)}>
          Archivados {showArchived?"▲":"▼"}
        </button>
        {showArchived&&(
          <div style={{marginTop:8}}>
            {archived.length===0&&<div style={{fontSize:11,color:"#9CAA9F"}}>Sin archivados</div>}
            {archived.map(d=>(
              <div key={d.id} style={{borderBottom:"1px solid #F5F0EA",padding:"8px 0"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:120}}>
                    <div style={{fontSize:12,fontWeight:600}}>{d.name}</div>
                    <div style={{fontSize:10,color:"#9CAA9F"}}>{fmt(Number(d.budget)||0)} {getCurrency()}</div>
                  </div>
                  <div style={{display:"flex",gap:4}}>
                    {isSA&&<button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #DDD6CC",background:"transparent",color:"#4B5E52",cursor:"pointer"}} onClick={()=>void setArchived(d,false)}>Restaurar</button>}
                    {isSA&&<button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer"}} onClick={()=>setDelId(d.id)}>{t("action.delete")}</button>}
                  </div>
                </div>
                {delId===d.id&&(
                  <div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px",marginTop:6}}>
                    <div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>¿Eliminar permanentemente? Los gastos vinculados quedarán como "Sin departamento".</div>
                    <div style={{display:"flex",gap:6}}>
                      <button type="button" className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>void doDelete(d)}>{t("action.confirm")}</button>
                      <button type="button" className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDelId(null)}>{t("action.cancel")}</button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </AccordionSection>
  );
}

  const [appSetMsg,setAppSetMsg]=useState("");

  const [backups,setBackups]=useState([]);
  const [backupsLoading,setBackupsLoading]=useState(false);
  const [backupsError,setBackupsError]=useState("");
  const [backupsMsg,setBackupsMsg]=useState("");
  const [appIvaDefaultDraft,setAppIvaDefaultDraft]=useState(()=>readIvaDefault());
  const [appCatsDraft,setAppCatsDraft]=useState(()=>cats.map(c=>({...c})));
  const [appCurrency,setAppCurrency]=useState(()=>{
    try{

      const code=raw?JSON.parse(raw):"EUR";
      return String(code||"EUR").toUpperCase().slice(0,3);
    }catch(e){return"EUR";}
  });
  const [ivaDefault,setIvaDefault]=useState(()=>readIvaDefault());
  useEffect(()=>{setIvaDefault(readIvaDefault());},[ivaRates]);
  useEffect(()=>{setAppIvaDefaultDraft(readIvaDefault());},[ivaRates]);
  useEffect(()=>{setAppCatsDraft(cats.map(c=>({...c})));},[cats]);
  const appSettingsToken=()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return"";}};
  const loadBackups=useCallback(async()=>{
    if(!isSA||!AUTH_URL)return;
    setBackupsLoading(true);setBackupsError("");
    try{
      API.ensureSessionToken();
      if(!API.token){setBackupsError(t("msg.sessionExpired"));setBackupsLoading(false);return;}
      const d=await API.get("/admin/backups");
      setBackups(Array.isArray(d.backups)?d.backups:[]);
    }catch(e){setBackupsError(e.message||t("signup.serverDown"));}
    finally{setBackupsLoading(false);}
  },[isSA,t]);
  useEffect(()=>{if(isSA&&AUTH_URL)void loadBackups();},[isSA,AUTH_URL,loadBackups]);
  const runBackupNow=async()=>{
    setBackupsError("");setBackupsMsg("");
    try{
      API.ensureSessionToken();
      if(!API.token){setBackupsError(t("msg.sessionExpired"));return;}
      const d=await API.post("/admin/backups/run",{});
      setBackupsMsg("✓ Copia creada: "+(d.filename||""));
      await loadBackups();
    }catch(e){setBackupsError(e.message||t("signup.serverDown"));}
  };
  const openBackupDownload=async filename=>{
    if(!filename)return;
    setBackupsError("");
    try{
      API.ensureSessionToken();
      const blob=await API.fetchBinary("/admin/backups/download/"+encodeURIComponent(filename));
      const a=Object.assign(document.createElement("a"),{
        href:URL.createObjectURL(blob),
        download:filename,
      });
      a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),5000);
    }catch(e){setBackupsError(e.message||t("signup.serverDown"));}
  };
  const saveAppIvaSettings=async(nextRates,nextDefault)=>{
    setAppSetErr("");setAppSetMsg("");
    const normalized=normalizeIvaRatesPayload(nextRates);
    let defVal;
    if(nextDefault===null)defVal=null;
    else{
      const n=Number(nextDefault);
      defVal=normalized.some(r=>Number(r.value)===n)?n:Number(normalized[0]?.value||21);
    }
    if(AUTH_URL){
      const tok=appSettingsToken()||(API.token?String(API.token):"");
      if(!tok){setAppSetErr(t("msg.sessionExpired"));return;}
      try{
        const r1=await fetch(AUTH_URL+"/settings/iva_rates",{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tok},body:JSON.stringify({value:normalized})});
        const d1=await r1.json().catch(()=>({}));
        if(!r1.ok){setAppSetErr(d1.error||t("msg.genericShort"));return;}
        const r2=await fetch(AUTH_URL+"/settings/iva_default",{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tok},body:JSON.stringify({value:defVal})});
        const d2=await r2.json().catch(()=>({}));
        if(!r2.ok){setAppSetErr(d2.error||t("msg.genericShort"));return;}
      }catch(e){setAppSetErr(t("signup.serverDown"));return;}
    }
    saveIvaRates(normalized);
    try{localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(defVal));}catch(e){}
    setAppIvaDefaultDraft(defVal);
    setAppSetMsg("Ajustes de IVA guardados.");
  };
  const saveAppCategories=async()=>{
    setAppSetErr("");setAppSetMsg("");
    if(AUTH_URL){
      const tok=appSettingsToken()||(API.token?String(API.token):"");
      if(!tok){setAppSetErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/settings/categories",{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tok},body:JSON.stringify({value:appCatsDraft})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setAppSetErr(d.error||t("msg.genericShort"));return;}
      }catch(e){setAppSetErr(t("signup.serverDown"));return;}
    }
    saveCats(appCatsDraft);
    setAppSetMsg("Categorías guardadas.");
  };
  const saveAppCurrency=async()=>{
    setAppSetErr("");setAppSetMsg("");
    const code=String(appCurrency||"EUR").toUpperCase().slice(0,3);
    if(!code){setAppSetErr("Moneda no válida.");return;}
    if(AUTH_URL){
      const tok=appSettingsToken()||(API.token?String(API.token):"");
      if(!tok){setAppSetErr(t("msg.sessionExpired"));return;}
      try{
        const r=await fetch(AUTH_URL+"/settings/currency",{method:"PUT",headers:{"Content-Type":"application/json","Authorization":"Bearer "+tok},body:JSON.stringify({value:code})});
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setAppSetErr(d.error||t("msg.genericShort"));return;}
      }catch(e){setAppSetErr(t("signup.serverDown"));return;}
    }
    try{localStorage.setItem("sol-currency",JSON.stringify(code));}catch(e){}
    setAppCurrency(code);
    applyServerSettings({currency:code});
    setAppSetMsg("Moneda guardada.");
  };
  const saveIvaDefault=v=>{
    const n=Number(v);
    if(Number.isNaN(n))return;
    try{localStorage.setItem(IVA_DEFAULT_KEY,JSON.stringify(n));}catch(e){}
    setIvaDefault(n);
  };
  const saveProfile=async()=>{
    if(profileSaving)return;
    const payload={name:(sf.name||"").trim(),email:(sf.email||"").trim(),phone:(sf.phone||"").trim(),avatar:sf.avatar||null};
    if(!payload.name){dispatchSolanaToast(t("msg.genericShort"),"error");return;}
    if(AUTH_URL){
      setProfileSaving(true);
      try{
        const token=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
        if(!token){dispatchSolanaToast(t("msg.sessionExpired"),"error");return;}
        const r=await fetch(AUTH_URL+"/auth/update-profile",{
          method:"PUT",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
          body:JSON.stringify(payload),
        });
        const d=await r.json().catch(()=>({}));
        if(!r.ok){dispatchSolanaToast(d.error||t("msg.genericShort"),"error");return;}
        const merged=normalizeItem({...user,...d.user},"user");
        setUser(merged);
        saveUsers(users.map(u=>u.id===user.id?merged:u));
        setSf({name:merged.name||"",email:merged.email||"",phone:merged.phone||"",avatar:merged.avatar??null});
        dispatchSolanaToast(t("msg.profileUpdated"),"info");
      }catch(e){
        dispatchSolanaToast(t("signup.serverDown"),"error");
      }finally{
        setProfileSaving(false);
      }
      return;
    }
    const merged=normalizeItem({...user,...sf},"user");
    saveUsers(users.map(u=>u.id===user.id?merged:u));
    setUser(merged);
    dispatchSolanaToast(t("msg.profileUpdated"),"info");
  };

  const savePw=async()=>{
    setPwMsg("");setPwOk(false);
    const existing=passwords?.[user.id];
    if(pwForm.nw.length<8){setPwMsg(t("msg.minPassword"));return;}
    if(COMMON_PASSWORDS.has(pwForm.nw.toLowerCase())){setPwMsg(t("msg.pwCommon"));return;}
    if(pwForm.nw!==pwForm.cn){setPwMsg(t("msg.passwordMismatch"));return;}

    if(AUTH_URL){
      setPwSaving(true);
      try{
        const token=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
        if(!token){setPwMsg(t("msg.sessionExpired"));return;}
        if(!String(pwForm.cur||"").trim()){setPwMsg(t("msg.currentPasswordRequired"));return;}
        const r=await fetch(AUTH_URL+"/auth/change-password",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+token},
          body:JSON.stringify({userId:user.id,newPassword:pwForm.nw,currentPassword:pwForm.cur}),
        });
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setPwMsg(d.error||t("msg.genericShort"));return;}
      }catch{
        setPwMsg(t("signup.serverDown"));
        return;
      }finally{
        setPwSaving(false);
      }
    }else if(existing&&pwForm.cur!==existing){
      setPwMsg(t("msg.passwordWrong"));
      return;
    }

    savePasswords({...passwords,[user.id]:pwForm.nw});
    appLog("info","password_changed",{userId:user.id});
    setPwForm({cur:"",nw:"",cn:""});setPwMsg(t("msg.passwordChanged"));setPwOk(true);
  };

  return(
    <div style={{maxWidth:540}}>
      <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G,marginBottom:12}}>{t("settings.title")}</h1>

      {/* ── Team members ── */}
      {isSA&&<AccordionSection title={t("settings.accordion.team")}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <button className="btn-sm" style={{fontSize:10}} onClick={()=>{setAddU(v=>!v);setEditId(null);}}>{t("action.addUser")}</button>
          </div>
          {addU&&(
            <div style={{background:"#F5F0EA",borderRadius:9,padding:12,marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.name")}</label><input className="inp" style={{fontSize:14}} value={nu.name} onChange={e=>setNu(p=>({...p,name:e.target.value}))} placeholder="Name"/></div>
                <div><label className="lbl">{t("label.title")}</label><input className="inp" style={{fontSize:14}} value={nu.title} onChange={e=>setNu(p=>({...p,title:e.target.value}))} placeholder="Role"/></div>
                <div><label className="lbl">{t("label.role")}</label><select className="inp" style={{fontSize:14}} value={nu.role} onChange={e=>setNu(p=>({...p,role:e.target.value}))}><option value="user">{t("role.user")}</option><option value="admin">{t("role.admin")}</option></select></div>
                <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.email")}</label><input className="inp" style={{fontSize:14}} type="email" value={nu.email} onChange={e=>setNu(p=>({...p,email:e.target.value}))} placeholder="email@example.com"/></div>
                <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.phone")}</label><input className="inp" style={{fontSize:14}} value={nu.phone} onChange={e=>setNu(p=>({...p,phone:e.target.value}))} placeholder="+34..."/></div>
                <div style={{gridColumn:"1/-1",marginTop:4}}>
                  <label className="lbl">{t("label.tempPassword")}</label>
                  <div style={{position:"relative"}}>
                    <input className="inp" style={{fontSize:14,paddingRight:52}} type={nu.showTempPw?"text":"password"} value={nu.tempPw||""} onChange={e=>setNu(p=>({...p,tempPw:e.target.value}))} placeholder="mín. 8 caracteres"/>
                    <button type="button" style={{position:"absolute",right:8,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#9CAA9F",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,padding:"2px 4px"}} onClick={()=>setNu(p=>({...p,showTempPw:!p.showTempPw}))}>
                      {nu.showTempPw?t("login.hidePw")||"Ocultar":t("login.showPw")||"Ver"}
                    </button>
                  </div>
                  <div style={{fontSize:9,color:"#9CAA9F",marginTop:3}}>{t("label.tempPasswordHint")}</div>
                </div>

              </div>
              {nuErr&&<div style={{padding:"6px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",fontSize:11,marginTop:6}}>{nuErr}</div>}
              <div style={{display:"flex",gap:7,marginTop:8}}>
                <button className="btn-primary" style={{flex:1,fontSize:12,padding:"6px 10px"}} onClick={async()=>{
                  if(!nu.name)return;
                  setNuErr("");
                  if(!nu.name){setNuErr("El nombre es obligatorio.");return;}
                  if(!nu.email){setNuErr("El correo es obligatorio.");return;}
                  if(!String(nu.email).includes("@")){setNuErr("Correo no válido.");return;}
                  if(!nu.tempPw||nu.tempPw.length<8){setNuErr(t("msg.tempPwRequired"));return;}
                  const newId=nu.name.toLowerCase().replace(/\s+/g,"-")+"-"+Date.now();
                  if(AUTH_URL){
                    // Use session token (set at login) — no admin key needed in UI
                    const sessionToken=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
                    if(!sessionToken){setNuErr("Tu sesión ha expirado. Cierra sesión y vuelve a entrar para crear usuarios.");return;}
                    try{
                      const r=await fetch(AUTH_URL+"/admin/users/create",{
                        method:"POST",
                        headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionToken},
                        body:JSON.stringify({name:nu.name,email:nu.email,tempPassword:nu.tempPw,role:nu.role,title:nu.title,phone:nu.phone,color:nu.color})
                      });
                      const d=await r.json();
                      if(!r.ok){setNuErr(d.error||"Error al crear usuario en el servidor.");return;}
                      saveUsers([...users,{...d.user}]);
                    }catch{
                      // Server unreachable — local-only fallback
                      const newUser={id:newId,...nu,mustChangePassword:true};
                      delete newUser.showTempPw;delete newUser.tempPw;delete newUser.adminKey;
                      saveUsers([...users,newUser]);
                      savePasswords({...passwords,[newId]:nu.tempPw});
                    }
                  } else {
                    const newUser={id:newId,...nu,mustChangePassword:true};
                    delete newUser.showTempPw;delete newUser.tempPw;delete newUser.adminKey;
                    saveUsers([...users,newUser]);
                    savePasswords({...passwords,[newId]:nu.tempPw});
                  }
                  setNu({name:"",title:"",email:"",phone:"",role:"user",color:"#6B7280",tempPw:"",showTempPw:false,adminKey:""});
                  setNuErr("");
                  setAddU(false);
                }}>{t("action.add")}</button>
                <button className="btn-secondary" style={{flex:1,fontSize:12,padding:"6px 10px"}} onClick={()=>setAddU(false)}>{t("action.cancel")}</button>
              </div>
            </div>
          )}
          {users.map(u=>(
            <div key={u.id}>
              <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",borderBottom:"1px solid #F5F0EA"}}>
                <UserAvatar user={u} size={28} fontSize={8}/>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:12,fontWeight:600}}>{u.name}</div><div style={{fontSize:10,color:"#9CAA9F",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.email||"N/A"} · {u.role==="superadmin"?t("role.superadmin"):u.role==="admin"?t("role.admin"):t("role.user")}</div></div>
                <div style={{display:"flex",gap:3,flexShrink:0,flexWrap:"wrap"}}>
                  <button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #DDD6CC",background:"transparent",color:"#4B5E52",cursor:"pointer"}} onClick={()=>{setEditId(u.id);setEf({name:u.name,title:u.title||"",email:u.email||"",phone:u.phone||"",role:u.role,color:u.color});}}>{t("action.edit")}</button>
                  {AUTH_URL&&u.id!==user.id&&<button type="button" style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #C4B5FD",background:"transparent",color:"#5B21B6",cursor:"pointer"}} onClick={()=>{setResetFor(resetFor===u.id?null:u.id);setResetPwInput("");}}>{t("team.resetPassword")}</button>}
                  {AUTH_URL&&u.id!==user.id&&(
                    u.accountStatus==="active"
                      ? <button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #FCA5A5",background:"transparent",color:"#DC2626",cursor:"pointer"}}
                          onClick={async()=>{
                            if(!(await confirmUI(`¿Revocar acceso a ${u.name}? Podras restaurarlo despues.`)))return;
                            const tok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
                            const r=await fetch(AUTH_URL+"/admin/users/"+encodeURIComponent(u.id)+"/suspend",{method:"POST",headers:{Authorization:"Bearer "+tok}});
                            if(r.ok){
                              saveUsers(users.map(x=>x.id===u.id?{...x,accountStatus:"denied"}:x));
                            }else{
                              const d=await r.json().catch(()=>({}));
                              dispatchSolanaToast(d.error||"Error.","error");
                            }
                          }}>Revocar</button>
                      : <button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #86EFAC",background:"transparent",color:"#15803D",cursor:"pointer"}}
                          onClick={async()=>{
                            if(!(await confirmUI(`¿Restaurar acceso a ${u.name}?`)))return;
                            const tok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})();
                            const r=await fetch(AUTH_URL+"/admin/users/"+encodeURIComponent(u.id)+"/restore",{method:"POST",headers:{Authorization:"Bearer "+tok}});
                            if(r.ok){
                              saveUsers(users.map(x=>x.id===u.id?{...x,accountStatus:"active",approvalStatus:"approved"}:x));
                            }else{
                              const d=await r.json().catch(()=>({}));
                              dispatchSolanaToast(d.error||"Error.","error");
                            }
                          }}>Restaurar</button>
                  )}
                  {u.id!==user.id&&<button style={{fontSize:9,padding:"2px 6px",borderRadius:4,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer"}} onClick={()=>setDelC(u.id)}>{t("action.delete")}</button>}
                </div>
              </div>
              {delC===u.id&&<div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px",margin:"4px 0"}}><div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>{t("msg.deleteUser")} {u.name}?</div><div style={{display:"flex",gap:6}}><button className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>void (async()=>{
                if(AUTH_URL){
                  const tok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
                  if(!tok){dispatchSolanaToast(t("msg.sessionExpired"),"error");return;}
                  try{
                    const r=await fetch(AUTH_URL+"/admin/users/"+encodeURIComponent(u.id),{method:"DELETE",headers:{Authorization:"Bearer "+tok}});
                    const d=await r.json().catch(()=>({}));
                    if(!r.ok){dispatchSolanaToast(d.error||t("msg.genericShort"),"error");return;}
                  }catch(e){dispatchSolanaToast(t("signup.serverDown"),"error");return;}
                }
                saveUsers(users.filter(x=>x.id!==u.id));setDelC(null);
              })()}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDelC(null)}>{t("action.cancel")}</button></div></div>}
              {resetFor===u.id&&AUTH_URL&&(
                <div style={{background:"#F5F3FF",borderRadius:7,padding:"10px 12px",margin:"4px 0",border:"1px solid #DDD6EE"}}>
                  <div style={{fontSize:10,color:"#6B7B72",marginBottom:8,lineHeight:1.4}}>{t("team.resetPasswordHint")}</div>
                  <label className="lbl">{t("label.tempPassword")}</label>
                  <input className="inp" style={{fontSize:14,marginBottom:8}} type="password" value={resetPwInput} onChange={e=>setResetPwInput(e.target.value)} placeholder="mín. 8 caracteres"/>
                  <div style={{display:"flex",gap:6}}>
                    <button type="button" className="btn-primary" style={{flex:1,fontSize:11,padding:"5px 8px"}} disabled={resetBusy} onClick={async()=>{
                      if(!resetPwInput||resetPwInput.length<8){dispatchSolanaToast(t("msg.tempPwRequired"),"error");return;}
                      setResetBusy(true);
                      try{
                        const tok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
                        if(!tok){dispatchSolanaToast(t("msg.sessionExpired"),"error");return;}
                        const r=await fetch(AUTH_URL+"/admin/users/"+encodeURIComponent(u.id)+"/reset-password",{
                          method:"POST",
                          headers:{"Content-Type":"application/json",Authorization:"Bearer "+tok},
                          body:JSON.stringify({tempPassword:resetPwInput}),
                        });
                        const d=await r.json().catch(()=>({}));
                        if(!r.ok){dispatchSolanaToast(d.error||t("msg.genericShort"),"error");return;}
                        const merged=d.user?normalizeItem({...u,...d.user},"user"):normalizeItem({...u,mustChangePassword:true},"user");
                        saveUsers(users.map(x=>x.id===u.id?merged:x));
                        setResetFor(null);setResetPwInput("");
                        dispatchSolanaToast(t("team.resetPasswordOk"),"info");
                      }catch(e){dispatchSolanaToast(t("signup.serverDown"),"error");}
                      finally{setResetBusy(false);}
                    }}>{resetBusy?"…":t("team.resetPasswordSave")}</button>
                    <button type="button" className="btn-secondary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>{setResetFor(null);setResetPwInput("");}}>{t("team.resetPasswordCancel")}</button>
                  </div>
                </div>
              )}
              {editId===u.id&&(
                <div style={{background:"#F5F0EA",borderRadius:9,padding:10,margin:"4px 0"}}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                    <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.name")}</label><input className="inp" style={{fontSize:14}} value={ef.name} onChange={e=>setEf(p=>({...p,name:e.target.value}))}/></div>
                    <div><label className="lbl">{t("label.title")}</label><input className="inp" style={{fontSize:14}} value={ef.title} onChange={e=>setEf(p=>({...p,title:e.target.value}))}/></div>
                    <div><label className="lbl">{t("label.role")}</label><select className="inp" style={{fontSize:14}} value={ef.role} onChange={e=>setEf(p=>({...p,role:e.target.value}))}><option value="user">{t("role.user")}</option><option value="admin">{t("role.admin")}</option><option value="superadmin">{t("role.superadmin")}</option></select></div>
                    <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.email")}</label><input className="inp" style={{fontSize:14}} type="email" value={ef.email} onChange={e=>setEf(p=>({...p,email:e.target.value}))}/></div>
                    <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.phone")}</label><input className="inp" style={{fontSize:14}} value={ef.phone} onChange={e=>setEf(p=>({...p,phone:e.target.value}))}/></div>
                  </div>
                  <div style={{display:"flex",gap:7,marginTop:7}}><button type="button" className="btn-primary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>void (async()=>{
                    if(AUTH_URL){
                      const tok=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
                      if(!tok){dispatchSolanaToast(t("msg.sessionExpired"),"error");return;}
                      try{
                        const r=await fetch(AUTH_URL+"/admin/users/"+encodeURIComponent(editId),{method:"PUT",headers:{"Content-Type":"application/json",Authorization:"Bearer "+tok},body:JSON.stringify({name:ef.name,email:ef.email,phone:ef.phone,title:ef.title,role:ef.role,color:ef.color})});
                        const d=await r.json().catch(()=>({}));
                        if(!r.ok){dispatchSolanaToast(d.error||t("msg.genericShort"),"error");return;}
                        const prev=users.find(x=>x.id===editId);
                        const merged=d.user?normalizeItem({...(prev||{}),...d.user},"user"):normalizeItem({...(prev||{}),...ef},"user");
                        saveUsers(users.map(x=>x.id===editId?merged:x));
                        if(user.id===editId)setUser(merged);
                      }catch(e){dispatchSolanaToast(t("signup.serverDown"),"error");return;}
                      setEditId(null);
                      return;
                    }
                    saveUsers(users.map(x=>x.id===editId?{...x,...ef}:x));
                    if(user.id===editId)setUser(normalizeItem({...user,...ef},"user"));
                    setEditId(null);
                  })()}>{t("action.save")}</button><button type="button" className="btn-secondary" style={{flex:1,fontSize:11,padding:"5px 8px"}} onClick={()=>setEditId(null)}>{t("action.cancel")}</button></div>
                </div>
              )}
            </div>
          ))}
      </AccordionSection>}

      {/* ── Profile ── */}
      <AccordionSection title={t("settings.accordion.profile")}>
        {/* Avatar upload */}
        <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:12}}>
          {sf.avatar
            ?<img src={sf.avatar} alt="" style={{width:52,height:52,borderRadius:"50%",objectFit:"cover",border:"2px solid #EDE8E0",flexShrink:0}}/>
            :<div style={{width:52,height:52,borderRadius:"50%",background:user.color||T,display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,fontWeight:700,color:"#fff",flexShrink:0}}>{inits(user.name)}</div>
          }
          <div>
            <label style={{display:"inline-block",padding:"5px 10px",borderRadius:6,border:"1.5px solid #DDD6CC",fontSize:11,fontWeight:600,color:G,cursor:"pointer",fontFamily:"inherit",background:"transparent"}}>
              {sf.avatar?t("action.changePhoto"):t("action.upload")}
              <input type="file" accept="image/jpeg,image/png,image/webp" style={{display:"none"}} onChange={e=>{const f=e.target.files?.[0];if(!f)return;const err=validateUpload(f,UPLOAD_RULES.avatar);if(err){dispatchSolanaToast(err,"error");e.target.value="";return;}const r=new FileReader();r.onload=ev=>setSf(p=>({...p,avatar:ev.target.result}));r.readAsDataURL(f);e.target.value="";}}/>
            </label>
            {sf.avatar&&<button style={{marginLeft:7,fontSize:10,color:"#991B1B",background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>setSf(p=>({...p,avatar:null}))}>✕</button>}
          </div>
        </div>
        <div style={{display:"grid",gap:8}}>
          <div><label className="lbl">{t("label.name")}</label><input className="inp" value={sf.name} onChange={e=>setSf(p=>({...p,name:e.target.value}))}/></div>
          <div><label className="lbl">{t("label.email")}</label><input className="inp" type="email" value={sf.email} onChange={e=>setSf(p=>({...p,email:e.target.value}))}/></div>
          <div><label className="lbl">{t("label.phone")}</label><input className="inp" value={sf.phone} onChange={e=>setSf(p=>({...p,phone:e.target.value}))}/></div>
        </div>
        <button type="button" className="btn-primary" style={{marginTop:9,fontSize:12,padding:"6px 12px"}} disabled={profileSaving} onClick={()=>void saveProfile()}>{profileSaving?"…":t("action.saveChanges")}</button>
        <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #EDE8E0"}}>
          <div style={{fontWeight:600,fontSize:12,color:"#991B1B",marginBottom:4}}>{t("settings.deleteAccount")}</div>
          {!dSelf?<button className="btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>setDSelf(true)}>{t("settings.requestDeletion")}</button>:(
            <div style={{background:"#FEE2E2",borderRadius:7,padding:"8px 10px"}}><div style={{fontSize:11,color:"#7F1D1D",marginBottom:6}}>{t("msg.removeAccount")}</div><div style={{display:"flex",gap:6}}><button className="btn-danger" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>{saveUsers(users.filter(u=>u.id!==user.id));onSignOut();}}>{t("action.confirm")}</button><button className="btn-secondary" style={{flex:1,fontSize:11,padding:"4px 8px"}} onClick={()=>setDSelf(false)}>{t("action.cancel")}</button></div></div>
