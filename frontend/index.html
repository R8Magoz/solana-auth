   SOLANA EXPENSE TRACKER v4
   All view components defined OUTSIDE SolanaExpenses → fixes focus loss bug
   State shared via React.createContext
───────────────────────────────────────────────────────────────────────────── */
const{useState,useEffect,useRef,useCallback,useMemo,createContext,useContext}=React;

/** Persist state in sessionStorage (tab session only). Removes key when value equals default. */
function useSessionState(key,defaultVal){
  const [val,setVal]=useState(()=>{
    try{
      const s=sessionStorage.getItem(key);
      if(s==null)return defaultVal;
      return JSON.parse(s);
    }catch(e){return defaultVal;}
  });
  const setter=useCallback((v)=>{
    setVal(prev=>{
      const next=typeof v==="function"?v(prev):v;
      try{
        if(JSON.stringify(next)===JSON.stringify(defaultVal))sessionStorage.removeItem(key);
        else sessionStorage.setItem(key,JSON.stringify(next));
      }catch(e){/* quota / private mode */}
      return next;
    });
  },[key,defaultVal]);
  return[val,setter];
}
/* ── BRAND PALETTE ─────────────────────────────────────────────────────────
   Primary  #3C0A37  Deep aubergine — brand primary
   Accent   #C4622D  Terracotta — earthy complement (from brand palette grid)
   Badge    #7A4F9A  Muted violet — notification badges
   Hover    #52114B  Primary hover (ligther plum)
   ────────────────────────────────────────────────────────────────────────── */
const G  = "#3C0A37"; // brand primary — deep aubergine
const GH = "#52114B"; // primary hover
const GL = "rgba(60,10,55,0.07)"; // primary light tint (hover backgrounds)
const T  = "#C4622D"; // terracotta accent — earthy complement, in palette grid
const BL = "#7A4F9A"; // muted violet for notification badges
const ADMIN_IDS=["marc","sergio"]; // default fallback approvers (superadmin IDs; must match seed)
/** Prefer superadmins, then admins, then ADMIN_IDS — at least unique IDs for category defaults. */
function defaultCategoryApproverIds(users){
  const u=users||[];
  const out=[];
  const push=id=>{if(id&&typeof id==="string"&&!out.includes(id))out.push(id);};
  u.filter(x=>x.role==="superadmin").forEach(x=>push(x.id));
  if(out.length<2)u.filter(x=>x.role==="admin").forEach(x=>push(x.id));
  ADMIN_IDS.forEach(push);
  return out.slice(0,2);
}

const DATA_VERSION=6; // increment when schema changes; triggers normalize()
/** Backend auth server URL. Set to empty string to use local-only mode (no signup/server login). */
const AUTH_URL = (typeof window !== "undefined" && window.__SOLANA_AUTH_URL__) || "";
/** Staging: allow sign-in without password (local users only). Email match if filled; otherwise first user. Set false for production. */
const STAGING_OPEN_LOGIN = true;

/** HTTP API (same origin as AUTH_URL). Bearer token + refresh on 401. Offline write queue. */
const OFFLINE_QUEUE_KEY = "solana_offline_queue";

function readOfflineQueue() {
  try {
    const r = localStorage.getItem(OFFLINE_QUEUE_KEY);
    if (!r) return [];
    const a = JSON.parse(r);
    return Array.isArray(a) ? a : [];
  } catch (e) {
    return [];
  }
}
function writeOfflineQueue(q) {
  try {
    localStorage.setItem(OFFLINE_QUEUE_KEY, JSON.stringify(q));
  } catch (e) {}
}

function dispatchSolanaToast(message, kind) {
  window.dispatchEvent(new CustomEvent("solana-toast", { detail: { message, kind: kind || "info" } }));
}

function isNetworkError(e) {
  if (!e) return false;
  if (e.name === "TypeError") return true;
  const m = String(e.message || "");
  if (/Failed to fetch|NetworkError|Load failed|network/i.test(m)) return true;
  return false;
}

function shouldQueueWrite(method, path) {
  const m = String(method || "").toUpperCase();
  if (m !== "POST" && m !== "PUT" && m !== "DELETE") return false;
  const p = path || "";
  if (p.indexOf("/expenses") !== 0 && p.indexOf("/bills") !== 0) return false;
  return true;
}

function makeOfflineQueuedError() {
  const e = new Error("OFFLINE_QUEUED");
  e.code = "OFFLINE_QUEUED";
  return e;
}

function isOfflineQueuedError(e) {
  return e && (e.code === "OFFLINE_QUEUED" || e.message === "OFFLINE_QUEUED");
}

function enqueueOfflineOp(method, path, body, meta) {
  const q = readOfflineQueue();
  q.push({
    id: "q_" + Date.now() + "_" + Math.random().toString(36).slice(2, 11),
    method: String(method).toUpperCase(),
    path,
    body: body === undefined ? null : body,
    meta: meta && typeof meta === "object" ? meta : {},
    enqueuedAt: Date.now(),
  });
  writeOfflineQueue(q);
  dispatchSolanaToast("Guardado localmente — se sincronizará al reconectar", "offline");
  throw makeOfflineQueuedError();
}

const API = {
  get base() {
    return AUTH_URL || "";
  },
  token: null,
  _flushBusy: false,

  /** Bearer for requests: memory token, or sync from sessionStorage (login / refresh). */
  ensureSessionToken() {
    if (this.token) return;
    try {
      const s = sessionStorage.getItem("sol-session-token");
      if (s) this.token = s;
    } catch (e) {
      this.token = null;
    }
  },

  mergeMeta(meta) {
    if (!meta || typeof meta !== "object") return {};
    const o = { ...meta };
    delete o.skipOfflineQueue;
    return o;
  },

  async _rawFetch(method, path, body) {
    this.ensureSessionToken();
    const opts = { method, headers: {} };
    if (this.token) opts.headers.Authorization = "Bearer " + this.token;
    if (body != null && method !== "GET" && method !== "HEAD" && method !== "DELETE") {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(body);
    }
    return fetch(this.base + path, opts);
  },

  async requestNoQueue(method, path, body) {
    if (!this.base) throw new Error("API no configurada.");
    let res = await this._rawFetch(method, path, body);
    if (res.status === 401) {
      const ok = await this.refresh();
      if (ok) {
        res = await this._rawFetch(method, path, body);
      } else {
        window.dispatchEvent(new Event("solana-session-expired"));
        throw new Error("Sesión expirada");
      }
    }
    const ct = (res.headers.get("content-type") || "").toLowerCase();
    const data = ct.includes("application/json") ? await res.json().catch(() => ({})) : {};
    if (res.status === 409) {
      dispatchSolanaToast("Conflicto al sincronizar — revisa los datos", "conflict");
      throw Object.assign(new Error(data.error || "Conflicto"), { status: 409 });
    }
    if (!res.ok) throw new Error(data.error || "HTTP " + res.status);
    return data;
  },

  async request(method, path, body, meta) {
    if (!this.base) throw new Error("API no configurada.");
    const skipOfflineQueue = !!(meta && meta.skipOfflineQueue);
    const storedMeta = this.mergeMeta(meta);
    const queueWrite = shouldQueueWrite(method, path) && !skipOfflineQueue;

    if (queueWrite && typeof navigator !== "undefined" && !navigator.onLine) {
      enqueueOfflineOp(method, path, body, storedMeta);
    }

    try {
      let res = await this._rawFetch(method, path, body);
      if (res.status === 401) {
        const ok = await this.refresh();
        if (ok) {
          res = await this._rawFetch(method, path, body);
        } else {
          window.dispatchEvent(new Event("solana-session-expired"));
          throw new Error("Sesión expirada");
        }
      }
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      const data = ct.includes("application/json") ? await res.json().catch(() => ({})) : {};
      if (res.status === 409) {
        dispatchSolanaToast("Conflicto al sincronizar — revisa los datos", "conflict");
        throw Object.assign(new Error(data.error || "Conflicto"), { status: 409 });
      }
      if (!res.ok) throw new Error(data.error || "HTTP " + res.status);
      return data;
    } catch (e) {
      if (queueWrite && isNetworkError(e)) {
        enqueueOfflineOp(method, path, body, storedMeta);
      }
      throw e;
    }
  },

  async refresh() {
    if (!AUTH_URL) return false;
    this.ensureSessionToken();
    try {
      const res = await fetch(AUTH_URL + "/auth/refresh", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + this.token,
        },
      });
      if (res.ok) {
        const data = await res.json();
        if (data.sessionToken) {
          this.token = data.sessionToken;
          try {
            sessionStorage.setItem("sol-session-token", data.sessionToken);
          } catch (e) {}
          return true;
        }
      }
    } catch (e) {}
    return false;
  },

  async logout() {
    if (!this.base || !this.token) return;
    try {
      await fetch(this.base + "/auth/logout", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          Authorization: "Bearer " + this.token,
        },
      });
    } catch (e) {}
  },

  async flushOfflineQueue() {
    if (this._flushBusy) return;
    if (!this.base) return;
    this.ensureSessionToken();
    if (!this.token) return;
    if (typeof navigator !== "undefined" && !navigator.onLine) return;
    if (readOfflineQueue().length === 0) return;
    this._flushBusy = true;
    try {
      while (readOfflineQueue().length > 0) {
        const q = readOfflineQueue();
        const op = q[0];
        let data;
        try {
          data = await this.requestNoQueue(op.method, op.path, op.body);
        } catch (err) {
          if (err && err.status === 409) break;
          if (isNetworkError(err)) break;
          if (String(err.message || "").indexOf("Sesión expirada") >= 0) break;
          break;
        }

        if (op.method === "POST" && op.path === "/expenses" && op.meta && op.meta.pendingReceipt && data.expense && data.expense.id) {
          try {
            await this.requestNoQueue("POST", "/expenses/" + encodeURIComponent(data.expense.id) + "/receipt", {
              b64: op.meta.pendingReceipt.b64,
              mediaType: op.meta.pendingReceipt.mediaType || op.meta.pendingReceipt.type || "image/jpeg",
            });
          } catch (recErr) {
            if (isNetworkError(recErr)) break;
            if (recErr && recErr.status === 409) break;
            break;
          }
        }

        writeOfflineQueue(q.slice(1));
        dispatchSolanaToast("Sincronizado ✓", "sync");
        window.dispatchEvent(new CustomEvent("solana-offline-sync", { detail: { op, response: data } }));
      }
    } finally {
      this._flushBusy = false;
    }
  },

  async fetchBinary(path) {
    if (!this.base) throw new Error("API no configurada.");
    this.ensureSessionToken();
    const opts = { method: "GET", headers: {} };
    if (this.token) opts.headers.Authorization = "Bearer " + this.token;
    let res = await fetch(this.base + path, opts);
    if (res.status === 401) {
      const ok = await this.refresh();
      if (ok) {
        opts.headers.Authorization = "Bearer " + this.token;
        res = await fetch(this.base + path, opts);
      } else {
        window.dispatchEvent(new Event("solana-session-expired"));
        throw new Error("Sesión expirada");
      }
    }
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.blob();
  },

  get: (path) => API.request("GET", path, null, undefined),
  post: (path, body, meta) => API.request("POST", path, body, meta),
  put: (path, body, meta) => API.request("PUT", path, body, meta),
  delete: (path, meta) => API.request("DELETE", path, null, meta),
};

const fmt=n=>`€${Number(n||0).toFixed(2)}`;
/** Presupuestos / informes: 2 decimales si |importe| < 100; sin céntimos si ≥ 100 o > 999 (es-ES). */
function formatBudgetCurrencyEUR(amount){
  const n=Number(amount)||0;
  const abs=Math.abs(n);
  if(abs<100){
    return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR",minimumFractionDigits:2,maximumFractionDigits:2}).format(n);
  }
  return new Intl.NumberFormat("es-ES",{style:"currency",currency:"EUR",maximumFractionDigits:0}).format(n);
}
const BUDGET_VS_BAR_MAX_PX=360;
function BudgetVsActualRow({t,name,spent,budget,remaining,barColor:barColorIn,noBottomMargin}){
  const spentN=Number(spent)||0;
  const budgetN=Number(budget)||0;
  const rem=remaining!=null&&Number.isFinite(Number(remaining))?Number(remaining):(budgetN-spentN);
  const pctRaw=budgetN>0?(spentN/budgetN)*100:(spentN>0?100:0);
  const pctBar=Math.min(100,Math.max(0,pctRaw));
  const fill=barColorIn||(pctRaw<75?"#16A34A":pctRaw<=100?"#D97706":"#DC2626");
  const fs=formatBudgetCurrencyEUR;
  const nameStr=name!=null&&name!==""?String(name):"";
  return(
    <div style={{marginBottom:noBottomMargin?0:12}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6,minWidth:0}}>
        {nameStr?(
          <span style={{fontWeight:600,fontSize:12,flex:"0 1 38%",minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} title={nameStr.length>20?nameStr:undefined}>{nameStr}</span>
        ):null}
        <div style={{
          flex:nameStr?"1 1 0":"1 1 auto",
          minWidth:0,
          maxWidth:nameStr?BUDGET_VS_BAR_MAX_PX:"none",
          width:nameStr?undefined:"100%",
        }}>
          <div style={{height:6,background:"#EDE8E0",borderRadius:3,overflow:"hidden"}}>
            <div style={{height:"100%",width:`${pctBar}%`,background:fill,transition:"width 0.4s",borderRadius:3}}/>
          </div>
        </div>
      </div>
      <div style={{fontSize:10,color:"#6B7B72",fontVariantNumeric:"tabular-nums",lineHeight:1.45}}>
        {t("dept.spentLine",{spent:fs(spentN),budget:fs(budgetN)})}
      </div>
      {rem<0?(
        <div style={{fontSize:10,color:"#DC2626",fontWeight:600,fontVariantNumeric:"tabular-nums",marginTop:3}}>
          {t("dept.overBudgetMsg",{amount:fs(Math.abs(rem))})}
        </div>
      ):(
        <div style={{fontSize:10,color:rem===0?"#9CAA9F":"#15803d",fontWeight:500,fontVariantNumeric:"tabular-nums",marginTop:3}}>
          {t("dept.remainingLine",{amount:fs(rem)})}
        </div>
      )}
    </div>
  );
}

const normalizeItem=(item,type)=>{

    if(!merged.submittedBy&&merged.paidBy?.[0]?.userId)merged.submittedBy=merged.paidBy[0].userId;
    return merged;
  }
  if(type==="bill")    return{active:false,notes:"",description:"",receipt:null,receiptType:null,...item,approvals:item.approvals||{},auditTrail:item.auditTrail||[],submittedBy:item.submittedBy||"unknown",seenBy:Array.isArray(item.seenBy)?item.seenBy:[],departmentId:item.departmentId??null};
  if(type==="user")    return{color:"#6B7280",title:"",email:"",phone:"",role:"user",...item};

    const merged={archived:false,budget:null,...item,approverIds:Array.isArray(item.approverIds)?item.approverIds:[...ADMIN_IDS]};

const effectiveExpenseApproverIds=(e,cats,users)=>{

  const cat=cats?.find(c=>c.name===e?.category&&!c.archived);

const getItemStatus=(item,cats,users)=>{
  if(item&&item._apiType==="expense"&&item.status){
    const s=item.status;
    if(s==="deleted")return"deleted";
    if(s==="rejected")return"rejected";
    if(s==="approved")return"approved";
    if(s==="submitted"||s==="draft"){
      const reqIds=Array.isArray(item.approvalRequired)&&item.approvalRequired.length>0?item.approvalRequired:null;
      if(reqIds){
        const a=item.approvals||{};
        if(reqIds.some(id=>a[id]==="rejected"))return"rejected";
        if(reqIds.every(id=>a[id]==="approved"))return"approved";
        return"pending";
      }
      return"pending";
    }
  }
  if(item&&item._apiType==="bill"&&item.apiBillStatus){
    const s=item.apiBillStatus;
    if(s==="cancelled")return"rejected";
    if(s==="paid")return"approved";
    if(s==="pending"||s==="overdue")return"pending";
  }
  const cat=cats?.find(c=>c.name===item.category&&!c.archived);
  // fall back to actual admin users, not a hardcoded constant
  const adminIds=users?getAdminIds(users):[...ADMIN_IDS];
  const approverIds=cat?.approverIds?.length>0?cat.approverIds:adminIds;
  const a=item.approvals||{};
  if(approverIds.some(id=>a[id]==="rejected"))return"rejected";
  if(approverIds.every(id=>a[id]==="approved"))return"approved";
  return"pending";
};

}
/** @param useServerTotals when true and rows include spent from GET /departments, keep server figures */
function enrichDepartmentsForUI(depts,expenses,bills,cats,users,useServerTotals){
  return(depts||[]).map(d=>{
    if(useServerTotals&&typeof d.spent==="number"){
      const budget=Number(d.budget)||0;
      const spent=Number(d.spent)||0;
      const remaining=typeof d.remaining==="number"?d.remaining:budget-spent;
      const pctUsed=typeof d.pctUsed==="number"?d.pctUsed:(budget>0?Math.min(100,Math.round((spent/budget)*1000)/10):(spent>0?100:0));
      return{...d,budget,spent,remaining,pctUsed};
    }
    const id=d.id;
    const spentExp=expenses.filter(e=>e.departmentId===id&&getItemStatus(e,cats,users)==="approved").reduce((s,e)=>s+eurForExpense(e),0);
    const spentBills=bills.filter(b=>b.departmentId===id&&billCountsTowardDeptSpend(b,cats,users)).reduce((s,b)=>s+eurForExpense(b),0);
    const spentF=spentExp+spentBills;
    const budget=Number(d.budget)||0;
    const remaining=budget-spentF;
    const pctUsed=budget>0?Math.min(100,Math.round((spentF/budget)*1000)/10):(spentF>0?100:0);
    return{...d,budget,spent:spentF,remaining,pctUsed};
  });
}
const eurForExpense=x=>Number(x?.amountEUR??x?.amount)||0;
/** Build paidBy with amount + pct from NewPanel split state; fixes cent drift on last row. */
const buildPaidByFromSplitState=(splits,totalAmt,spMode)=>{
  const sel=(splits||[]).filter(s=>s.checked);
  if(sel.length===0)return[];
  const rows=sel.map(s=>{
    let am,P;
    if(spMode==="amount"){
      am=parseFloat(Number(s.value||0).toFixed(2));
      P=totalAmt>0?(am/totalAmt)*100:0;
    }else{
      P=Number(s.percent)||0;
      am=parseFloat((totalAmt*P/100).toFixed(2));
    }
    return{userId:s.userId,amount:am,pct:Math.round(P*100)/100};
  });
  const sum=rows.reduce((a,r)=>a+r.amount,0);
  if(rows.length&&totalAmt>0&&Math.abs(sum-totalAmt)>0.01){
    const last={...rows[rows.length-1]};
    last.amount=parseFloat((last.amount+(totalAmt-sum)).toFixed(2));
    last.pct=Math.round((last.amount/totalAmt)*10000)/100;
    rows[rows.length-1]=last;
  }
  return rows;
};

const shareEurInExpense=(e,userId)=>{

  const base=Number(e.amount)||0;

  return(Number(p.amount)||0)/base*tot;
};

function billDueISOFromForm(nb){
  const ts=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  const f=nb&&nb.frequency;
  if(f===""||f==="once"){
    const raw=nb.dueDate&&String(nb.dueDate).trim();
    if(raw&&raw.length>=10)return raw.slice(0,10);
    return ts(new Date());
  }
  const dm=parseInt(nb.dayOfMonth,10)||1;
  const t=new Date();
  let y=t.getFullYear(),mo=t.getMonth();
  const ld=new Date(y,mo+1,0).getDate();
  let d=new Date(y,mo,Math.min(dm,ld));
  if(ts(d)<ts(t)){
    mo++;
    if(mo>11){mo=0;y++;}
    const ld2=new Date(y,mo+1,0).getDate();
    d=new Date(y,mo,Math.min(dm,ld2));
  }
  return ts(d);
}

/** Fecha YYYY-MM-DD para filtros de facturas: próximo vencimiento (dayOfMonth) o fecha de envío */
function getBillFilterDateRef(b){
  if(b._apiType==="bill"&&b.dueDate&&String(b.dueDate).length>=10)return String(b.dueDate).slice(0,10);
  if(b.frequency==="once"||b.frequency===""||b.frequency===undefined){
    if(b.dueDate&&String(b.dueDate).length>=10)return String(b.dueDate).slice(0,10);
    const sub=(b.auditTrail||[]).find(a=>a.action==="submitted");
    if(sub&&sub.at)return sub.at.slice(0,10);
    return"1970-01-01";
  }
  const dm=parseInt(b.dayOfMonth,10);
  const today=new Date();
  const tsLocal=d=>{const y=d.getFullYear(),mo=String(d.getMonth()+1).padStart(2,"0"),da=String(d.getDate()).padStart(2,"0");return`${y}-${mo}-${da}`;};
  const todayStr=tsLocal(today);
  if(!isNaN(dm)&&dm>=1&&dm<=31&&(b.frequency==="monthly"||b.frequency==="custom")){
    const y=today.getFullYear(),m=today.getMonth();
    const lastDay=new Date(y,m+1,0).getDate();
    const day=Math.min(dm,lastDay);
    let ref=new Date(y,m,day);
    if(tsLocal(ref)<todayStr){
      const nm=m+1,ny=nm>11?y+1:y,nmo=nm>11?0:nm;
      const ld=new Date(ny,nmo+1,0).getDate();
      ref=new Date(ny,nmo,Math.min(dm,ld));
    }
    return tsLocal(ref);
  }
  if(!isNaN(dm)&&dm>=1&&dm<=31&&b.frequency==="annual"){
    const sub=(b.auditTrail||[]).find(a=>a.action==="submitted");
    const base=sub?new Date(sub.at):today;
    const mo=base.getMonth();
    let y=today.getFullYear();
    const ld=new Date(y,mo+1,0).getDate();
    let ref=new Date(y,mo,Math.min(dm,ld));
    if(tsLocal(ref)<todayStr){
      y++;
      const ld2=new Date(y,mo+1,0).getDate();
      ref=new Date(y,mo,Math.min(dm,ld2));
    }
    return tsLocal(ref);
  }
  const sub=(b.auditTrail||[]).find(a=>a.action==="submitted");
  if(sub&&sub.at)return sub.at.slice(0,10);
  return"1970-01-01";
}

  if(raw&&raw!=="application/octet-stream")return raw;
  const n=String(file&&file.name||"").toLowerCase();
  const dot=n.lastIndexOf(".");
  if(dot===-1)return raw||"";
  const ext=n.slice(dot);
  return RECEIPT_EXT_TO_MIME[ext]||raw||"";
}

const UPLOAD_RULES={
  receipt:{
    maxBytes:6*1024*1024,   // 6 MB
    allowedTypes:[
      "image/jpeg","image/jpg","image/png","image/webp",
      "image/heic","image/heif",
      "image/gif",
      "image/tiff","image/tif","image/x-tiff",
      "application/pdf",
    ],
    allowedExts:[".jpg",".jpeg",".jpe",".png",".webp",".heic",".heif",".gif",".tif",".tiff",".pdf"],
    inferFromExtension:true,
    rejectHint:"Formato no admitido. Puedes adjuntar recibos en: JPEG, PNG, WebP, HEIC/HEIF (iPhone), GIF, TIFF o PDF. Tamaño máximo: 6 MB.",
  },
  avatar:{
    maxBytes:1*1024*1024,   // 1 MB — profile images don't need to be large
    allowedTypes:["image/jpeg","image/jpg","image/png","image/webp"],
    allowedExts:[".jpg",".jpeg",".png",".webp"],
  },
};
function validateUpload(file,rules){
  if(!file)return"Archivo no válido.";
  if(file.size>rules.maxBytes){
    const mb=rules.maxBytes/(1024*1024);
    const mbLabel=Number.isInteger(mb)?String(mb):mb.toFixed(1).replace(/\.0$/,"");
    return`Archivo demasiado grande (máximo ${mbLabel} MB).`;
  }
  const name=String(file.name||"").toLowerCase();
  const extOk=rules.allowedExts.some(e=>name.endsWith(e));
  const effMime=rules.inferFromExtension?receiptEffectiveMime(file):String(file.type||"").toLowerCase().trim();
  const mimeOk=!!effMime&&rules.allowedTypes.includes(effMime);
  if(!mimeOk&&!extOk)return rules.rejectHint||"Tipo de archivo no permitido.";
  return null;
}

const LOG_MAX=200; // max entries kept in localStorage
const APP_LOG_KEY="sol-app-log";
function appLog(level,event,data={}){
  const entry={ts:new Date().toISOString(),level,event,...data};
  // Console output
  if(level==="error")console.error("[SOLANA]",event,data);
  else if(level==="warn")console.warn("[SOLANA]",event,data);
  else console.log("[SOLANA]",event,data);
  // Persist to localStorage (capped ring buffer)
  try{
    const existing=JSON.parse(localStorage.getItem(APP_LOG_KEY)||"[]");
    existing.push(entry);
    if(existing.length>LOG_MAX)existing.splice(0,existing.length-LOG_MAX);
    localStorage.setItem(APP_LOG_KEY,JSON.stringify(existing));
  }catch{/* quota — silently skip persistence */}
}

const calcIvaParts=(amount,ratePercent)=>{
  const a=Number(amount)||0;
  if(ratePercent==null||ratePercent===0)return{base:a,iva:0};
  const r=Number(ratePercent)/100;
  const iva=Math.round((a/(1+r))*r*100)/100;
  const base=Math.round((a-iva)*100)/100;
  return{base,iva};
};

/** Return an approvals object pre-populated for the submitter if they are an approver.
 *  Does not mutate. Idempotent — safe to call even if approvals already exist. */
const autoApprove=(submitterId,approverIds,existingApprovals,auditTrail)=>{
  if(!approverIds.includes(submitterId))return{approvals:existingApprovals||{},auditTrail:auditTrail||[]};
  if((existingApprovals||{})[submitterId]==="approved")return{approvals:existingApprovals,auditTrail};
  const approvals={...existingApprovals,[submitterId]:"approved"};
  const trail=[...auditTrail,{action:"auto_approved",by:submitterId,at:new Date().toISOString(),meta:{reason:"submitter_is_approver"}}];
  return{approvals,auditTrail:trail};
};

function receiptMimeOkForServerUpload(mediaType){
  const m=String(mediaType||"").toLowerCase();
  if(m.includes("pdf"))return false;
  return m.includes("jpeg")||m.includes("jpg")||m.includes("png")||m.includes("webp")
    ||m.includes("heic")||m.includes("heif")||m.includes("gif")||m.includes("tiff")||m.includes("tif");

function ItemCodeBadge({code, inline=false}){
  const[copied,setCopied]=useState(false);

    navigator.clipboard?.writeText(code)
      .then(()=>{setCopied(true);setTimeout(()=>setCopied(false),1500);})
      .catch(()=>{});
  };
  if(inline)return(
    <span title={code} onClick={copy}
      style={{fontSize:9,fontWeight:700,color:"#9CAA9F",background:"#F5F0EA",
        padding:"2px 7px",borderRadius:5,fontFamily:"monospace",letterSpacing:"0.04em",
        cursor:"pointer",userSelect:"none",transition:"background 0.15s"}}
      onMouseEnter={e=>e.currentTarget.style.background=GL}
      onMouseLeave={e=>e.currentTarget.style.background="#F5F0EA"}>
      {copied?"✓":code}
    </span>
  );
  return(
    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:7}}>
      <div style={{display:"inline-block",padding:"2px 8px",borderRadius:6,fontSize:9,fontWeight:700,
        background:"#F5F0EA",color:"#9CAA9F",letterSpacing:"0.05em",fontFamily:"monospace"}}>
        {code}
      </div>
      <button onClick={copy}
        style={{padding:"2px 7px",borderRadius:5,border:"1px solid #DDD6CC",background:"transparent",
          color:"#9CAA9F",fontSize:9,cursor:"pointer",fontFamily:"inherit",fontWeight:600,
          transition:"background 0.15s,color 0.15s"}}
        title="Copy item code">
        {copied?"✓ Copiado":"⌘ Copiar"}
      </button>
    </div>
  );
}

/* ── FORCE PASSWORD CHANGE ──────────────────────────────────────────────────
   Shown immediately after login when user.mustChangePassword === true.
   Blocks all app access until a new password is set.
─────────────────────────────────────────────────────────────────────────── */
function ForcePasswordChange({user, passwords, savePasswords, saveUsers, users, onDone}){
  const t=React.useMemo(()=>mkT(),[]);
  const [nw,setNw]=useState("");
  const [cn,setCn]=useState("");
  const [msg,setMsg]=useState("");
  const [ok,setOk]=useState(false);
  const [showNw,setShowNw]=useState(false);
  const [showCn,setShowCn]=useState(false);

  const doChange=async()=>{
    setMsg("");
    if(nw.length<8){setMsg(t("forceChange.tooShort"));return;}
    if(COMMON_PASSWORDS.has(nw.toLowerCase())){setMsg(t("forceChange.common"));return;}
    if(nw!==cn){setMsg(t("forceChange.mismatch"));return;}

    // 1. Persist to backend (clears mustChangePassword in users.json — prevents loop on next login)
    if(AUTH_URL){
      const sessionToken=(()=>{try{return sessionStorage.getItem("sol-session-token")||"";}catch(e){return "";}})()||(API.token?String(API.token):"");
      if(!sessionToken){
        setMsg(t("msg.sessionExpired"));
        return;
      }
      try{
        const r=await fetch(AUTH_URL+"/auth/change-password",{
          method:"POST",
          headers:{"Content-Type":"application/json","Authorization":"Bearer "+sessionToken},
          body:JSON.stringify({userId:user.id,newPassword:nw}),
        });
        const d=await r.json().catch(()=>({}));
        if(!r.ok){setMsg(d.error||t("forceChange.tooShort"));return;}
      }catch{
        setMsg(t("signup.serverDown"));
        return;
      }
    }

    // 2. Update local password store and user record (keeps local fallback in sync)
    savePasswords({...passwords,[user.id]:nw});
    const updated=users.map(u=>u.id===user.id?{...u,mustChangePassword:false}:u);
    saveUsers(updated);
    appLog("info","forced_password_changed",{userId:user.id});
    setOk(true);
    setTimeout(()=>onDone({...user,mustChangePassword:false}),600);
  };

  const toggleStyle={position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:"#9CAA9F",fontSize:11,cursor:"pointer",fontFamily:"inherit",fontWeight:600,padding:"2px 4px"};

  return(
    <div style={AUTH.page}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={AUTH.logoWrap}>
          <SolanaLogo theme="dark" size="md" variant="auth"/>
          <h1 style={AUTH.title}>{t("forceChange.title")}</h1>
          <p style={AUTH.subtitle}>{t("forceChange.subtitle")}</p>
        </div>
        <div style={AUTH.card}>
          <div style={{marginBottom:12}}>
            <label style={AUTH.lbl}>{t("forceChange.newPw")}</label>
            <div style={{position:"relative"}}>
              <input className="auth-inp" style={{...AUTH.inp,paddingRight:52}} type={showNw?"text":"password"} value={nw}
                onChange={e=>{setNw(e.target.value);setMsg("");}}
                onKeyDown={e=>e.key==="Enter"&&doChange()} autoFocus/>
              <button type="button" style={toggleStyle} onClick={()=>setShowNw(v=>!v)}>{showNw?t("login.hidePw")||"Ocultar":t("login.showPw")||"Ver"}</button>
            </div>
          </div>
          <div style={{marginBottom:16}}>
            <label style={AUTH.lbl}>{t("forceChange.confirmPw")}</label>
            <div style={{position:"relative"}}>
              <input className="auth-inp" style={{...AUTH.inp,paddingRight:52}} type={showCn?"text":"password"} value={cn}
                onChange={e=>{setCn(e.target.value);setMsg("");}}
                onKeyDown={e=>e.key==="Enter"&&doChange()}/>
              <button type="button" style={toggleStyle} onClick={()=>setShowCn(v=>!v)}>{showCn?t("login.hidePw")||"Ocultar":t("login.showPw")||"Ver"}</button>
            </div>
          </div>
          {msg&&<div style={AUTH.errorBanner}>{msg}</div>}
          {ok&&<div style={{...AUTH.infoBanner,marginBottom:10,fontSize:11}}>✓ {t("msg.passwordChanged")}</div>}
          <button style={AUTH.btnPrimary} onClick={doChange} disabled={ok}>
            {t("forceChange.submit")}
          </button>
        </div>
        <div style={AUTH.muted}>Solana · Vilanova i la Geltrú · est. 2026</div>
      </div>
    </div>
  );
}

/* ── LOGIN ─────────────────────────────────────────────────────────────────── */
function LoginScreen({ users, onLogin, passwords }) {
  const tl = React.useMemo(() => mkT(), []);
  const [screen, setScreen] = useState("login"); // "login" | "signup" | "status"
  const [statusType, setStatusType] = useState(null); // "pending_verification"|"pending_approval"|"denied"
  const [forgotOpen, setForgotOpen] = useState(false);
  const [forgotMsg, setForgotMsg] = useState("");
  const [email, setEmail] = useState("");
  const [pw, setPw] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState("");
  const emailF = useInpFocus(), pwF = useInpFocus();

  // Helper to clear stray messages when the user interacts
  const clearMessages = () => {
    setErr("");
    setForgotMsg("");
  };

  /* ── Route to sub-screens ── */
  // signup screen intentionally unreachable — accounts are created by superadmin
  if (screen === "status" && statusType) return (
    <AuthStatusCard
      statusType={statusType}
      tl={tl}
      onBack={() => { setScreen("login"); setStatusType(null); clearMessages(); }}
    />
  );

  /* ── Login ── */
  const doLogin = async () => {
    const cleanEmail = email.trim().toLowerCase();

    /* Open login only when there is no API — if AUTH_URL is set, we must hit /auth/login for Bearer token */
    if (STAGING_OPEN_LOGIN && !AUTH_URL) {
      setLoading(true);
      clearMessages();
      await new Promise(r => setTimeout(r, 200));
      let u = cleanEmail
        ? users.find(x => (x.email || "").toLowerCase() === cleanEmail)
        : (users[0] || null);
      setLoading(false);
      if (u) {
        onLogin(u);
        return;
      }
      setErr(tl("login.invalidCreds"));
      return;
    }

    if (!cleanEmail || !pw) {
      setErr(tl("login.invalidCreds"));
      return;
    }

    setLoading(true);
    clearMessages();

    // 1. Try Remote Auth (Render backend)
    if (typeof AUTH_URL !== "undefined" && AUTH_URL) {
      try {
        const r = await fetch(AUTH_URL + "/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email: cleanEmail,
            password: pw
          })
        });

        const d = await r.json();

        if (!r.ok) {
          setLoading(false);
          if (d.code === "PENDING_APPROVAL") {
            setStatusType("pending_approval");
            setScreen("status");
            return;
          }
          if (d.code === "ACCESS_DENIED") {
            setStatusType("denied");
            setScreen("status");
            return;
          }
          setErr(d.error || tl("login.invalidCreds"));
          return;
        }

        const rawTok = d.sessionToken != null && d.sessionToken !== ""
          ? d.sessionToken
          : (d.token != null && d.token !== "" ? d.token : null);
        const tok = rawTok != null ? String(rawTok).trim() : "";
        if (!tok) {
          setLoading(false);
          setErr(tl("login.invalidCreds"));
          return;
        }
        try {
          sessionStorage.setItem("sol-session-token", tok);
        } catch (e) {
          setLoading(false);
          setErr(tl("login.invalidCreds"));
          return;
        }
        API.token = tok;

        setLoading(false);
        const srv = d.user;
        const loc = users.find(u => (u.email || "").toLowerCase() === (srv.email || "").toLowerCase());
        const mergedUser = loc ? { ...loc, ...srv, id: srv.id != null ? srv.id : loc.id } : srv;
        if (typeof ReactDOM !== "undefined" && ReactDOM.flushSync) {
          ReactDOM.flushSync(() => {
            onLogin(mergedUser);
          });
        } else {
          onLogin(mergedUser);
        }
        return;
      } catch {
        appLog("warn", "auth_server_unreachable", { fallback: "local" });
        // Falls through to local fallback if server is unreachable
      }
    }

    // 2. Local fallback
    await new Promise(r => setTimeout(r, 280));
    const u = users.find(u => (u.email || "").toLowerCase() === cleanEmail);

    if (!u) {
      setLoading(false);
      setErr(tl("login.invalidCreds"));
      return;
    }

    const stored = passwords?.[u.id];
    if (stored && pw !== stored) {
      setLoading(false);
      setErr(tl("login.invalidCreds"));
      return;
    }

    setLoading(false);
    onLogin(u);
  };

  /* ── Forgot password ── */
  const doForgotPassword = async () => {
    const cleanEmail = email.trim().toLowerCase();
    if (!cleanEmail) {
      setForgotMsg(tl("login.enterEmailFirst"));
      return;
    }

    setLoading(true);
    clearMessages();

    try {
      if (typeof AUTH_URL === "undefined" || !AUTH_URL) {
        setForgotMsg(tl("login.forgotUnavailable"));
        setLoading(false);
        return;
      }

      const r = await fetch(AUTH_URL + "/auth/forgot-password", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: cleanEmail })
      });

      if (!r.ok) {
        const d = await r.json();
        // Try to show specific server error, otherwise generic error
        setForgotMsg(d.error || tl("login.forgotError"));
        setLoading(false);
        return;
      }

      setForgotMsg(tl("login.forgotSuccess"));
    } catch {
      setForgotMsg(tl("login.forgotError"));
    }

    setLoading(false);
  };

  /* ── Login form ── */
  return (
    <div style={AUTH.page}>
      <div style={{ width: "100%", maxWidth: 400 }}>
        {/* Logo + heading */}
        <div style={AUTH.logoWrap}>
          <SolanaLogo theme="dark" size="md" variant="auth" />
          <h1 style={AUTH.title}>{tl("login.title")}</h1>
          <p style={AUTH.subtitle}>{tl("login.loginSubtitle")}</p>
        </div>

        <div style={AUTH.card}>
          {/* Email */}
          <div style={{ marginBottom: 14 }}>
            <label style={AUTH.lbl}>{tl("login.email")}</label>
            <input
              {...emailF}
              type="email"
              placeholder={tl("login.enterEmail")}
              value={email}
              onChange={e => {
                setEmail(e.target.value);
                clearMessages(); // Clear errors when typing
              }}
              onKeyDown={e => e.key === "Enter" && doLogin()}
              autoFocus
              autoComplete="email"
            />
          </div>

          {/* Password */}
          <div style={{ marginBottom: 6, position: "relative" }}>
            <label style={AUTH.lbl}>{tl("login.password")}</label>
            <input
              {...pwF}
              style={{ ...pwF.style, paddingRight: 58 }}
              type={showPw ? "text" : "password"}
              placeholder={tl("login.enterPassword")}
              value={pw}
              onChange={e => {
                setPw(e.target.value);
                setErr(""); 
              }}
              onKeyDown={e => e.key === "Enter" && doLogin()}
              autoComplete="current-password"
            />
            <button
              type="button"
              style={{
                position: "absolute",
                right: 10,
                bottom: 10,
                background: "none",
                border: "none",
                color: "#9CAA9F",
                fontSize: 11,
                cursor: "pointer",
                fontFamily: "inherit",
                fontWeight: 600,
                padding: "2px 4px"
              }}
              onClick={() => setShowPw(v => !v)}
            >
              {showPw ? tl("login.hidePw") : tl("login.showPw")}
            </button>
          </div>

          {/* Forgot password Toggle */}
          <div style={{ textAlign: "right", marginBottom: 18 }}>
            <button
              type="button"
              onClick={() => { setForgotOpen(v => !v); clearMessages(); }}
              style={{ ...AUTH.link, fontSize: 11, color: "#8A7A87" }}
            >
              {tl("login.forgotPassword")}
            </button>
          </div>

          {/* Forgot Password Section */}
          {forgotOpen && (
            <div style={{ ...AUTH.infoBanner, marginBottom: 14, fontSize: 11 }}>
              <div style={{ marginBottom: 8 }}>
                {tl("login.forgotHelp")}
              </div>
              <button
                type="button"
                style={
                  loading
                    ? { ...AUTH.btnPrimary, ...AUTH.btnPrimaryLoading, padding: "9px 12px", fontSize: 12 }
                    : { ...AUTH.btnPrimary, padding: "9px 12px", fontSize: 12 }
                }
                onClick={doForgotPassword}
                disabled={!email.trim() || loading}
              >
                {tl("login.requestPasswordHelp")}
              </button>

              {forgotMsg && (
                <div style={{ marginTop: 8, fontSize: 11, color: "#5C1057" }}>
                  {forgotMsg}
                </div>
              )}
            </div>
          )}

          {/* Banner de error */}
          {err && <div style={AUTH.errorBanner}>{err}</div>}

          {/* Enviar */}
          <button
            type="button"
            style={loading ? { ...AUTH.btnPrimary, ...AUTH.btnPrimaryLoading } : AUTH.btnPrimary}
            onMouseEnter={e => {
              if (!loading) Object.assign(e.currentTarget.style, AUTH.btnPrimaryHover);
            }}
            onMouseLeave={e => {
              if (!loading) e.currentTarget.style.background = "#3C0A37";
            }}
            onClick={doLogin}
            disabled={loading}
          >
            {loading ? tl("login.signingIn") : tl("login.signIn")}
          </button>

          {/* Divider */}
          <div style={AUTH.divider} />

          {/* Admin-managed accounts notice */}
          <div style={{textAlign:"center",padding:"10px 12px",borderRadius:9,background:"#F5F0EA",fontSize:11,color:"#6B7B72",lineHeight:1.5}}>
            {tl("login.adminManaged")}
          </div>
        </div>

        <div style={AUTH.muted}>Solana · Vilanova i la Geltrú · est. 2026</div>
      </div>
    </div>
  );
}
  
  
/* ── NEW EXPENSE PANEL ─────────────────────────────────────────────────────── */

  const{t,user,cats,form,setForm,splitOn,setSplitOn,splits,setSplits,spMode,setSpMode,

        submitExp,resetForm,removeAttachment,editExp,deleteExp,setPanel,users,calcEqual,ivaRates,departments}=useApp();
  const activeCats=cats.filter(c=>!c.archived);
  const expAmt=parseFloat(form.amount)||0;
  const amountNum=parseMoney(form.amount);
  const amountOk=amountNum>0;
  const expenseValid=amountOk&&String(form.description||"").trim()&&String(form.category||"").trim()&&String(form.date||"").trim()&&!!String(form.departmentId||"").trim();
  const [submitAttempt,setSubmitAttempt]=useState(false);

    if(ivaScanB64Ref.current===b64)return;
    ivaScanB64Ref.current=b64;
    let cancelled=false;
    void (async()=>{
      try{
        const hint=await detectReceiptIvaFromImage(b64,receipt.type||"image/jpeg");
        if(cancelled||!hint||hint.ivaRate==null)return;
        const vr=Number(hint.ivaRate);
        if(Number.isNaN(vr))return;
        const match=ivaRates.reduce((best,r)=>{
          const d=Math.abs(Number(r.value)-vr);
          if(!best||d<best.d)return{r,d};
          return best;
        },null);
        if(match)setForm(p=>({...p,ivaRate:String(match.r.value)}));
      }catch(e){}
    })();
    return()=>{cancelled=true};
  },[receipt?.b64,receipt?.type,ivaRates,setForm]);
  useEffect(()=>{
    try{
      const raw=localStorage.getItem(DRAFT_KEY);

        localStorage.setItem(DRAFT_KEY,JSON.stringify(payload));

  const checkedSplitCount=splits.filter(s=>s.checked).length;

          onChange={e=>{const v=e.target.value;if(v===""||/^\d*\.?\d*$/.test(v))setForm(p=>({...p,amount:v}));}}/>
      </div>
      <div style={{marginBottom:8}}><label className="lbl">{t("label.description")}</label>
        <input className="inp" placeholder={t("label.description")} value={form.description} style={rs(hi&&!String(form.description||"").trim())} onChange={e=>setForm(p=>({...p,description:e.target.value}))}/>
      </div>
      <div style={{marginBottom:8}}><label className="lbl">{t("label.category")}</label>
        <select className="inp" value={form.category} style={rs(hi&&!String(form.category||"").trim())} onChange={e=>setForm(p=>({...p,category:e.target.value}))}>

      </div>
      <div style={{marginBottom:8}}><label className="lbl">{t("label.date")}</label>

      </div>

        {recPrev==="PDF"&&<div style={{background:"#F5F0EA",borderRadius:7,padding:"6px 9px",marginBottom:6,display:"flex",justifyContent:"space-between",fontSize:11,color:"#4B5E52"}}><span>{t("msg.pdfUploaded")}</span><button type="button" style={{background:"none",border:"none",color:"#991B1B",cursor:"pointer",fontSize:11}} onClick={()=>{setReceipt(null);setRecPrev(null);ivaScanB64Ref.current=null;}}>{t("action.remove")}</button></div>}

      <div style={{marginBottom:12,background:GL,borderRadius:8,padding:10}}>

            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:"#9CAA9F",fontSize:10}}>{t("form.ivaAmountLabel")}</span><span style={{fontWeight:700,color:G}}>{rp===0?t("form.ivaAmountDash"):fmt(p.iva)}</span></div>

                return(
                  <div key={s.userId} style={{width:92,textAlign:"center",opacity:s.checked?1:0.38}}>

                        backgroundColor:s.checked?"rgba(255,255,255,0.85)":"transparent",
                      }}>
                      <UserAvatar user={u} size={32} fontSize={10}/>
                      <div style={{fontSize:10,fontWeight:600,marginTop:4,color:G,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name}</div>
                    </button>
                    {s.checked&&spMode==="equal"&&expAmt>0&&checkedSplitCount>1&&(
                      <div style={{fontSize:9,color:"#4B5E52",marginTop:6,fontVariantNumeric:"tabular-nums",lineHeight:1.35}}>
                        <div style={{fontWeight:700}}>{fmt(shareAmt)}</div>
                        <div style={{color:"#9CAA9F"}}>· {Number(s.percent).toFixed(2)}%</div>
                      </div>
                    )}
                    {s.checked&&spMode==="percentage"&&(
                      <div style={{marginTop:6,display:"flex",alignItems:"center",justifyContent:"center",gap:2}}>
                        <input type="text" inputMode="decimal" aria-label="%" value={s.percent} onChange={e=>setSplits(splits.map(x=>x.userId===s.userId?{...x,percent:Math.max(0,parseMoney(e.target.value))}:x))} style={{width:46,textAlign:"right",padding:"3px 4px",border:"1.5px solid #DDD6CC",borderRadius:4,fontSize:10,fontFamily:"inherit",outline:"none"}}/>

                        <input type="text" inputMode="decimal" value={s.value} onChange={e=>setSplits(splits.map(x=>x.userId===s.userId?{...x,value:Math.max(0,parseMoney(e.target.value))}:x))} style={{width:54,textAlign:"right",padding:"3px 4px",border:"1.5px solid #DDD6CC",borderRadius:4,fontSize:10,fontFamily:"inherit",outline:"none"}}/>

            {splitOn&&checkedSplitCount<2&&<div style={{marginTop:8,fontSize:10,fontWeight:600,color:"#DC2626"}}>{t("split.minParticipants")}</div>}
            {spMode==="percentage"&&(
              <div style={{marginTop:8,fontSize:10,fontWeight:600,color:pctSumBad?"#DC2626":"#065F46"}}>
                {pctSumBad?t("split.warnPctSum",{sum:totPct.toFixed(2)}):`${totPct.toFixed(2)}% ✓`}
              </div>
            )}
            {spMode==="amount"&&expAmt>0&&(
              <div style={{marginTop:8,fontSize:10,fontWeight:600,color:amtSumBad?"#DC2626":"#065F46"}}>
                {amtSumBad?t("split.warnAmtSum",{sum:fmt(totVal),total:fmt(expAmt)}):`${fmt(totVal)} / ${fmt(expAmt)} ✓`}
              </div>
            )}
          </div>
        )}
      </div>}
      </div>
      {formError&&<div style={{marginBottom:7,padding:"5px 9px",borderRadius:6,background:"#FEE2E2",color:"#991B1B",fontSize:11,fontWeight:500}}>{formError}</div>}
      <div style={{position:"relative",width:"100%"}}>
        <button type="button" className="btn-primary" style={{width:"100%",padding:11,opacity:(!expenseValid||splitSubmitBlocked)?0.5:1,cursor:(!expenseValid||splitSubmitBlocked)?"not-allowed":"pointer"}}
          disabled={splitSubmitBlocked}
          onClick={()=>{setFormError("");if(!expenseValid)return;submitExp();}}>{t("action.submit")}</button>
        {!expenseValid&&!splitSubmitBlocked&&(
          <button type="button" aria-label="Completar campos obligatorios" style={{position:"absolute",inset:0,opacity:0.001,width:"100%",height:"100%",cursor:"pointer"}}
            onClick={()=>setSubmitAttempt(true)}/>)}
      </div>
    </div>
  );
}

/* ── DETAIL PANEL ──────────────────────────────────────────────────────────── */
function DetailPanel(){
  const{t,expenses,cats,users,detailId,setDetailId,setPanel,isAdmin,user,aNote,setANote,approve,removeAttachment,editExp,deleteExp,fixResubmitExpense,addExpenseComment,markExpenseRead,ivaRates,departments,defaultDeptId}=useApp();
  const [editMode,setEditMode]=useState(false);
  const [ef,setEf]=useState({});        // edit form fields
  const [efDirty,setEfDirty]=useState(false);
  const [efRecPrev,setEfRecPrev]=useState(null);
  const [commentText,setCommentText]=useState("");
  const editFileRef=useRef(null);
  const e=expenses.find(x=>x.id===detailId);
  useEffect(()=>{
    if(detailId)markExpenseRead(detailId);
  },[detailId]);
  if(!e)return null;
  const getU=id=>users.find(u=>u.id===id)||{name:UNKNOWN_USER_NAME,color:"#999"};
  const cat=cats.find(c=>c.name===e.category);
  const approverIds=effectiveExpenseApproverIds(e,cats,users);
  const st=getItemStatus(e,cats,users);
  const canEdit=user.id===e.submittedBy||isAdmin;
  const ivaMatch=e.ivaRate!=null&&e.ivaRate!==undefined?ivaRates.find(r=>r.value===e.ivaRate):null;
  const ivaRowLabel=e.ivaRate!=null&&e.ivaRate!==undefined?(ivaMatch?formatIvaOptionLabel(ivaMatch):`${e.ivaRate}%`):t("expense.ivaNotTracked");

  const startEdit=()=>{
    const defIva=e.ivaRate!==null&&e.ivaRate!==undefined?String(e.ivaRate):String(readIvaDefault());
    setEf({description:e.description,amount:String(e.amount),category:e.category,
      date:e.date,notes:e.notes||"",receipt:e.receipt||null,receiptType:e.receiptType||null,
      paidBy:e.paidBy,
      ivaRate:defIva,
      departmentId:e.departmentId||defaultDeptId});
    setEfRecPrev(e.receipt?(e.receiptType?.includes("pdf")?"PDF":`data:${e.receiptType||"image/jpeg"};base64,${e.receipt}`):null);
    setEditMode(true);setEfDirty(false);
  };
  const cancelEdit=()=>{
    if(efDirty&&!confirm(t("expense.unsaved")))return;
    setEditMode(false);setEfDirty(false);
  };
  const saveEdit=()=>{
    if(!ef.description||!ef.amount){return;}
    if(!ef.departmentId){alert(t("msg.deptRequired"));return;}
    if(!confirm(t("expense.confirmEdit")))return;
    const amt=parseMoney(ef.amount)||e.amount;
    const rp=parseFloat(ef.ivaRate);
    const ivaRate=isNaN(rp)?21:rp;
    const ivaAmount=calcIvaParts(amt,ivaRate).iva;
    editExp(e.id,{
      description:ef.description,
      amount:amt,
      category:ef.category,date:ef.date,
      notes:ef.notes,receipt:ef.receipt||null,
      receiptType:ef.receiptType||null,
      paidBy:ef.paidBy,
      splitMode:(ef.paidBy||[]).length>1?e.splitMode:undefined,
      ivaRate,ivaAmount,
      departmentId:ef.departmentId||defaultDeptId,
    },e);
    setEditMode(false);setEfDirty(false);
  };
  const handleEditFile=(ev)=>{
    const f=ev.target.files?.[0];if(!f)return;
    const err=validateUpload(f,UPLOAD_RULES.receipt);
    if(err){alert(err);ev.target.value="";return;}
    const r=new FileReader();
    r.onload=evr=>{const url=evr.target.result,b64=url.split(",")[1],type=receiptEffectiveMime(f)||f.type||"image/jpeg";
      setEf(p=>({...p,receipt:b64,receiptType:type}));
      setEfRecPrev(type.includes("pdf")?"PDF":url);setEfDirty(true);};
    r.readAsDataURL(f);ev.target.value="";
  };

  const activeCats=cats.filter(c=>!c.archived);
  return(
    <div>

          {!editMode&&(user.id===e.submittedBy||isAdmin)&&<button style={{fontSize:10,padding:"2px 8px",borderRadius:5,border:"1px solid #ECA3A3",background:"transparent",color:"#991B1B",cursor:"pointer",fontFamily:"inherit"}} onClick={()=>deleteExp(e.id)}>{t("action.deleteItem")}</button>}
          <button style={{border:"none",background:"none",color:"#9CAA9F",fontSize:19,cursor:"pointer",lineHeight:1,padding:"0 4px"}} onClick={()=>{if(editMode&&efDirty&&!confirm(t("expense.unsaved")))return;setEditMode(false);setDetailId(null);setPanel(null);}}>×</button>
        </div>
      </div>

      {/* EDIT MODE */}
      {editMode&&(
        <div>
          {st==="approved"&&<div style={{padding:"6px 9px",background:"#FEF3C7",borderRadius:6,fontSize:10,color:"#92400E",marginBottom:9}}>{t("expense.reapprovalWarning")}</div>}
          <div style={{marginBottom:8}}><label className="lbl">{t("label.description")} *</label><input className="inp" value={ef.description||""} onChange={ev=>{setEf(p=>({...p,description:ev.target.value}));setEfDirty(true);}}/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
            <div><label className="lbl">{t("label.amount")} *</label><input className="inp" type="text" inputMode="decimal" value={ef.amount||""} onChange={ev=>{setEf(p=>({...p,amount:ev.target.value}));setEfDirty(true);}}/></div>
            <div><label className="lbl">{t("label.date")}</label><input className="inp" type="date" value={ef.date||""} onChange={ev=>{setEf(p=>({...p,date:ev.target.value}));setEfDirty(true);}}/></div>
          </div>
          <div style={{marginBottom:8}}><label className="lbl">{t("label.category")}</label><select className="inp" value={ef.category||"Otro"} onChange={ev=>{setEf(p=>({...p,category:ev.target.value}));setEfDirty(true);}}>{activeCats.map(c=><option key={c.id} value={c.name}>{tCat(c.name,t)}</option>)}</select></div>
          <div style={{marginBottom:8}}><label className="lbl">{t("label.department")} *</label><select className="inp" value={ef.departmentId||""} onChange={ev=>{setEf(p=>({...p,departmentId:ev.target.value}));setEfDirty(true);}}>{departments.map(d=><option key={d.id} value={d.id}>{d.name}</option>)}</select></div>

      </div>}
    </div>
  );
}

/* ── PERSON DRILLDOWN MODAL ─────────────────────────────────────────────────── */
function PersonDrilldown({userId, onClose}){
  const{t,expenses,bills,cats,users}=useApp();
  const u=users.find(x=>x.id===userId)||{name:UNKNOWN_USER_NAME,color:"#999"};
  const userExpenses=expenses.filter(e=>
    (e.paidBy||[]).some(p=>p&&p.userId===userId)
    ||(!(e.paidBy||[]).length&&(e.submittedBy===userId||e.userId===userId))
  );
  const userBills=bills.filter(b=>b.submittedBy===userId);
  const total=userExpenses.reduce((s,e)=>{
    const st=getItemStatus(e,cats,users);
    if(st==="deleted"||st==="rejected")return s;
    return s+shareEurInExpense(e,userId);
  },0);
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(60,10,55,0.55)",zIndex:8000,
      display:"flex",alignItems:"center",justifyContent:"center",padding:16,
      fontFamily:"'DM Sans',system-ui,sans-serif"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#fff",borderRadius:14,width:"100%",maxWidth:460,maxHeight:"85vh",
        display:"flex",flexDirection:"column",boxShadow:"0 8px 40px rgba(60,10,55,0.2)"}}>
        {/* Header */}
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"14px 16px",borderBottom:"1px solid #EDE8E0",flexShrink:0}}>
          <UserAvatar user={u} size={34} fontSize={11}/>
          <div style={{flex:1}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontWeight:700,fontSize:15,color:G}}>{t("person.drillTitle").replace("{name}",u.name)}</div>
            <div style={{fontSize:11,color:"#9CAA9F",marginTop:1}}>Total atribuido: <strong style={{color:G}}>{fmt(total)}</strong></div>
          </div>
          <button style={{border:"none",background:"none",color:"#9CAA9F",fontSize:20,cursor:"pointer",lineHeight:1}} onClick={onClose}>×</button>
        </div>
        {/* Body */}
        <div style={{overflowY:"auto",padding:"12px 16px"}}>
          {/* Expenses */}
          <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:7}}>{t("person.expenses")} ({userExpenses.length})</div>
          {userExpenses.length===0
            ?<div style={{fontSize:11,color:"#9CAA9F",marginBottom:11}}>{t("person.noExpenses")}</div>
            :<div style={{marginBottom:14}}>
              {userExpenses.map(e=>{const st=getItemStatus(e,cats,users);const sub=(users.find(x=>x.id===e.submittedBy)||{name:UNKNOWN_USER_NAME}).name;return(
                <div key={e.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F5F0EA",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{e.description}</div>
                    <div style={{fontSize:9,color:"#9CAA9F",marginTop:1}}>{fmtDate(e.date)} · {t("filter.submitter")}: {sub} · {e.category}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:G}}>{fmt(shareEurInExpense(e,userId))}</div>
                    <div style={{display:"inline-block",padding:"1px 5px",borderRadius:5,fontSize:8,fontWeight:600,background:ST[st].bg,color:ST[st].color,marginTop:1}}>{t("status."+st)}</div>
                  </div>
                </div>
              );})}
            </div>
          }
          {/* Bills */}
          <div style={{fontWeight:600,fontSize:12,color:G,marginBottom:7}}>{t("person.bills")} ({userBills.length})</div>
          {userBills.length===0
            ?<div style={{fontSize:11,color:"#9CAA9F"}}>{t("person.noBills")}</div>
            :<div>
              {userBills.map(b=>{const bst=getItemStatus(b,cats,users);const amtSuf=billListAmountSuffix(b,t);return(
                <div key={b.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #F5F0EA",alignItems:"flex-start"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{b.name}</div>
                    <div style={{fontSize:9,color:"#9CAA9F",marginTop:1}}>{b.category} · {billFreqLabel(b.frequency,t)}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:8}}>
                    <div style={{fontSize:12,fontWeight:700,color:G}}>{fmtExpenseAmt(b)}{amtSuf&&<span style={{fontSize:8,color:"#9CAA9F"}}>{amtSuf}</span>}</div>
                    <div style={{display:"inline-block",padding:"1px 5px",borderRadius:5,fontSize:8,fontWeight:600,background:ST[bst].bg,color:ST[bst].color,marginTop:1}}>{t("status."+bst)}</div>
                  </div>
                </div>
              );})}
              <p style={{fontSize:9,color:"#B5C0B8",marginTop:6}}>Las facturas se atribuyen por "enviado por". En futuras versiones se podrán asignar responsables explícitos.</p>
            </div>
          }
        </div>
      </div>
    </div>
  );
}

/* ── DASHBOARD ─────────────────────────────────────────────────────────────── */
function DashboardView(){
  const{t,user,expenses,bills,cats,users,isAdmin,myPending,myPendingBills,
        totApproved,totFixed,perPerson,go,openNew,setView,setAddBill,setDetailId,setPanel,goToMyRejected,departmentsWithStats}=useApp();
  const today=new Date();
  const m0=new Date(today.getFullYear(),today.getMonth(),1).toISOString().slice(0,10);
  const ym=today.toISOString().slice(0,7);
  const mTotal=expenses.filter(e=>getItemStatus(e,cats)==="approved"&&e.date>=m0).reduce((s,e)=>s+eurForExpense(e),0);
  const pend=expenses.filter(e=>getItemStatus(e,cats)==="pending").length;
  const mine=expenses.filter(e=>e.submittedBy===user.id);
  const apprMine=mine.filter(e=>getItemStatus(e,cats)==="approved"&&e.date?.slice(0,7)===ym);
  const apprSum=apprMine.reduce((s,e)=>s+eurForExpense(e),0);
  const apprCnt=apprMine.length;
  const pendList=mine.filter(e=>getItemStatus(e,cats)==="pending"&&e.date?.slice(0,7)===ym);
  const pendSum=pendList.reduce((s,e)=>s+eurForExpense(e),0);
  const pendCnt=pendList.length;
  const rejList=mine.filter(e=>getItemStatus(e,cats)==="rejected"&&e.date?.slice(0,7)===ym);
  const rejSum=rejList.reduce((s,e)=>s+eurForExpense(e),0);
  const rejCnt=rejList.length;
  const watchCats=cats.filter(c=>!c.archived&&c.budget!=null&&c.budget>0&&(c.approverIds?.[0]===user.id));
  const [drillPerson,setDrillPerson]=useState(null);
  // Upcoming bills in 15 days

/* ── RECEIPT THUMB (admin queue) ─────────────────────────────────────────── */
function ReceiptThumb({expenseId}){
  const [url,setUrl]=useState(null);
  useEffect(()=>{
    if(!expenseId||!AUTH_URL)return;
    let dead=false;
    (async()=>{
      try{
        const blob=await API.fetchBinary("/expenses/"+encodeURIComponent(expenseId)+"/receipt");
        if(dead)return;
        if(blob.type&&blob.type.includes("pdf"))return;
        setUrl(URL.createObjectURL(blob));
      }catch(e){}
    })();
    return()=>{
      dead=true;
      setUrl(u=>{if(u)URL.revokeObjectURL(u);return null;});
    };
  },[expenseId]);
  if(!url)return<div style={{width:52,height:52,borderRadius:8,background:"#EDE8E0",flexShrink:0}} title="Recibo"/>;
  return<img src={url} alt="" style={{width:52,height:52,objectFit:"cover",borderRadius:8,flexShrink:0}}/>;
}

                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
                        <div style={{fontWeight:600,fontSize:13}}>{e.description}</div>
