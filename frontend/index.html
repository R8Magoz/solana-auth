                      </div>
                      <div style={{fontSize:10,color:"#9CAA9F",marginTop:2}}>{fmtDate(e.date)} · {t("filter.submitter")}: {getU(e.submittedBy).name} · {e.category}</div>
                    </div>
                    <div style={{fontSize:17,fontWeight:800,color:G,fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmtExpenseAmt(e)}</div>
                  </div>
                  {AUTH_URL&&e.status&&<div style={{marginTop:6}}><span style={{padding:"2px 8px",borderRadius:11,fontSize:9,fontWeight:700,background:ST.pending.bg,color:ST.pending.color}}>{String(e.status).toUpperCase()}</span></div>}
                </div>
              </div>
              {(e.paidBy||[]).length>1&&<div style={{marginBottom:7}}><ExpenseSplitBreakdown e={e} t={t} users={users}/></div>}
              <div style={{marginBottom:7}}>{rowApproverIds.map(aid=>{const a=(e.approvals||{})[aid];return<div key={aid} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,marginBottom:2}}><div style={{width:5,height:5,borderRadius:"50%",background:a==="approved"?"#16A34A":a==="rejected"?"#DC2626":"#D97706"}}/><span style={{fontWeight:500}}>{getU(aid).name}:</span><span style={{color:a==="approved"?"#166534":a==="rejected"?"#991B1B":"#92400E"}}>{a?t("status."+a):t("status.pending")}</span></div>})}</div>
              {AUTH_URL?(rowApproverIds.includes(user.id)&&!(e.approvals||{})[user.id]?(<div><label className="lbl" style={{marginBottom:3}}>{t("label.note")}</label><textarea className="inp" rows={2} placeholder="" value={aNote[e.id]||""} onChange={ev=>setANote(p=>({...p,[e.id]:ev.target.value}))} style={{marginBottom:6,resize:"vertical",fontSize:13}}/><div style={{display:"flex",gap:6}}><button className="btn-primary" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>approve(e.id,"approved","expense")}>{t("action.approve")}</button><button className="btn-danger" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>approve(e.id,"rejected","expense")}>{t("action.reject")}</button></div></div>):((e.approvals||{})[user.id]?<div style={{fontSize:11,color:"#4B5E52",background:"#F5F0EA",padding:"6px 9px",borderRadius:6}}>{t("status."+(e.approvals||{})[user.id])}</div>:null)):(!(e.approvals||{})[user.id]?(<div><label className="lbl" style={{marginBottom:3}}>{t("label.note")}</label><textarea className="inp" rows={2} placeholder="" value={aNote[e.id]||""} onChange={ev=>setANote(p=>({...p,[e.id]:ev.target.value}))} style={{marginBottom:6,resize:"vertical",fontSize:13}}/><div style={{display:"flex",gap:6}}><button className="btn-primary" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>approve(e.id,"approved","expense")}>{t("action.approve")}</button><button className="btn-danger" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>approve(e.id,"rejected","expense")}>{t("action.reject")}</button></div></div>):(<div style={{fontSize:11,color:"#4B5E52",background:"#F5F0EA",padding:"6px 9px",borderRadius:6}}>{t("status."+(e.approvals||{})[user.id])}</div>))}
            </div>
          );
        })
      )}
      {tab==="bills"&&(
        myPendingBills.length===0?<div className="card" style={{textAlign:"center",padding:36,color:"#9CAA9F",fontSize:13}}>{t("empty.approvals")}</div>:
        myPendingBills.map(b=>{
          const bApprovals=b.approvals||{};
          const cat=cats.find(c=>c.name===b.category);
          const approverIds=cat?.approverIds?.length>0?cat.approverIds:ADMIN_IDS;
          return(
            <div key={b.id} className="card" style={{marginBottom:9}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
                <div><div style={{fontWeight:600,fontSize:13}}>{b.name}</div><div style={{fontSize:10,color:"#9CAA9F",marginTop:2}}>{b.category} · {billFreqLabel(b.frequency,t)}{isBillRecurringFrequency(b.frequency)&&b.dayOfMonth?` · ${t("bills.day")} ${b.dayOfMonth}`:""}</div></div>
                <div style={{fontSize:17,fontWeight:800,color:G,fontVariantNumeric:"tabular-nums"}}>{fmtExpenseAmt(b)}</div>
              </div>
              <div style={{marginBottom:7}}>{approverIds.map(aid=>{const a=bApprovals[aid];return<div key={aid} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,marginBottom:2}}><div style={{width:5,height:5,borderRadius:"50%",background:a==="approved"?"#16A34A":a==="rejected"?"#DC2626":"#D97706"}}/><span style={{fontWeight:500}}>{getU(aid).name}:</span><span style={{color:a==="approved"?"#166534":a==="rejected"?"#991B1B":"#92400E"}}>{a?t("status."+a):t("status.pending")}</span></div>})}</div>
              {!(b.approvals||{})[user.id]?(<div><label className="lbl" style={{marginBottom:3}}>{t("label.note")}</label><textarea className="inp" rows={2} placeholder="" value={aNote[b.id]||""} onChange={ev=>setANote(p=>({...p,[b.id]:ev.target.value}))} style={{marginBottom:6,resize:"vertical",fontSize:13}}/><div style={{display:"flex",gap:6}}><button className="btn-primary" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>approve(b.id,"approved","bill")}>{t("action.approve")}</button><button className="btn-danger" style={{flex:1,padding:"7px",fontSize:13}} onClick={()=>approve(b.id,"rejected","bill")}>{t("action.reject")}</button></div></div>):(<div style={{fontSize:11,color:"#4B5E52",background:"#F5F0EA",padding:"6px 9px",borderRadius:6}}>{t("status."+(bApprovals[user.id]||"pending"))}</div>)}
            </div>
          );
        })
      )}
    </div>
  );
}

/* ── BILLS VIEW ────────────────────────────────────────────────────────────── */
function BillsView(){
  const{t,user,users,bills,cats,saveBills,isAdmin,totFixed,addBill,setAddBill,newBill,setNewBill,markBillPaid,departments,defaultDeptId,newBillRecPrev,setNewBillRecPrev,startCamForNewBill}=useApp();
  const [selBillId,setSelBillId]=useState(null);
  const [editBillId,setEditBillId]=useState(null);
  const [billSearch,setBillSearch]=useState("");
  const [billCatFlt,setBillCatFlt]=useState("");
  const [billSubmFlt,setBillSubmFlt]=useState("");
  const [billDateFrom,setBillDateFrom]=useState("");
  const [billDateTo,setBillDateTo]=useState("");
  const [billStatusFlt,setBillStatusFlt]=useState("all");
  const [editBillForm,setEditBillForm]=useState({});
  const [editBillDirty,setEditBillDirty]=useState(false);
  const billFileRef=useRef(null);
  const billNewFileRef=useRef(null);
  const activeCats=cats.filter(c=>!c.archived);
  const freqNb=newBill.frequency||"once";
  const recNb=isBillRecurringFrequency(freqNb);
  const billAmtOk=parseMoney(newBill.amount)>0;
  const billValid=!!String(newBill.name||"").trim()&&billAmtOk&&!!String(newBill.category||"").trim()&&!!String(newBill.departmentId||"").trim()&&(!recNb||!!String(newBill.dayOfMonth||"").trim());
  const [billSubmitAttempt,setBillSubmitAttempt]=useState(false);
  useEffect(()=>{if(billValid)setBillSubmitAttempt(false);},[billValid]);
  const bh=billSubmitAttempt&&!billValid;
  const brs=bad=>(bad?{borderColor:"#DC2626",boxShadow:"0 0 0 1px #DC2626"}:{});
  const today=new Date();
  const upcoming=[];
  bills.filter(b=>{
    if(AUTH_URL&&b._apiType==="bill")return b.recurring&&(b.apiBillStatus==="pending"||b.apiBillStatus==="overdue")&&b.dayOfMonth;
    return getItemStatus(b,cats)==="approved"&&b.active;
  }).forEach(b=>{
    if(b.frequency==="monthly"&&b.dayOfMonth){
      for(let m=0;m<3;m++){const d=new Date(today.getFullYear(),today.getMonth()+m,parseInt(b.dayOfMonth));const diff=(d-today)/86400000;if(diff>=0&&diff<=30)upcoming.push({...b,dueDate:d,daysUntil:Math.round(diff)});}
    }
  });
  upcoming.sort((a,b)=>a.dueDate-b.dueDate);
  const startEditBill=(b)=>{
    setEditBillForm({name:b.name,amount:String(b.amount),frequency:b.frequency||"once",
      category:b.category,dayOfMonth:b.dayOfMonth||"",description:b.description||"",
      notes:b.notes||"",receipt:b.receipt||null,receiptType:b.receiptType||null,
      intervalMonths:b.intervalMonths||"",endDate:b.endDate||"",
      dueDate:(b.dueDate&&String(b.dueDate).slice(0,10))||"",
      departmentId:b.departmentId||defaultDeptId});
    setEditBillId(b.id);setEditBillDirty(false);
  };
  const cancelEditBill=()=>{
    if(editBillDirty&&!confirm(t("expense.unsaved")))return;
    setEditBillId(null);setEditBillDirty(false);
  };
  const saveBillEdit=(b)=>{
    if(!editBillForm.departmentId){alert(t("msg.deptRequired"));return;}
    const editFreq=editBillForm.frequency||"";
    if(isBillRecurringFrequency(editFreq)&&!editBillForm.dayOfMonth){alert(t("msg.dayOfMonthRequired"));return;}
    if(!confirm(t("bills.confirmEdit")))return;
    if(AUTH_URL&&b._apiType==="bill"){
      if(b._pendingSync){alert("Espera a sincronizar esta factura antes de editarla.");return;}
      void (async()=>{
        try{
          const freq=editBillForm.frequency||"once";
          const rec=isBillRecurringFrequency(freq);
          const due=billDueISOFromForm({...editBillForm,frequency:freq});
          const rule=freq==="annual"?"yearly":freq==="custom"&&String(editBillForm.intervalMonths)==="3"?"quarterly":"monthly";
          await API.put("/bills/"+encodeURIComponent(b.id),{
            vendor:editBillForm.name,
            amount:parseMoney(editBillForm.amount),
            category:editBillForm.category,
            dueDate:due,
            notes:editBillForm.notes||undefined,
            recurring:rec,
            recurrenceRule:rule,
            departmentId:editBillForm.departmentId||defaultDeptId,
          });
          const d=await API.get("/bills");
          saveBills((d.bills||[]).map(billFromApi));
          setEditBillId(null);setEditBillDirty(false);
        }catch(e){
          if(isOfflineQueuedError(e)){
            const updated={...b,...editBillForm,amount:parseMoney(editBillForm.amount)||b.amount,name:editBillForm.name,vendor:editBillForm.name};
            saveBills(bills.map(x=>x.id===b.id?updated:x));
            setEditBillId(null);setEditBillDirty(false);
            return;
          }
          alert(e.message||"No se pudo guardar.");
        }
      })();
      return;
    }
    const BILL_KEY_FIELDS=["name","amount","frequency","category","dayOfMonth","description","receipt"];
    const bst=getItemStatus(b,cats);
    const wasApproved=bst==="approved";
    const changedFields=Object.keys(editBillForm).filter(k=>{
      if(k==="receipt")return (editBillForm.receipt||null)!==(b.receipt||null);
      if(k==="receiptType")return false;
      return String(editBillForm[k]||"")!==String(b[k]||"");
    });
    const relevantChanged=wasApproved&&changedFields.some(f=>BILL_KEY_FIELDS.includes(f));
    const now=new Date().toISOString();
    let trail=[...(b.auditTrail||[]),{action:"edited",by:user.id,at:now,meta:{fields:changedFields.length?changedFields:["misc"]}}];
    let newApprovals=b.approvals||{};
    if(relevantChanged){newApprovals={};trail=[...trail,{action:"reapproval_required",by:user.id,at:now}];}
    const updated={...b,...editBillForm,amount:parseMoney(editBillForm.amount)||b.amount,approvals:newApprovals,active:relevantChanged?false:b.active,auditTrail:trail};
    saveBills(bills.map(x=>x.id===b.id?updated:x));
    appLog("info","bill_edited",{itemCode:b.itemCode,userId:user.id,relevantChanged});
    setEditBillId(null);setEditBillDirty(false);
    if(relevantChanged)alert(t("expense.reapprovalDone"));
  };
  const handleBillFile=(e,billId)=>{
    const f=e.target.files?.[0];if(!f)return;
    const err=validateUpload(f,UPLOAD_RULES.receipt);
    if(err){alert(err);e.target.value="";return;}
    const r=new FileReader();
    r.onload=ev=>{const url=ev.target.result,b64=url.split(",")[1],type=receiptEffectiveMime(f)||f.type||"image/jpeg";
      setEditBillForm(p=>({...p,receipt:b64,receiptType:type}));setEditBillDirty(true);};
    r.readAsDataURL(f);e.target.value="";
  };

  const handleNewBillFile=(e)=>{
    const f=e.target.files?.[0];if(!f)return;
    const err=validateUpload(f,UPLOAD_RULES.receipt);
    if(err){alert(err);e.target.value="";return;}
    const r=new FileReader();
    r.onload=ev=>{const url=ev.target.result,b64=url.split(",")[1],type=receiptEffectiveMime(f)||f.type||"image/jpeg";
      setNewBill(p=>({...p,receipt:b64,receiptType:type}));
      setNewBillRecPrev(type.includes("pdf")?"PDF":url);};
    r.readAsDataURL(f);e.target.value="";
  };

  const submitBill=()=>{
    if(!billValid){setBillSubmitAttempt(true);return;}
    const freq=newBill.frequency||"once";
    const rec=isBillRecurringFrequency(freq);
    if(AUTH_URL){
      void (async()=>{
        const clientRef="tmp_bill_"+genUuid();
        const due=billDueISOFromForm(newBill);
        const rule=freq==="annual"?"yearly":freq==="custom"&&String(newBill.intervalMonths)==="3"?"quarterly":"monthly";
        try{
          const d=await API.post("/bills",{
            vendor:newBill.name,
            amount:parseMoney(newBill.amount),
            category:newBill.category,
            dueDate:due,
            notes:newBill.description||undefined,
            recurring:rec,
            recurrenceRule:rule,
            departmentId:newBill.departmentId,
          },{clientRef});
          saveBills([...bills,billFromApi(d.bill)]);
          appLog("info","bill_submitted",{name:newBill.name,userId:user.id});
          setNewBill({...BB});setNewBillRecPrev(null);setAddBill(false);
        }catch(e){
          if(isOfflineQueuedError(e)){
            const amt=parseMoney(newBill.amount);
            const ob=normalizeItem({
              id:clientRef,
              _apiType:"bill",
              _pendingSync:true,
              name:newBill.name,
              vendor:newBill.name,
              amount:amt,
              category:newBill.category,
              dueDate:billDueISOFromForm(newBill),
              dayOfMonth:rec?(newBill.dayOfMonth||"1"):"",
              frequency:freq,
              intervalMonths:newBill.intervalMonths||"",
              endDate:newBill.endDate||"",
              submittedBy:user.id,
              apiBillStatus:"pending",
              recurring:rec,
              recurrenceRule:rule,
              active:rec,
              notes:"",
              description:newBill.description||"",
              receipt:newBill.receipt||null,
              receiptType:newBill.receiptType||null,
              approvals:{},
              auditTrail:[],
              seenBy:[],
              itemCode:mkCode("FAC"),
              departmentId:newBill.departmentId||null,
            },"bill");
            saveBills([...bills,ob]);
            appLog("info","bill_submitted",{name:newBill.name,userId:user.id,pendingSync:true});
            setNewBill({...BB});setNewBillRecPrev(null);setAddBill(false);
            return;
          }
          alert(e.message||"Error al crear factura.");
        }
      })();
      return;
    }
    const cat=cats.find(c=>c.name===newBill.category);
    const billAdminIds=getAdminIds(users);
    const approverIds=cat?.approverIds?.length>0?cat.approverIds:billAdminIds;
    const baseTrail=[{action:"submitted",by:user.id,at:new Date().toISOString()}];
    const{approvals,auditTrail}=autoApprove(user.id,approverIds,{},baseTrail);
    const allApproved=approverIds.every(id=>approvals[id]==="approved");
    const attachTrail=newBill.receipt?[...auditTrail,{action:"attachment_uploaded",by:user.id,at:new Date().toISOString(),meta:{type:newBill.receiptType}}]:auditTrail;
    const b={id:"b"+Date.now(),itemCode:mkCode("FAC"),...newBill,amount:parseMoney(newBill.amount),
      submittedBy:user.id,approvals,auditTrail:attachTrail,active:allApproved,
      receipt:newBill.receipt||null,receiptType:newBill.receiptType||null,departmentId:newBill.departmentId||DEFAULT_DEPT_ID};
    appLog("info","bill_submitted",{itemCode:b.itemCode,name:b.name,amount:b.amount,userId:user.id,autoApproved:allApproved,hasAttachment:!!newBill.receipt});
    saveBills([...bills,b]);
    setNewBill({...BB});setNewBillRecPrev(null);setAddBill(false);
    if(!allApproved)alert(t("msg.billApprovalNeeded"));
  };
  const byBillStatus=React.useMemo(()=>{
    const pend=bills.filter(b=>getItemStatus(b,cats)==="pending");
    const appr=bills.filter(b=>getItemStatus(b,cats)==="approved");
    const rej=bills.filter(b=>getItemStatus(b,cats)==="rejected");
    return{all:bills,pending:pend,approved:appr,rejected:rej};
  },[bills,cats]);
  const billActiveFilterCount=[billCatFlt,billSubmFlt,billDateFrom,billDateTo].filter(Boolean).length;
  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,flexWrap:"wrap",gap:6}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G}}>{t("nav.bills")}</h1>
        <button className="btn-primary" style={{fontSize:13,padding:"7px 14px"}} onClick={()=>setAddBill(v=>{const n=!v;if(n)setBillSubmitAttempt(false);return n;})}>{addBill?t("action.cancel"):t("action.addBill")}</button>
      </div>
      <div style={{marginBottom:11,fontSize:11,lineHeight:1.5,color:"#9CAA9F"}}>{t("bills.summary",{monthly:fmt(totFixed),annual:fmt(totFixed*12)})}</div>
      <div style={{marginBottom:11,fontSize:11,lineHeight:1.5,maxWidth:"100%"}}>
        <div style={{fontWeight:700,color:"#4B5E52"}}>{t("page.billsDefTitle")}</div>
        <div style={{color:"#9CAA9F"}}>{t("page.billsDefBody")}</div>
      </div>
      {/* ── Estado (pills) */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:7}}>
        {["all","pending","approved","rejected"].map(f=>(
          <button key={f} style={{padding:"3px 10px",borderRadius:18,fontSize:11,fontWeight:500,border:"1.5px solid",borderColor:billStatusFlt===f?G:"#DDD6CC",background:billStatusFlt===f?G:"#fff",color:billStatusFlt===f?"#fff":"#4B5E52",cursor:"pointer"}} onClick={()=>setBillStatusFlt(f)}>
            {f==="all"?t("bills.filterAll"):f==="pending"?t("bills.filterPending"):f==="approved"?t("bills.filterApproved"):t("bills.filterRejected")} ({byBillStatus[f]?.length||0})
          </button>
        ))}
      </div>
      {/* ── Search + extended filters (mismo patrón que Gastos) */}
      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:9}}>
        <input className="inp" style={{flex:1,minWidth:140,maxWidth:220,padding:"5px 9px",fontSize:12}}
          placeholder={t("bills.searchPlaceholder")} value={billSearch}
          onChange={e=>setBillSearch(e.target.value)}/>
        <select className="inp" style={{padding:"5px 8px",fontSize:11,width:"auto",minWidth:110,cursor:"pointer"}}
          value={billCatFlt} onChange={e=>setBillCatFlt(e.target.value)}>
          <option value="">{t("filter.category")}: {t("filter.all")}</option>
          {activeCats.map(c=><option key={c.id} value={c.name}>{tCat(c.name,t)}</option>)}
        </select>
        <select className="inp" style={{padding:"5px 8px",fontSize:11,width:"auto",minWidth:120,cursor:"pointer"}}
          value={billSubmFlt} onChange={e=>setBillSubmFlt(e.target.value)}>
          <option value="">{t("filter.submitter")}: {t("filter.all")}</option>
          {users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}
        </select>
        <input className="inp" type="date" style={{padding:"5px 8px",fontSize:11,width:"auto",minWidth:110,cursor:"pointer"}}
          value={billDateFrom} onChange={e=>setBillDateFrom(e.target.value)} title={t("filter.dateFrom")}/>
        <input className="inp" type="date" style={{padding:"5px 8px",fontSize:11,width:"auto",minWidth:110,cursor:"pointer"}}
          value={billDateTo} onChange={e=>setBillDateTo(e.target.value)} title={t("filter.dateTo")}/>
        {billActiveFilterCount>0&&(
          <button style={{padding:"4px 10px",borderRadius:18,fontSize:11,fontWeight:600,border:"1.5px solid "+G,background:"transparent",color:G,cursor:"pointer"}}
            onClick={()=>{setBillCatFlt("");setBillSubmFlt("");setBillDateFrom("");setBillDateTo("");setBillSearch("");}}>
            {t("filter.clearFilters")} ({billActiveFilterCount + (billSearch?1:0)})
          </button>
        )}
      </div>
      {addBill&&(
        <div className="card" style={{marginBottom:11}}>
          <div style={{fontWeight:600,fontSize:13,marginBottom:9}}>{t("bills.newBill")}</div>
{/* BLOQUE A — Datos básicos */}
          <div style={{fontSize:9,fontWeight:700,color:G,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:6,opacity:0.6}}>Datos básicos</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
            <div style={{gridColumn:"1/-1"}}><label className="lbl">{t("label.billName")}</label><input className="inp" placeholder={t("label.billName")} value={newBill.name} style={brs(bh&&!String(newBill.name||"").trim())} onChange={e=>setNewBill(p=>({...p,name:e.target.value}))}/></div>

                {b.description&&<div style={{marginTop:7,padding:"5px 8px",background:"#F5E8F4",borderRadius:6,fontSize:11,color:"#5C1057"}}><span style={{fontWeight:600}}>{t("bills.description")}: </span>{b.description}</div>}
                {b.notes&&<div style={{marginTop:4,padding:"5px 8px",background:"#F5F0EA",borderRadius:6,fontSize:11,color:"#4B5E52"}}>{b.notes}</div>}
                {/* Attachment */}
                <div style={{marginTop:9}}>
                  <AttachmentViewer
                    receipt={b.receipt||null}
                    receiptType={b.receiptType||null}
                    label={t("bills.attachment")}
                    t={t}
                    onRemove={null}
                  />
                </div>
                </div>}
              </div>
            )}
            </div>
          );
        });})()}
      </div>
    </div>
  );
}

/* ── PAYMENT CALENDAR ──────────────────────────────────────────────────────── */
function PaymentCalendar(){
  const{bills,expenses,cats,t,go,setDetailId,setPanel}=useApp();
  const [cur,setCur]=useState(()=>new Date());
  const year=cur.getFullYear(),mon=cur.getMonth();
  const firstDay=(new Date(year,mon,1).getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(year,mon+1,0).getDate();
  const events={};
  bills.forEach(b=>{
    if(AUTH_URL&&b._apiType==="bill"&&b.dueDate&&b.recurring&&(b.apiBillStatus==="pending"||b.apiBillStatus==="overdue")){
      try{
        const dt=new Date(b.dueDate+"T12:00:00");
        if(dt.getFullYear()===year&&dt.getMonth()===mon){
          const day=dt.getDate();
          if(!events[day])events[day]=[];
          events[day].push({type:"bill",id:b.id,label:b.name,amount:eurForExpense(b)});
        }
      }catch(e){}
      return;
    }
    if(getItemStatus(b,cats)==="approved"&&b.active&&b.dayOfMonth){
      const d=parseInt(b.dayOfMonth);
      if(!events[d])events[d]=[];
      events[d].push({type:"bill",id:b.id,label:b.name,amount:eurForExpense(b)});
    }
  });
  expenses.forEach(e=>{
    try{const d=new Date(e.date);if(d.getFullYear()===year&&d.getMonth()===mon){const day=d.getDate();if(!events[day])events[day]=[];events[day].push({type:"expense",id:e.id,label:e.description,amount:eurForExpense(e)});}}catch{}
  });
  const cells=[];
  for(let i=0;i<firstDay;i++)cells.push(null);
  for(let d=1;d<=daysInMonth;d++)cells.push(d);
  const today=new Date();
  const isToday=d=>d===today.getDate()&&mon===today.getMonth()&&year===today.getFullYear();
  const monthName=(()=>{const mn=cur.toLocaleString("es-ES",{month:"long"});const yr=cur.getFullYear();return mn.charAt(0).toUpperCase()+mn.slice(1)+" "+yr;})();
  const dayLabels=["cal.mon","cal.tue","cal.wed","cal.thu","cal.fri","cal.sat","cal.sun"].map(k=>t(k));
  const [selDay,setSelDay]=useState(null);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <button style={{border:"none",background:"#F5F0EA",borderRadius:6,padding:"4px 10px",fontSize:14,cursor:"pointer",fontWeight:600}} onClick={()=>setCur(new Date(year,mon-1,1))}>‹</button>
        <span style={{fontWeight:700,fontSize:13,textTransform:"capitalize"}}>{monthName}</span>
        <button style={{border:"none",background:"#F5F0EA",borderRadius:6,padding:"4px 10px",fontSize:14,cursor:"pointer",fontWeight:600}} onClick={()=>setCur(new Date(year,mon+1,1))}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:3}}>
        {dayLabels.map((d,i)=><div key={i} style={{textAlign:"center",fontSize:8,fontWeight:600,color:"#9CAA9F",padding:"2px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {cells.map((d,i)=>(
          <div key={i} onClick={()=>d&&setSelDay(selDay===d?null:d)} style={{minHeight:32,borderRadius:5,background:d&&isToday(d)?"rgba(60,10,55,0.08)":d&&events[d]?"#FFFBF5":"#FAFAF8",border:d&&isToday(d)?`1.5px solid ${G}`:d&&selDay===d?"1.5px solid "+T:"1px solid transparent",padding:"3px 2px",cursor:d?"pointer":"default",transition:"border 0.1s"}}>
            {d&&<><div style={{fontSize:9,fontWeight:isToday(d)?700:400,color:isToday(d)?G:"#4B5E52",textAlign:"center"}}>{d}</div><div style={{display:"flex",flexWrap:"wrap",gap:1,justifyContent:"center",marginTop:1}}>{(events[d]||[]).map((ev,j)=><div key={j} title={ev.label} style={{width:5,height:5,borderRadius:"50%",background:ev.type==="bill"?T:G}}/>)}</div></>}
          </div>
        ))}
      </div>
      {selDay&&events[selDay]&&(
        <div style={{marginTop:10,background:"#F5F0EA",borderRadius:8,padding:"10px 12px"}}>
          <div style={{fontWeight:600,fontSize:11,marginBottom:6,color:G}}>{selDay} {cur.toLocaleString("es-ES",{month:"long"})}</div>
          {events[selDay].map((ev,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:11,marginBottom:3,gap:6}}>
              <span style={{display:"flex",alignItems:"center",gap:4,flex:1,minWidth:0}}><span style={{width:5,height:5,borderRadius:"50%",background:ev.type==="bill"?T:G,display:"inline-block",flexShrink:0}}/><span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{ev.label}</span></span>
              <span style={{fontWeight:700,fontVariantNumeric:"tabular-nums",flexShrink:0}}>{fmt(ev.amount)}</span>
              <button style={{fontSize:9,padding:"1px 6px",borderRadius:4,border:`1px solid ${G}`,background:"transparent",color:G,cursor:"pointer",fontFamily:"inherit",flexShrink:0,whiteSpace:"nowrap"}} onClick={()=>{if(ev.type==="expense"){go("expenses");setTimeout(()=>{setDetailId(ev.id);setPanel("detail");},50);}else{go("bills");}}}>{t("action.viewAll")}</button>
            </div>
          ))}
        </div>
      )}
      <div style={{display:"flex",gap:12,marginTop:8,fontSize:9}}>
        <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:T,display:"inline-block"}}/>{t("nav.bills")}</span>
        <span style={{display:"flex",alignItems:"center",gap:3}}><span style={{width:6,height:6,borderRadius:"50%",background:G,display:"inline-block"}}/>{t("nav.expenses")}</span>
      </div>
    </div>
  );
}

/* ── REPORTS VIEW ──────────────────────────────────────────────────────────── */
function ReportsView(){
  const{t,expenses,bills,cats,users,totApproved,totFixed,user,saveExp,adminIds,go,setCatFlt,setView,setExpFlt,departmentsWithStats,setDetailId,setPanel}=useApp();
  const [expFilter,setExpFilter]=useState("all");
  const [openPersonLog,setOpenPersonLog]=useState({});
  const personInvestmentRows=useMemo(()=>users.map(u=>{
    const approvedTotal=expenses.filter(e=>getItemStatus(e,cats,users)==="approved").reduce((s,e)=>s+shareEurInExpense(e,u.id),0);
    const submittedCount=expenses.filter(e=>e.submittedBy===u.id&&getItemStatus(e,cats,users)!=="deleted").length;
    const logExpenses=expenses.filter(e=>{
      const st=getItemStatus(e,cats,users);
      if(st==="deleted"||st==="rejected")return false;
      if(st!=="approved"&&st!=="pending")return false;
      return(e.paidBy||[]).some(p=>p&&p.userId===u.id);
    }).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
    return{...u,approvedTotal,submittedCount,logExpenses};
  }).filter(u=>u.approvedTotal>0||u.submittedCount>0)
    .sort((a,b)=>b.approvedTotal-a.approvedTotal),[users,expenses,cats]);
  const catTotals=cats.filter(c=>!c.archived).map(c=>({cat:c.name,total:expenses.filter(e=>e.category===c.name&&getItemStatus(e,cats)==="approved").reduce((s,e)=>s+eurForExpense(e),0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxC=catTotals[0]?.total||1;
  const monthlyTrend=(()=>{
    const now=new Date();
    const months=[];
    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const label=d.toLocaleString("es-ES",{month:"short"});
      const total=expenses
        .filter(e=>getItemStatus(e,cats,users)==="approved"&&e.date?.slice(0,7)===ym)
        .reduce((s,e)=>s+eurForExpense(e),0);
      months.push({ym,label,total});
    }
    return months;
  })();
  const maxMonth=Math.max(...monthlyTrend.map(m=>m.total),1);
  const hasTrendData=monthlyTrend.some(m=>m.total>0);
  const trendBarTrackPx=76;
  const exportCSV=(all)=>{
    const data=all?"all":expFilter;
    const src=data==="all"?expenses:(expenses.filter(e=>getItemStatus(e,cats)===data));
    const now=new Date().toISOString();
    const exportedUser=user;
    if(!AUTH_URL){
      const updatedSrc=src.map(e=>({...e,auditTrail:[...(e.auditTrail||[]),{action:"exported",by:exportedUser.id,at:now,meta:{format:"csv",filter:data}}]}));
      saveExp(expenses.map(e=>{const u=updatedSrc.find(x=>x.id===e.id);return u||e;}));
    }
    appLog("info","csv_exported",{filter:data,count:src.length,userId:exportedUser.id,codes:src.map(e=>e.itemCode||e.id)});
    const rows=[[t("item.code"),t("label.date"),t("label.description"),t("label.amount"),t("csv.baseAmount"),t("csv.ivaRatePct"),t("csv.ivaEur"),t("label.category"),t("label.status"),t("filter.submitter"),t("label.paidBy"),t("label.notes"),t("label.approvers")],
      ...src.map(e=>{
        const cat=cats.find(c=>c.name===e.category);
        const approverIds=cat?.approverIds?.length>0?cat.approverIds:adminIds;
        const amtEur=eurForExpense(e);
        const base=e.ivaRate!==null&&e.ivaRate!==undefined?Math.round((amtEur-(e.ivaAmount||0))*100)/100:amtEur;
        const ivr=e.ivaRate!==null&&e.ivaRate!==undefined?e.ivaRate:"";
        const ivam=e.ivaAmount!==null&&e.ivaAmount!==undefined?e.ivaAmount:"";
        return[e.itemCode||e.id,e.date,e.description,amtEur,base,ivr,ivam,e.category,getItemStatus(e,cats,users),(users.find(u=>u.id===e.submittedBy)||{name:UNKNOWN_USER_NAME}).name,e.paidBy.map(p=>`${(users.find(u=>u.id===p.userId)||{name:UNKNOWN_USER_NAME}).name}:${fmt(p.amount)}`).join(";"),e.notes||"",approverIds.map(id=>(users.find(u=>u.id===id)||{name:UNKNOWN_USER_NAME}).name).join(";")];
      })];
    const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=Object.assign(document.createElement("a"),{href:URL.createObjectURL(new Blob([csv],{type:"text/csv"})),download:`solana-${data}-${new Date().toISOString().slice(0,10)}.csv`});
    a.click();URL.revokeObjectURL(a.href);
  };
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:6}}>
        <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:24,color:G}}>{t("reports.title")}</h1>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          <select className="inp" style={{width:"auto",fontSize:11,padding:"4px 8px"}} value={expFilter} onChange={e=>setExpFilter(e.target.value)}>
            <option value="all">{t("reports.allData")}</option>
            <option value="approved">{t("reports.approvedOnly")}</option>
            <option value="pending">{t("reports.pendingOnly")}</option>
          </select>
          <button className="btn-secondary" style={{fontSize:11,padding:"5px 10px"}} onClick={()=>exportCSV(expFilter==="all")}>{t("action.exportCSV")} ({expFilter==="all"?t("reports.allData"):expFilter==="approved"?t("reports.approvedOnly"):t("reports.pendingOnly")})</button>
        </div>
      </div>
      {hasTrendData&&(
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>{t("reports.monthlyTrend")}</div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,minHeight:120}}>
          {monthlyTrend.map(m=>{
            const barH=Math.max(4,Math.round((m.total/maxMonth)*trendBarTrackPx));
            return(
            <div key={m.ym} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,minWidth:0}}>
              <div style={{fontSize:9,fontWeight:600,color:G,fontVariantNumeric:"tabular-nums",textAlign:"center",lineHeight:1.2,minHeight:22}}>
                {m.total>0?fmt(m.total):"—"}
              </div>
              <div style={{
                width:"100%",maxWidth:40,height:trendBarTrackPx,display:"flex",flexDirection:"column",justifyContent:"flex-end",alignItems:"center",
              }}>
                <div style={{
                  width:"100%",
                  height:barH,
                  background:T,borderRadius:"4px 4px 0 0",
                  transition:"height 0.4s",
                }}/>
              </div>
              <div style={{fontSize:9,color:"#9CAA9F",textTransform:"capitalize"}}>{m.label}</div>
            </div>
            );
          })}
        </div>
      </div>
      )}
      <DepartmentBudgetBars t={t} rows={departmentsWithStats} title={t("dash.deptBudgetsTitle")}/>
      {/* By category */}
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:11}}>{t("reports.byCategory")}</div>
        {catTotals.length===0&&<div style={{color:"#9CAA9F",fontSize:12}}>{t("reports.noApproved")}</div>}
        {catTotals.map(({cat,total})=>(<div key={cat} className="row-hover" style={{marginBottom:9,cursor:"pointer",borderRadius:6,padding:"2px 4px",margin:"0 -4px 9px"}} onClick={()=>{setCatFlt(cat);setExpFlt("all");go("expenses");}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:2}}><span style={{fontWeight:500}}>{cat}</span><span style={{fontWeight:700,fontVariantNumeric:"tabular-nums"}}>{fmt(total)}</span></div><div style={{height:4,background:"#EDE8E0",borderRadius:2}}><div style={{height:"100%",borderRadius:2,background:T,width:`${total/maxC*100}%`,transition:"width 0.4s"}}/></div></div>))}
      </div>
      {/* Budget vs actual */}
      {(()=>{
        const ym=new Date().toISOString().slice(0,7);
        const budgeted=cats.filter(c=>!c.archived&&c.budget!=null&&c.budget>0);
        if(budgeted.length===0)return null;
        const rowsB=budgeted.map(c=>{
          const spent=expenses.filter(e=>e.category===c.name&&getItemStatus(e,cats)==="approved"&&e.date?.slice(0,7)===ym).reduce((s,e)=>s+eurForExpense(e),0);
          const pct=c.budget>0?spent/c.budget*100:0;
          const barColor=pct<75?"#16A34A":pct<=100?"#D97706":"#DC2626";
          return{...c,spent,pct,barColor};
        });
        const totalB=budgeted.reduce((s,c)=>s+c.budget,0);
        const totalS=rowsB.reduce((s,r)=>s+r.spent,0);
        const aggPct=totalB>0?totalS/totalB*100:(totalS>0?100:0);
        const barT=aggPct<75?"#16A34A":aggPct<=100?"#D97706":"#DC2626";
        return(
          <div className="card" style={{marginBottom:11}}>
            <div style={{fontWeight:600,fontSize:13,marginBottom:11}}>{t("reports.budgetVsActual")}</div>
            {rowsB.map(r=>(
              <BudgetVsActualRow key={r.id||r.name} t={t} name={r.name} spent={r.spent} budget={r.budget} remaining={r.budget-r.spent} barColor={r.barColor}/>
            ))}
            <div style={{marginTop:4,paddingTop:12,borderTop:"1px solid #EDE8E0"}}>
              <div style={{fontSize:10,color:"#9CAA9F",marginBottom:6}}>{t("reports.budgetTotal")}</div>
              <BudgetVsActualRow t={t} name={t("reports.total")} spent={totalS} budget={totalB} remaining={totalB-totalS} barColor={barT} noBottomMargin/>
            </div>

        );

          {personInvestmentRows.map(u=>{
            const open=!!openPersonLog[u.id];

              <div key={u.id} style={{border:"1px solid #EDE8E0",borderRadius:10,overflow:"hidden",background:"#FAF7F2"}}>

                  <UserAvatar user={u} size={36} fontSize={12}/>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:13,color:G}}>{u.name}</div>
                    <div style={{fontSize:10,color:"#9CAA9F",marginTop:2}}>{u.role}{u.title?` · ${u.title}`:""}</div>
                    <div style={{fontSize:10,color:"#6B7B72",marginTop:4}}>{t("reports.submittedCount",{count:String(u.submittedCount)})}</div>

                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontWeight:800,fontSize:14,color:G,fontVariantNumeric:"tabular-nums"}}>{fmt(u.approvedTotal)}</div>
                    <div style={{fontSize:9,color:"#9CAA9F",marginTop:2}}>{t("filter.approved")}</div>

                </button>
                {open&&(
                  <div style={{padding:"0 12px 12px",borderTop:"1px solid #EDE8E0"}}>
                    {u.logExpenses.length===0
                      ?<div style={{fontSize:11,color:"#9CAA9F",padding:"10px 0"}}>{t("reports.personNoSplitExpenses")}</div>
                      :u.logExpenses.map(e=>{
                        const st=getItemStatus(e,cats,users);
                        const share=shareEurInExpense(e,u.id);

                            <div style={{flex:1,minWidth:0}}>

          if(AUTH_URL&&b._apiType==="bill")return b.recurring&&(b.apiBillStatus==="pending"||b.apiBillStatus==="overdue");
          return getItemStatus(b,cats)==="approved"&&b.active;
        });const mf=ab.reduce((s,b)=>{const ev=eurForExpense(b);if(b.frequency==="monthly")return s+ev;if(b.frequency==="annual")return s+ev/12;if(b.frequency==="custom"&&b.intervalMonths)return s+ev/(parseFloat(b.intervalMonths)||1);return s;},0);const af=ab.reduce((s,b)=>{const ev=eurForExpense(b);if(b.frequency==="monthly")return s+ev*12;if(b.frequency==="annual")return s+ev;if(b.frequency==="custom"&&b.intervalMonths)return s+ev*(12/(parseFloat(b.intervalMonths)||1));return s;},0);return(<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{[{l:t("reports.monthlyFixed"),v:mf,freq:"monthly"},{l:t("reports.annualFixed"),v:af,freq:"annual"}].map((m,i)=>(<div key={i} className="row-hover" style={{background:"#F5F0EA",borderRadius:8,padding:"10px 12px",cursor:"pointer"}} onClick={()=>go("bills")}><div style={{fontSize:9,color:"#6B7B72",fontWeight:500,marginBottom:2}}>{m.l}</div><div style={{fontSize:18,fontWeight:700,color:G,fontVariantNumeric:"tabular-nums"}}>{fmt(m.v)}</div><div style={{fontSize:8,color:"#9CAA9F",marginTop:3}}>→ {t("nav.bills")}</div></div>))}</div>);})()}
        <p style={{fontSize:9,color:"#9CAA9F",marginTop:8}}>Solo facturas activas y aprobadas</p>
      </div>
      {/* Calendar */}
      <div className="card" style={{marginBottom:11}}>
        <div style={{fontWeight:600,fontSize:13,marginBottom:11}}>{t("reports.calendar")}</div>
        <PaymentCalendar/>
      </div>
    </div>
  );
}

/* ── API INTEGRATIONS CARD ─────────────────────────────────────────────────── */
function ApiIntegrationsCard({ inline = false }) {
  const { t, expenses, bills } = useApp();
  const [open, setOpen] = useState(false);

function AdminReadme(){
  const[open,setOpen]=useState(false);
  const S={heading:{fontWeight:700,fontSize:11,color:"#3C0A37",marginBottom:4,marginTop:10},
           body:{fontSize:10,color:"#4B5E52",lineHeight:1.7},

    <div className="card" style={{marginBottom:12}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}}

        <div style={{fontWeight:600,fontSize:13}}>Guía operacional de administración</div>
        <span style={{fontSize:11,color:"#9CAA9F"}}>{open?"▲":"▼"}</span>
      </div>
      {open&&(
        <div style={{marginTop:12}}>

          <div style={S.heading}>ROLES</div>
          <div style={S.body}>
            <b>user</b> — puede enviar gastos y facturas, subir recibos, exportar.<br/>
            <b>admin</b> — todo lo anterior + aprobar/rechazar ítems de sus categorías, pausar/eliminar facturas.<br/>
            <b>superadmin</b> — todo lo anterior + gestionar usuarios, categorías, ver el App Log y aprobar cuentas nuevas.
          </div>

          <div style={S.heading}>CÓDIGOS DE ÍTEM</div>
          <div style={S.body}>
            Formato: <span style={S.code}>EXP-YYYYMMDD-XXXX</span> (gasto) / <span style={S.code}>FAC-YYYYMMDD-XXXX</span> (factura).<br/>
            Son <b>inmutables</b> — se generan en el momento del envío y no cambian aunque el ítem se edite.<br/>
            Úsalos como ancla de trazabilidad en auditorías, conciliaciones y exports.<br/>
            El código aparece en la fila de lista, en el panel de detalle y en el CSV exportado.
          </div>

          <div style={S.heading}>ADJUNTOS (RECIBOS)</div>
          <div style={S.body}>
            Los recibos se almacenan como <b>Base64 inline</b> en <span style={S.code}>localStorage</span> (clave <span style={S.code}>sol-exp</span>).<br/>
            Tipos permitidos: JPEG, PNG, WEBP, PDF · Tamaño máximo: 4 MB por archivo.<br/>
            El campo <span style={S.code}>receiptType</span> indica el MIME type; <span style={S.code}>receipt</span> contiene el Base64.<br/>
            Los adjuntos eliminados registran un evento <span style={S.code}>attachment_removed</span> en el auditTrail del ítem.
          </div>

          <div style={S.heading}>EXPORTACIONES</div>
          <div style={S.body}>
            CSV: incluye código, fecha, descripción, categoría, importe, estado, enviado por, pagado por, notas, aprobadores.<br/>
            JSON: snapshot completo de gastos + facturas con toda la estructura interna.<br/>
            Cada exportación CSV registra un evento <span style={S.code}>exported</span> en el auditTrail de cada ítem exportado.
          </div>

          <div style={S.heading}>LOCALSTORE — CLAVES</div>
          <div style={S.body}>
            <span style={S.code}>sol-users</span> usuarios · <span style={S.code}>sol-exp</span> gastos · <span style={S.code}>sol-bills</span> facturas · <span style={S.code}>sol-cats</span> categorías<br/>
            <span style={S.code}>sol-pwd</span> contraseñas (plaintext, solo modo local)<br/>
            <span style={S.code}>sol-app-log</span> log de la app (máx {LOG_MAX} entradas) · <span style={S.code}>sol-lang</span> reservado (es)
          </div>

          <div style={S.heading}>RESOLUCIÓN DE PROBLEMAS COMUNES</div>
          <div style={S.body}>
            <b>"Storage full"</b> → Ve a Zona peligrosa → Exporta JSON → luego elimina recibos grandes o usa "Restablecer datos demo".<br/>
            <b>Usuario no puede aprobar</b> → Comprueba que su ID aparezca en <span style={S.code}>approverIds</span> de la categoría.<br/>
            <b>Ítem sin código</b> → Ítems migrados de v1/v2 pueden carecer de código; se asigna al primer guardado (normalizeItem).<br/>
            <b>Login con servidor de auth</b> → Verifica que <span style={S.code}>AUTH_URL</span> apunte al servidor activo y que CORS_ORIGIN esté configurado.<br/>
            <b>Email de verificación no llega</b> → Comprueba <span style={S.code}>RESEND_API_KEY</span> y que FROM_EMAIL esté verificado en Resend.<br/>
            <b>Sesión cerrada automáticamente</b> → El timeout de inactividad es 30 min. Ajusta <span style={S.code}>IDLE_TIMEOUT_MS</span> en el código.
          </div>

        </div>
      )}
    </div>
  );
}

/* ── APP LOG (Settings accordion body) ─────────────────────────────────────
   Structured in-browser log: timestamp, level, event, metadata.
─────────────────────────────────────────────────────────────────────────── */
function AppLogPanelBody(){
  const [entries,setEntries]=useState([]);
  const loadLog=()=>{
    try{setEntries(JSON.parse(localStorage.getItem(APP_LOG_KEY)||"[]").reverse());}
    catch{setEntries([]);}
  };
  const clearLog=()=>{
    if(!confirm("Borrar el log de la aplicación?"))return;
    localStorage.removeItem(APP_LOG_KEY);setEntries([]);
  };
  const LEVEL_COLOR={error:"#DC2626",warn:"#D97706",info:"#9CAA9F"};
  const EVENT_COLOR={
    "auth:login":"#3C0A37","auth:init":"#9CA3AF","auth:boot":"#9CA3AF",
    "session_idle_expired":"#D97706","password_changed":"#D97706",
    "expense_submitted":"#065F46","bill_submitted":"#065F46",
    "item_approved":"#065F46","item_rejected":"#DC2626",
    "csv_exported":"#2563EB","attachment_uploaded":"#7A4F9A",
    "attachment_removed":"#991B1B","upload_rejected":"#DC2626",
  };
  useEffect(()=>{loadLog();},[]);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"flex-end",gap:8,marginBottom:8}}>
        <button type="button" className="btn-sm" style={{fontSize:9,padding:"2px 7px",background:"transparent",
          color:"#991B1B",border:"1px solid #ECA3A3"}} onClick={clearLog}>Borrar</button>
        <button type="button" className="btn-sm" style={{fontSize:10}} onClick={loadLog}>Actualizar</button>
      </div>
      <div style={{fontSize:10,color:"#9CAA9F",marginBottom:7}}>
        Últimas {entries.length} entradas · autenticación, uploads, aprobaciones, exportaciones.
      </div>
      <div style={{maxHeight:300,overflowY:"auto",fontFamily:"monospace",fontSize:10}}>
        {entries.length===0&&<div style={{color:"#9CAA9F",padding:"8px 0"}}>Sin entradas.</div>}
        {entries.map((e,i)=>(
          <div key={i} style={{padding:"4px 0",borderBottom:"1px solid #F5F0EA",display:"flex",gap:7,alignItems:"baseline"}}>
            <span style={{color:"#9CAA9F",flexShrink:0,width:68}}>{(e.ts||"").slice(11,19)}</span>
            <span style={{fontWeight:700,color:LEVEL_COLOR[e.level]||"#9CAA9F",flexShrink:0,width:36}}>{(e.level||"info").toUpperCase()}</span>
            <span style={{color:EVENT_COLOR[e.event]||"#3C0A37",fontWeight:600,flexShrink:0,minWidth:140}}>{e.event}</span>
            <span style={{color:"#6B7B72",wordBreak:"break-all"}}>
              {Object.entries(e).filter(([k])=>!["ts","level","event"].includes(k))
                .map(([k,v])=>`${k}=${typeof v==="object"?JSON.stringify(v):v}`).join(" · ")}
            </span>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ── PENDING USERS PANEL ──────────────────────────────────────────────────── */
function PendingUsersPanel({inline=false}){
  const{t}=useApp();
  const [pending,setPending]=useState([]);
  const [loading,setLoading]=useState(false);
  const [adminKey,setAdminKey]=useState(()=>localStorage.getItem("sol-admin-key")||"");
  const [msg,setMsg]=useState("");
  const [actionLoading,setActionLoading]=useState(null);

  const saveAdminKey=v=>{setAdminKey(v);localStorage.setItem("sol-admin-key",v);};

  const loadPending=async()=>{
    if(!AUTH_URL||!adminKey){return;}
    setLoading(true);setMsg("");
    try{
      const r=await fetch(AUTH_URL+"/admin/users/pending",{headers:{"x-admin-key":adminKey}});
      if(r.status===403){setMsg("Clave de administración incorrecta.");setLoading(false);return;}
      const d=await r.json();
      setPending(d.users||[]);
    }catch{setMsg("No se pudo conectar al servidor.");}
    setLoading(false);
  };

  const act=async(userId,action)=>{
    setActionLoading(userId);setMsg("");
    try{
      const r=await fetch(`${AUTH_URL}/admin/users/${userId}/${action}`,{
        method:"POST",headers:{"Content-Type":"application/json","x-admin-key":adminKey},
        body:JSON.stringify({adminId:"superadmin"})});
      const d=await r.json();
      if(!r.ok){setMsg(d.error||t("msg.genericShort"));setActionLoading(null);return;}
      setPending(p=>p.filter(u=>u.id!==userId));
      setMsg(action==="approve"?"Usuario aprobado.":"Usuario denegado.");
    }catch{setMsg("Error de conexión.");}
    setActionLoading(null);
  };

  return(
    <div>
      <p style={{fontSize:11,color:"#6B7B72",marginBottom:9}}>{t("settings.pendingUsersDesc")}</p>
      <div style={{marginBottom:9}}>
        <label className="lbl">{t("settings.adminKey")}</label>
        <div style={{display:"flex",gap:6}}>
          <input className="inp" type="password" placeholder="x-admin-key" value={adminKey}
            onChange={e=>saveAdminKey(e.target.value)} style={{fontSize:12}}/>
          <button className="btn-sm" onClick={loadPending} disabled={loading} style={{flexShrink:0}}>
            {loading?"…":"Cargar"}
          </button>
        </div>
      </div>
      {msg&&<div style={{marginBottom:8,padding:"5px 9px",borderRadius:6,background:msg.includes("aprobado")||msg.includes("denegado")?"#D1FAE5":"#FEE2E2",color:msg.includes("aprobado")||msg.includes("denegado")?"#065F46":"#991B1B",fontSize:11}}>{msg}</div>}
      {pending.length===0&&adminKey&&!loading&&<div style={{fontSize:11,color:"#9CAA9F",padding:"8px 0"}}>{t("settings.noPendingUsers")}</div>}
      {pending.map(u=>(
        <div key={u.id} style={{padding:"10px 0",borderBottom:"1px solid #F5F0EA",display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{u.name||"—"}</div>
            <div style={{fontSize:10,color:"#9CAA9F",marginTop:1}}>{u.email}</div>
            <div style={{fontSize:9,color:"#B5C0B8",marginTop:1}}>
              Solicitado: {u.createdAt?new Date(u.createdAt).toLocaleDateString("es-ES"):"—"} · ID: {u.id.slice(0,12)}
            </div>
          </div>
          <div style={{display:"flex",gap:5,flexShrink:0}}>
            <button className="btn-sm" style={{fontSize:10,padding:"3px 9px",background:"#16A34A"}}
              onClick={()=>act(u.id,"approve")} disabled={actionLoading===u.id}>
              {actionLoading===u.id?"…":t("settings.approveUser")}
            </button>
            <button className="btn-danger" style={{fontSize:10,padding:"3px 9px"}}
              onClick={()=>act(u.id,"deny")} disabled={actionLoading===u.id}>
              {t("settings.denyUser")}
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}
